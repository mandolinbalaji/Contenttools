<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BrahmaLayam - Carnatic Notation Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vexflow@4.2.2/build/vexflow.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #333;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: white;
            border-bottom: 2px solid #e0e0e0;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .header-title {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 12px;
        }

        .header-controls {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-group label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            min-width: 60px;
        }

        select, input[type="number"] {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: white;
            border-right: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            background: #f9f9f9;
            border-bottom: 1px solid #e8e8e8;
        }

        .sidebar-header h3 {
            font-size: 13px;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .sidebar-actions {
            display: flex;
            gap: 8px;
        }

        .sidebar-btn {
            flex: 1;
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sidebar-btn:hover {
            background: #764ba2;
            transform: translateY(-1px);
        }

        .lesson-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .lesson-item {
            padding: 12px;
            background: white;
            border: 1px solid #e8e8e8;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
        }

        .lesson-item:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .lesson-item.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            background: white;
            border-bottom: 2px solid #e0e0e0;
            padding: 12px 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            padding: 8px 14px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .toolbar-btn:hover {
            background: #667eea;
            color: white;
        }

        .toolbar-btn.active {
            background: #667eea;
            color: white;
        }

        .toolbar-separator {
            width: 1px;
            height: 24px;
            background: #e0e0e0;
        }

        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            padding: 20px;
            gap: 20px;
        }

        .editor-section {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .editor-title {
            font-size: 12px;
            font-weight: 700;
            color: #667eea;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .carnatic-editor {
            flex: 1;
            overflow: auto;
            font-family: 'Courier Prime', monospace;
            font-size: 16px;
            line-height: 2;
            letter-spacing: 0.5em;
        }

        .note-input {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            padding: 12px;
            font-family: 'Courier Prime', monospace;
            font-size: 16px;
            line-height: 2;
            letter-spacing: 0.5em;
            resize: none;
            background: white;
        }

        .error-highlight {
            background: #ffebee;
            border-left: 4px solid #f44336;
        }

        .western-staff {
            flex: 0 0 180px;
            overflow: auto;
            background: #fafafa;
            border-radius: 8px;
            padding: 12px;
        }

        #vexflowCanvas {
            width: 100%;
            height: auto;
        }

        .status-bar {
            background: white;
            border-top: 2px solid #e0e0e0;
            padding: 12px 20px;
            font-size: 12px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        .controls-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
            }

            .header-controls {
                gap: 10px;
            }

            .control-group label {
                min-width: 50px;
                font-size: 11px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: 200px;
                border-right: none;
                border-bottom: 2px solid #e0e0e0;
            }

            .header-controls {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">🎵 BrahmaLayam - Carnatic Notation Editor</div>
        <div class="header-controls">
            <div class="control-group">
                <label>Thala:</label>
                <select id="thalaSelect" onchange="handleThalaChange(this.value)">
                    <option value="adi">Adi Tala (8)</option>
                    <option value="rupaka">Rupaka Tala (3)</option>
                    <option value="khanda">Khanda Tala (5)</option>
                    <option value="misra">Misra Tala (7)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Jathi:</label>
                <select id="jathiSelect" onchange="handleJathiChange(this.value)">
                    <option value="3">Tisra (3)</option>
                    <option value="4" selected>Chatusra (4)</option>
                    <option value="5">Kanda (5)</option>
                    <option value="7">Misra (7)</option>
                    <option value="9">Sankirna (9)</option>
                </select>
            </div>
            <div class="control-group">
                <label>Sruthi:</label>
                <select id="sruthiSelect" onchange="handleSruthiChange(this.value)">
                    <option value="261.63">C (Sa)</option>
                    <option value="293.66">D (Ri)</option>
                    <option value="329.63">E (Ga)</option>
                    <option value="349.23">F (Ma)</option>
                    <option value="392.00">G (Pa)</option>
                </select>
            </div>
            <div class="control-group">
                <label>BPM:</label>
                <input type="number" id="bpmInput" value="120" min="30" max="300">
            </div>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h3>📚 Lesson Library</h3>
                <div class="sidebar-actions">
                    <button class="sidebar-btn" onclick="createNewLesson()">New</button>
                    <button class="sidebar-btn" onclick="deleteCurrentLesson()">Delete</button>
                </div>
            </div>
            <div class="lesson-list" id="lessonList"></div>
        </div>

        <div class="content-area">
            <div class="toolbar">
                <button class="toolbar-btn" id="octaveUpBtn" onclick="toggleOctaveUp()" title="Octave Up">⬆ Oct</button>
                <button class="toolbar-btn" id="octaveDownBtn" onclick="toggleOctaveDown()" title="Octave Down">⬇ Oct</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="toggleSpeed()" title="Speed (Kalam)">^ Speed</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="undo()" title="Undo">↶ Undo</button>
                <button class="toolbar-btn" onclick="redo()" title="Redo">↷ Redo</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="playNotes()" title="Play">▶ Play</button>
                <button class="toolbar-btn" onclick="stopPlayback()" title="Stop">⏹ Stop</button>
                <div class="toolbar-separator"></div>
                <button class="toolbar-btn" onclick="saveLesson()" title="Save">💾 Save</button>
                <button class="toolbar-btn" onclick="exportToMusicXML()" title="Export to MusicXML">📥 Export</button>
            </div>

            <div class="editor-container">
                <div class="editor-section" style="flex: 1.5;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <div class="editor-title">Carnatic Notes</div>
                        <div style="font-size: 11px; color: #999;">
                            <span style="margin-right: 12px;">● = Octave Up</span>
                            <span style="margin-right: 12px;">· = Double Speed</span>
                            <span>● = Octave Down</span>
                        </div>
                    </div>
                    <textarea class="note-input" id="noteInput" placeholder="Type notes: S R G M P D N (space-separated)&#10;Example: S R G M P D N S"></textarea>
                </div>

                <div class="editor-section" style="flex: 1;">
                    <div class="editor-title">Western Notation (Live Preview)</div>
                    <div class="western-staff" id="westernStaff">
                        <svg id="vexflowCanvas" width="100%" height="180"></svg>
                    </div>
                </div>
            </div>

            <div class="status-bar">
                <span id="statusText">Ready</span>
                <span id="noteCount">Notes: 0</span>
            </div>
        </div>
    </div>

    <script>
        // GOLDEN RULES: Atomic Notes System
        // Every note is an object { char: 'S', octave: 0, speed: 1 }
        // Laya: Total Pulses = sum(1/speed) for vertical line placement
        // Sruthi: Map S to selected frequency with Carnatic ratios

        // Standard Carnatic Frequency Ratios (relative to Sa=1.0)
        const CARNATIC_RATIOS = {
            'S': 1.0,        // Sa
            'R': 1.067,      // Ri (16/15)
            'G': 1.125,      // Ga (9/8)
            'M': 1.2,        // Ma (6/5)
            'P': 1.333,      // Pa (4/3)
            'D': 1.5,        // Da (3/2)
            'N': 1.6875      // Ni (27/16)
        };

        // Global state
        let appState = {
            currentLesson: null,
            atomicNotes: [],        // Array of { char, octave, speed }
            octaveUp: false,
            octaveDown: false,
            speedMode: false,
            selectedJathi: 4,
            selectedThala: 8,
            selectedSruthi: 261.63,
            bpm: 120,
            history: [],            // Stack of textarea values for undo
            historyIndex: -1,       // Current position in history
            maxHistory: 50,         // Limit history to 50 states
            synth: null,
            isPlaying: false
        };

        // Initialize Tone.js
        function initAudio() {
            appState.synth = new Tone.PolySynth(Tone.Synth, {
                oscillator: { type: 'triangle' },
                envelope: {
                    attack: 0.005,
                    decay: 0.1,
                    sustain: 0,
                    release: 0.1
                }
            }).toDestination();
            
            // Set reasonable volume to prevent clipping
            appState.synth.volume.value = -6;
        }

        // Parse textarea into atomic notes
        function parseAtomicNotes(input) {
            const validNotes = 'SRGMPDNS';
            const notes = [];
            const cleanInput = input.toUpperCase().trim();
            
            // Parse character by character to support "sssss" as 5 notes
            // This way "S R G" and "SRG" both work as 3 notes
            for (let i = 0; i < cleanInput.length; i++) {
                const char = cleanInput[i];
                if (validNotes.includes(char)) {
                    // ONLY add the note, octave and speed are modified by clicking, not by mode
                    const octave = 0;  // Always start at 0, user clicks to modify
                    const speed = 1;   // Always start at 1, speed button is separate
                    notes.push({ char, octave, speed });
                }
            }
            
            return notes;
        }

        // Calculate total pulses for laya drawing
        function calculateTotalPulses(atomicNotes) {
            return atomicNotes.reduce((sum, note) => sum + (1 / note.speed), 0);
        }

        // Get frequency for a note
        function getNoteFrequency(char, octave = 0) {
            const baseFreq = appState.selectedSruthi * (CARNATIC_RATIOS[char] || 1.0);
            // Each octave multiplies/divides by 2
            return baseFreq * Math.pow(2, octave);
        }

        // Load lessons from server
        async function loadLessonLibrary() {
            try {
                const response = await fetch('/api/lessons');
                const lessons = await response.json();
                const listEl = document.getElementById('lessonList');
                listEl.innerHTML = '';

                lessons.forEach(lesson => {
                    const item = document.createElement('div');
                    item.className = 'lesson-item';
                    item.textContent = lesson.name || lesson.id;
                    item.onclick = () => loadLesson(lesson.id);
                    listEl.appendChild(item);
                });

                if (lessons.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'lesson-item';
                    empty.textContent = 'No lessons yet';
                    empty.style.cursor = 'default';
                    listEl.appendChild(empty);
                }
            } catch (error) {
                console.error('Failed to load lessons:', error);
                document.getElementById('statusText').textContent = 'Error loading lessons';
            }
        }

        // Load a specific lesson
        async function loadLesson(lessonId) {
            try {
                const response = await fetch(`/api/lesson/${lessonId}`);
                const lesson = await response.json();
                appState.currentLesson = lesson;
                document.getElementById('noteInput').value = lesson.notes || '';
                updatePreview();
                document.getElementById('statusText').textContent = `Loaded: ${lesson.name || lessonId}`;
            } catch (error) {
                console.error('Failed to load lesson:', error);
            }
        }

        // Create new lesson
        async function createNewLesson() {
            const name = prompt('Enter lesson name:');
            if (!name) return;

            const newLesson = {
                id: Date.now().toString(),
                name: name,
                notes: '',
                metadata: {
                    thala: 'adi',
                    jathi: 4,
                    sruthi: 261.63,
                    bpm: 120,
                    createdAt: new Date().toISOString()
                }
            };

            try {
                const response = await fetch('/api/lesson', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newLesson)
                });

                if (response.ok) {
                    appState.currentLesson = newLesson;
                    document.getElementById('noteInput').value = '';
                    loadLessonLibrary();
                    document.getElementById('statusText').textContent = 'New lesson created';
                }
            } catch (error) {
                console.error('Failed to create lesson:', error);
            }
        }

        // Save current lesson
        async function saveLesson() {
            if (!appState.currentLesson) {
                alert('Please create or select a lesson first');
                return;
            }

            // Store both the raw text AND atomic notes for proper reconstruction
            appState.currentLesson.notes = document.getElementById('noteInput').value;
            appState.currentLesson.atomicNotes = appState.atomicNotes;  // Golden Rule: Store atomic structure
            appState.currentLesson.metadata = {
                thala: document.getElementById('thalaSelect').value,
                jathi: parseInt(document.getElementById('jathiSelect').value),
                sruthi: parseFloat(document.getElementById('sruthiSelect').value),
                bpm: parseInt(document.getElementById('bpmInput').value),
                totalPulses: calculateTotalPulses(appState.atomicNotes),
                updatedAt: new Date().toISOString()
            };

            try {
                const response = await fetch('/api/lesson', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(appState.currentLesson)
                });

                if (response.ok) {
                    document.getElementById('statusText').textContent = 'Lesson saved successfully';
                } else {
                    throw new Error('Save failed');
                }
            } catch (error) {
                console.error('Failed to save lesson:', error);
                document.getElementById('statusText').textContent = 'Error saving lesson';
            }
        }

        // Delete current lesson
        async function deleteCurrentLesson() {
            if (!appState.currentLesson) return;
            if (!confirm('Delete this lesson?')) return;

            try {
                await fetch(`/api/lesson/${appState.currentLesson.id}`, { method: 'DELETE' });
                appState.currentLesson = null;
                document.getElementById('noteInput').value = '';
                loadLessonLibrary();
                document.getElementById('statusText').textContent = 'Lesson deleted';
            } catch (error) {
                console.error('Failed to delete lesson:', error);
            }
        }

        // UI handlers
        function toggleOctaveUp() {
            appState.octaveUp = !appState.octaveUp;
            appState.octaveDown = false;
            document.getElementById('octaveUpBtn').classList.toggle('active', appState.octaveUp);
            document.getElementById('octaveDownBtn').classList.toggle('active', false);
            updateStatusForMode();
        }

        function toggleOctaveDown() {
            appState.octaveDown = !appState.octaveDown;
            appState.octaveUp = false;
            document.getElementById('octaveDownBtn').classList.toggle('active', appState.octaveDown);
            document.getElementById('octaveUpBtn').classList.toggle('active', false);
            updateStatusForMode();
        }

        function updateStatusForMode() {
            if (appState.octaveUp) {
                document.getElementById('statusText').textContent = 'Click notes to add octave up (●)';
            } else if (appState.octaveDown) {
                document.getElementById('statusText').textContent = 'Click notes to add octave down (●)';
            } else {
                document.getElementById('statusText').textContent = 'Ready';
            }
        }

        function toggleSpeed() {
            appState.speedMode = !appState.speedMode;
            document.querySelector('[onclick="toggleSpeed()"]').classList.toggle('active', appState.speedMode);
        }

        function handleThalaChange(value) {
            appState.selectedThala = value;
            updatePreview();
        }

        function handleJathiChange(value) {
            appState.selectedJathi = parseInt(value);
            updatePreview();
        }

        function handleSruthiChange(value) {
            appState.selectedSruthi = parseFloat(value);
        }

        function updatePreview() {
            const input = document.getElementById('noteInput').value;
            appState.atomicNotes = parseAtomicNotes(input);
            
            // Update note count - only count valid notes
            document.getElementById('noteCount').textContent = `Notes: ${appState.atomicNotes.length}`;
            
            // Calculate laya
            const totalPulses = calculateTotalPulses(appState.atomicNotes);
            const statusText = `Pulses: ${totalPulses.toFixed(1)} | Jathi: ${appState.selectedJathi} | Next line: ${appState.selectedJathi} pulses`;
            document.getElementById('statusText').textContent = statusText;
            
            renderCarnatiNotation(appState.atomicNotes);
            renderWesternStaff(appState.atomicNotes);
        }

        // Render Carnatic notation with vertical lines on Jathi count
        function renderCarnatiNotation(atomicNotes) {
            const container = document.querySelector('.carnatic-editor');
            if (!container) return;

            let html = '<div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center; line-height: 1.2;">';
            let pulseCount = 0;
            let pulseInJathi = 0;

            atomicNotes.forEach((note, index) => {
                const pulsesForNote = 1 / note.speed;
                pulseInJathi += pulsesForNote;
                pulseCount += pulsesForNote;

                // Create clickable note display with octave dots above/below
                let noteDisplay = '';
                const isClickable = (appState.octaveUp || appState.octaveDown);
                const hoverEffect = isClickable ? 'background: #f0f4ff; border-radius: 6px; padding: 4px 8px;' : '';
                const cursorStyle = isClickable ? 'cursor: pointer;' : 'cursor: default;';
                const hoverRule = isClickable ? `
                    .note-btn:hover { background: #e0e8ff !important; }
                ` : '';
                
                if (note.octave === 1) {
                    // Octave up: dot above
                    noteDisplay = `<div class="note-btn" style="display: flex; flex-direction: column; align-items: center; ${cursorStyle} ${hoverEffect} transition: all 0.15s ease;" onclick="toggleNoteOctave(${index})" title="Click to remove octave up">
                        <span style="font-size: 14px; color: #ff6b6b; font-weight: bold;">●</span>
                        <span style="font-size: 18px; font-weight: bold; color: #667eea; line-height: 1.2;">${note.char}</span>
                        ${note.speed === 2 ? '<span style="font-size: 10px; color: #999;">·</span>' : ''}
                    </div>`;
                } else if (note.octave === -1) {
                    // Octave down: dot below
                    noteDisplay = `<div class="note-btn" style="display: flex; flex-direction: column; align-items: center; ${cursorStyle} ${hoverEffect} transition: all 0.15s ease;" onclick="toggleNoteOctave(${index})" title="Click to remove octave down">
                        <span style="font-size: 18px; font-weight: bold; color: #667eea; line-height: 1.2;">${note.char}</span>
                        ${note.speed === 2 ? '<span style="font-size: 10px; color: #999;">·</span>' : ''}
                        <span style="font-size: 14px; color: #ff6b6b; font-weight: bold;">●</span>
                    </div>`;
                } else {
                    // Normal: no dot - clickable if mode is active
                    noteDisplay = `<div class="note-btn" style="display: flex; flex-direction: column; align-items: center; ${cursorStyle} ${hoverEffect} transition: all 0.15s ease;" onclick="toggleNoteOctave(${index})" title="${isClickable ? 'Click to add octave modifier' : 'Enable Oct Up/Down first'}">
                        <span style="font-size: 18px; font-weight: bold; color: #667eea; line-height: 1.2;">${note.char}</span>
                        ${note.speed === 2 ? '<span style="font-size: 10px; color: #999;">·</span>' : ''}
                    </div>`;
                }
                
                html += noteDisplay;

                // Add vertical line when Jathi is complete
                if (pulseInJathi >= appState.selectedJathi - 0.001) {
                    html += `<span style="width: 2px; height: 40px; background: #ff6b6b; margin: 0 4px;"></span>`;
                    pulseInJathi = 0;
                }
            });

            html += '</div>';
            
            // Find or create the display area
            let displayArea = container.querySelector('#notationDisplay');
            if (!displayArea) {
                displayArea = document.createElement('div');
                displayArea.id = 'notationDisplay';
                displayArea.style.cssText = 'margin-top: 12px; padding: 16px; background: #f9f9f9; border-radius: 6px; min-height: 60px; border: 1px solid #e0e0e0;';
                container.appendChild(displayArea);
            }
            
            displayArea.innerHTML = html;
        }

        // Toggle octave for a specific note when clicked
        function toggleNoteOctave(noteIndex) {
            console.log('toggleNoteOctave called for index:', noteIndex, 'octaveUp:', appState.octaveUp, 'octaveDown:', appState.octaveDown);
            
            if (noteIndex < 0 || noteIndex >= appState.atomicNotes.length) {
                console.log('Invalid index');
                return;
            }
            
            const note = appState.atomicNotes[noteIndex];
            console.log('Before:', note);
            
            // If octave up mode is enabled
            if (appState.octaveUp) {
                if (note.octave === 1) {
                    note.octave = 0;  // Remove octave up
                } else if (note.octave === -1) {
                    note.octave = 1;  // Switch from down to up
                } else {
                    note.octave = 1;  // Add octave up
                }
            }
            // If octave down mode is enabled
            else if (appState.octaveDown) {
                if (note.octave === -1) {
                    note.octave = 0;  // Remove octave down
                } else if (note.octave === 1) {
                    note.octave = -1;  // Switch from up to down
                } else {
                    note.octave = -1;  // Add octave down
                }
            }
            
            console.log('After:', note);
            document.getElementById('statusText').textContent = `Modified: ${note.char} → octave ${note.octave}`;
            updatePreview();
        }

        function renderWesternStaff(atomicNotes) {
            const canvas = document.getElementById('vexflowCanvas');
            if (!canvas) return;
            
            try {
                if (typeof Vex === 'undefined') {
                    const svgElement = canvas.parentElement;
                    svgElement.innerHTML = '<div style="padding: 12px; color: #999; font-size: 12px;">Loading notation library...</div>';
                    return;
                }

                const svgElement = canvas.parentElement;
                svgElement.innerHTML = '';
                const newCanvas = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                newCanvas.id = 'vexflowCanvas';
                newCanvas.setAttribute('width', '100%');
                newCanvas.setAttribute('height', '180');
                svgElement.appendChild(newCanvas);

                const renderer = new Vex.Flow.Renderer(newCanvas, Vex.Flow.Renderer.Backends.SVG);
                const context = renderer.getContext();

                const stave = new Vex.Flow.Stave(10, 0, 300);
                stave.addClef('treble').setContext(context).draw();

                // Map Carnatic notes to Western staff with octave support
                const noteMap = {
                    'S': { '-1': 'D/3', '0': 'D/4', '1': 'D/5' },
                    'R': { '-1': 'E/3', '0': 'E/4', '1': 'E/5' },
                    'G': { '-1': 'F#/3', '0': 'F#/4', '1': 'F#/5' },
                    'M': { '-1': 'G/3', '0': 'G/4', '1': 'G/5' },
                    'P': { '-1': 'A/3', '0': 'A/4', '1': 'A/5' },
                    'D': { '-1': 'B/3', '0': 'B/4', '1': 'B/5' },
                    'N': { '-1': 'C#/4', '0': 'C#/5', '1': 'C#/6' }
                };

                const vexNotes = atomicNotes
                    .slice(0, 8)
                    .map(note => {
                        const octave = note.octave.toString();
                        const key = noteMap[note.char]?.[octave] || 'D/4';
                        const duration = note.speed === 2 ? 'e' : 'q'; // 8th note for double speed
                        return new Vex.Flow.StaveNote({ keys: [key], duration });
                    });

                if (vexNotes.length > 0) {
                    const voice = new Vex.Flow.Voice({ num_beats: vexNotes.length, beat_value: 4 });
                    voice.addTickables(vexNotes);
                    new Vex.Flow.Formatter().joinVoices([voice]).format([voice], 300);
                    voice.draw(context, stave);
                }
            } catch (error) {
                console.error('VexFlow error:', error);
                const svgElement = canvas.parentElement;
                svgElement.innerHTML = '<div style="padding: 12px; color: #999; font-size: 12px;">Unable to render notation</div>';
            }
        }

        function playNotes() {
            if (appState.atomicNotes.length === 0) {
                document.getElementById('statusText').textContent = 'No notes to play';
                return;
            }
            
            // Resume AudioContext immediately on user gesture (synchronous)
            Tone.start().catch(() => {
                console.log('Audio context already started or not available');
            });
            
            appState.isPlaying = true;
            const beatDuration = 60 / appState.bpm;  // Duration of one beat in seconds
            
            // Use async IIFE to handle async playback after initial gesture
            (async () => {
                for (let note of appState.atomicNotes) {
                    if (!appState.isPlaying) break;
                    
                    const frequency = getNoteFrequency(note.char, note.octave);
                    const noteDuration = beatDuration / note.speed;  // Faster speed = shorter duration
                    
                    // Pass frequency directly to triggerAttackRelease (Tone.js API)
                    appState.synth.triggerAttackRelease(frequency, noteDuration);
                    await new Promise(resolve => setTimeout(resolve, noteDuration * 1000));
                }
                
                appState.isPlaying = false;
                document.getElementById('statusText').textContent = 'Playback complete';
            })();
        }

        function stopPlayback() {
            appState.isPlaying = false;
            if (appState.synth) {
                appState.synth.triggerRelease();
            }
            document.getElementById('statusText').textContent = 'Playback stopped';
        }

        function undo() {
            if (appState.historyIndex > 0) {
                appState.historyIndex--;
                const textarea = document.getElementById('noteInput');
                textarea.value = appState.history[appState.historyIndex];
                updatePreview();
                document.getElementById('statusText').textContent = `Undo (${appState.historyIndex + 1}/${appState.history.length})`;
            }
        }

        function redo() {
            if (appState.historyIndex < appState.history.length - 1) {
                appState.historyIndex++;
                const textarea = document.getElementById('noteInput');
                textarea.value = appState.history[appState.historyIndex];
                updatePreview();
                document.getElementById('statusText').textContent = `Redo (${appState.historyIndex + 1}/${appState.history.length})`;
            }
        }

        // Record textarea change for undo/redo
        function recordHistory() {
            const textarea = document.getElementById('noteInput');
            const currentValue = textarea.value;
            
            // If we're not at the end of history, remove future states
            if (appState.historyIndex < appState.history.length - 1) {
                appState.history = appState.history.slice(0, appState.historyIndex + 1);
            }
            
            // Add new state if it's different from the current one
            if (appState.history[appState.historyIndex] !== currentValue) {
                appState.history.push(currentValue);
                appState.historyIndex++;
                
                // Limit history size
                if (appState.history.length > appState.maxHistory) {
                    appState.history.shift();
                    appState.historyIndex--;
                }
            }
        }

        // Golden Rule: Export to MusicXML for MuseScore compatibility
        async function exportToMusicXML() {
            if (appState.atomicNotes.length === 0) {
                alert('No notes to export');
                return;
            }

            try {
                const response = await fetch('/api/export', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        atomicNotes: appState.atomicNotes,
                        metadata: {
                            thala: document.getElementById('thalaSelect').value,
                            jathi: parseInt(document.getElementById('jathiSelect').value),
                            sruthi: parseFloat(document.getElementById('sruthiSelect').value),
                            bpm: parseInt(document.getElementById('bpmInput').value)
                        }
                    })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `lesson-${Date.now()}.musicxml`;
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                    document.getElementById('statusText').textContent = 'Export complete - file downloaded';
                } else {
                    alert('Export failed');
                }
            } catch (error) {
                console.error('Export error:', error);
                alert('Error exporting lesson');
            }
        }

        // Event listeners
        document.getElementById('noteInput').addEventListener('input', () => {
            recordHistory();
            updatePreview();
        });
        document.getElementById('noteInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const notes = 'SRGMPDNS';
                const char = e.key.toUpperCase();
                if (notes.includes(char)) {
                    e.preventDefault();
                    const textarea = e.target;
                    const start = textarea.selectionStart;
                    textarea.value = textarea.value.substring(0, start) + char + ' ' + textarea.value.substring(start);
                    textarea.selectionStart = start + 2;
                    recordHistory();
                    updatePreview();
                }
            }
        });
        
        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                e.preventDefault();
                undo();
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
                e.preventDefault();
                redo();
            }
        });

        // Initialize
        window.addEventListener('load', () => {
            initAudio();
            loadLessonLibrary();
            // Initialize history with empty state
            appState.history.push('');
            appState.historyIndex = 0;
            document.getElementById('statusText').textContent = 'BrahmaLayam initialized';
        });
    </script>
</body>
