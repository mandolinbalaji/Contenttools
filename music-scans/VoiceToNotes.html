<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice to Notes - Swara Transcription</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .instructions {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }

        .control-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #listenBtn {
            background: #667eea;
            color: white;
            flex: 1;
            min-width: 150px;
            justify-content: center;
        }

        #listenBtn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        #listenBtn.listening {
            background: #e74c3c;
            animation: pulse 1.5s infinite;
        }

        #testBtn {
            background: #ff9800;
            color: white;
            min-width: 120px;
            justify-content: center;
        }

        #testBtn:hover {
            background: #e68900;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 152, 0, 0.4);
        }

        #testBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #clearBtn {
            background: #95a5a6;
            color: white;
            min-width: 100px;
            justify-content: center;
        }

        #clearBtn:hover {
            background: #7f8c8d;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.7);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(231, 76, 60, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(231, 76, 60, 0);
            }
        }

        #status {
            text-align: center;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 6px;
            min-height: 20px;
            font-size: 14px;
            color: #666;
            background: #f5f5f5;
            line-height: 1.5;
            word-wrap: break-word;
        }

        #status.recording {
            background: #ffe6e6;
            color: #c14141;
            font-weight: 600;
        }

        #status.success {
            background: #e6f7e6;
            color: #2d5016;
            font-weight: 600;
        }

        #status.error {
            background: #ffe6e6;
            color: #c14141;
            font-weight: 600;
        }
        
        #status small {
            font-weight: normal;
            font-size: 12px;
            display: block;
            margin-top: 5px;
        }

        .result-section {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px dashed #ddd;
        }

        #resultSwaras {
            font-size: 32px;
            text-align: center;
            color: #667eea;
            font-weight: bold;
            word-break: break-all;
            letter-spacing: 8px;
            min-height: 45px;
            margin-bottom: 10px;
        }

        .result-label {
            text-align: center;
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .comment-section {
            margin-top: 20px;
        }

        .comment-item {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 6px;
            border-left: 4px solid #ddd;
        }

        .comment-label {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: #667eea;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .comment-text {
            font-size: 14px;
            color: #555;
            line-height: 1.5;
        }

        .recognized-text {
            background: #fff9e6;
            padding: 4px 6px;
            border-radius: 4px;
            color: #b8860b;
            font-weight: 500;
        }

        .extracted-swaras {
            background: #e6f2ff;
            padding: 6px 10px;
            border-radius: 4px;
            color: #0052cc;
            font-weight: 600;
            letter-spacing: 2px;
            display: inline-block;
        }

        .ignored-text {
            background: #ffe6e6;
            padding: 4px 6px;
            border-radius: 4px;
            color: #c14141;
            font-weight: 500;
        }

        .comment-item:nth-child(1) {
            border-left-color: #ffc107;
        }

        .comment-item:nth-child(2) {
            border-left-color: #2196f3;
        }

        .comment-item:nth-child(3) {
            border-left-color: #4caf50;
        }

        .comment-item:nth-child(4) {
            border-left-color: #f44336;
        }

        .comment-item:nth-child(5) {
            border-left-color: #9c27b0;
        }

        .hidden {
            display: none;
        }

        .meter {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .meter-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.1s ease;
        }

        .device-selector {
            margin-bottom: 20px;
        }

        .device-selector label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .device-selector select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            color: #333;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }

        .device-selector select:hover {
            border-color: #667eea;
        }

        .device-selector select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .audio-monitor {
            display: none;
            margin-bottom: 20px;
        }

        .audio-monitor.active {
            display: block;
        }

        .monitor-label {
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .level-bars {
            display: flex;
            gap: 4px;
            height: 40px;
            align-items: flex-end;
            background: #f5f5f5;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .level-bar {
            flex: 1;
            background: linear-gradient(to top, #667eea, #764ba2);
            border-radius: 2px;
            min-height: 2px;
            transition: height 0.05s ease-out;
        }

        .volume-text {
            text-align: center;
            font-size: 12px;
            color: #666;
            margin-top: 6px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Voice to Notes</h1>
        <p class="subtitle">Say the swaras and I'll convert them to text</p>

        <div class="instructions">
            <strong>How to use:</strong> Click "Listen", speak your swaras clearly (s, r, g, m, p, d, n), then click "Listen" again to stop. The app will send to the server for transcription and extract only the valid swaras.
        </div>

        <div class="device-selector">
            <label for="deviceSelect">🎙️ Input Device</label>
            <select id="deviceSelect">
                <option value="">Loading devices...</option>
            </select>
        </div>

        <div class="control-section">
            <button id="listenBtn">🎤 Listen</button>
            <button id="testBtn">🧪 Test Mic</button>
            <button id="clearBtn">🗑️ Clear</button>
        </div>

        <div id="status"></div>
        <div id="debugInfo" style="display: none; background: #f5f5f5; padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 12px; color: #666; font-family: monospace; line-height: 1.4;"></div>

        <div class="audio-monitor" id="audioMonitor">
            <div class="monitor-label">📊 Input Level</div>
            <div class="level-bars" id="levelBars"></div>
            <div class="volume-text"><span id="volumeValue">0</span>%</div>
        </div>

        <div class="meter">
            <div class="meter-fill" id="meterFill"></div>
        </div>

        <div class="result-section">
            <div class="result-label">Extracted Swaras</div>
            <div id="resultSwaras">—</div>
        </div>

        <div id="commentSection" class="comment-section"></div>
    </div>

    <script>
        (function() {
            const listenBtn = document.getElementById('listenBtn');
            const testBtn = document.getElementById('testBtn');
            const clearBtn = document.getElementById('clearBtn');
            const resultSwaras = document.getElementById('resultSwaras');
            const commentSection = document.getElementById('commentSection');
            const status = document.getElementById('status');
            const debugInfo = document.getElementById('debugInfo');
            const deviceSelect = document.getElementById('deviceSelect');

            let mediaRecorder = null;
            let audioChunks = [];
            let isRecording = false;
            let fullInputText = '';
            let audioStream = null;
            let selectedDeviceId = null;
            let testAudioBlob = null;
            
            // Audio monitoring
            let audioContext = null;
            let analyser = null;
            let dataArray = null;
            let animationId = null;
            
            const validSwaras = new Set(['s', 'r', 'g', 'm', 'p', 'd', 'n']);

            // Debug logging function
            function debug(message) {
                const timestamp = new Date().toLocaleTimeString();
                const debugLine = `[${timestamp}] ${message}`;
                console.log(debugLine);
                
                // Add to debug info display
                const existing = debugInfo.innerHTML;
                debugInfo.innerHTML = existing + debugLine + '\n';
                debugInfo.parentElement.style.display = 'block';
                debugInfo.parentElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            function clearDebug() {
                debugInfo.innerHTML = '';
                debugInfo.parentElement.style.display = 'none';
            }

            // Enumerate and populate audio input devices
            async function loadDevices() {
                try {
                    const devices = await navigator.mediaDevices.enumerateDevices();
                    const audioInputs = devices.filter(device => device.kind === 'audioinput');
                    
                    deviceSelect.innerHTML = '';
                    
                    if (audioInputs.length === 0) {
                        deviceSelect.innerHTML = '<option value="">No microphones found</option>';
                        return;
                    }

                    audioInputs.forEach((device, index) => {
                        const option = document.createElement('option');
                        option.value = device.deviceId;
                        option.textContent = device.label || `Microphone ${index + 1}`;
                        deviceSelect.appendChild(option);
                    });

                    // Set first device as default
                    if (audioInputs.length > 0) {
                        selectedDeviceId = audioInputs[0].deviceId;
                        deviceSelect.value = selectedDeviceId;
                    }
                } catch (error) {
                    console.error('Error enumerating devices:', error);
                    deviceSelect.innerHTML = '<option value="">Error loading devices</option>';
                }
            }

            // Update selected device
            deviceSelect.addEventListener('change', () => {
                selectedDeviceId = deviceSelect.value;
            });

            // Setup audio monitoring
            function setupAudioMonitor(stream) {
                try {
                    if (!audioContext) {
                        audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    }

                    const source = audioContext.createMediaStreamSource(stream);
                    if (!analyser) {
                        analyser = audioContext.createAnalyser();
                        analyser.fftSize = 256;
                    }

                    source.connect(analyser);
                    
                    const bufferLength = analyser.frequencyBinCount;
                    dataArray = new Uint8Array(bufferLength);

                    // Create level bars
                    const levelBars = document.getElementById('levelBars');
                    levelBars.innerHTML = '';
                    const barCount = 12;
                    for (let i = 0; i < barCount; i++) {
                        const bar = document.createElement('div');
                        bar.className = 'level-bar';
                        levelBars.appendChild(bar);
                    }

                    // Start monitoring
                    startMonitoring();
                } catch (error) {
                    console.error('Audio monitor setup error:', error);
                }
            }

            // Animate the level bars
            function startMonitoring() {
                const levelBars = document.querySelectorAll('.level-bar');
                const volumeValue = document.getElementById('volumeValue');

                function updateBars() {
                    analyser.getByteFrequencyData(dataArray);

                    let sum = 0;
                    const barCount = levelBars.length;
                    const samplesPerBar = Math.floor(dataArray.length / barCount);

                    levelBars.forEach((bar, index) => {
                        let average = 0;
                        for (let i = 0; i < samplesPerBar; i++) {
                            average += dataArray[index * samplesPerBar + i];
                        }
                        average /= samplesPerBar;
                        sum += average;

                        const height = (average / 255) * 100;
                        bar.style.height = height + '%';
                    });

                    // Calculate overall volume
                    const volume = Math.round((sum / (barCount * 255)) * 100);
                    volumeValue.textContent = volume;

                    if (isRecording) {
                        animationId = requestAnimationFrame(updateBars);
                    }
                }

                updateBars();
            }

            // Stop monitoring
            function stopMonitoring() {
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                const levelBars = document.querySelectorAll('.level-bar');
                levelBars.forEach(bar => bar.style.height = '0%');
                document.getElementById('volumeValue').textContent = '0';
            }

            function extractSwaras(text) {
                const cleaned = text.toLowerCase().replace(/\s+/g, '');
                let extracted = '';
                let ignored = '';

                for (let char of cleaned) {
                    if (validSwaras.has(char)) {
                        extracted += char;
                    } else if (char !== '') {
                        ignored += char;
                    }
                }

                return { extracted, ignored, cleaned };
            }

            function updateDisplay() {
                const { extracted, ignored, cleaned } = extractSwaras(fullInputText);

                // Update result
                resultSwaras.textContent = extracted || '—';

                // Generate comments
                let commentsHTML = '';

                if (fullInputText) {
                    commentsHTML += `
                        <div class="comment-item">
                            <div class="comment-label">💬 What You Said</div>
                            <div class="comment-text">
                                <span class="recognized-text">"${fullInputText}"</span>
                            </div>
                        </div>
                    `;

                    commentsHTML += `
                        <div class="comment-item">
                            <div class="comment-label">🔤 Cleaned (lowercase, no spaces)</div>
                            <div class="comment-text">
                                <span class="recognized-text">"${cleaned}"</span>
                            </div>
                        </div>
                    `;

                    if (extracted) {
                        commentsHTML += `
                            <div class="comment-item">
                                <div class="comment-label">✅ Valid Swaras Found</div>
                                <div class="comment-text">
                                    <span class="extracted-swaras">${extracted}</span>
                                </div>
                            </div>
                        `;
                    } else {
                        commentsHTML += `
                            <div class="comment-item">
                                <div class="comment-label">❌ No Valid Swaras Found</div>
                                <div class="comment-text">
                                    Could not identify any swaras (s, r, g, m, p, d, n) in the input.
                                </div>
                            </div>
                        `;
                    }

                    if (ignored) {
                        commentsHTML += `
                            <div class="comment-item">
                                <div class="comment-label">🚫 Characters Ignored</div>
                                <div class="comment-text">
                                    <span class="ignored-text">${ignored}</span>
                                </div>
                            </div>
                        `;
                    }

                    commentsHTML += `
                        <div class="comment-item">
                            <div class="comment-label">📊 Summary</div>
                            <div class="comment-text">
                                Total: <strong>${cleaned.length}</strong> | Valid: <strong>${extracted.length}</strong> | Ignored: <strong>${ignored.length}</strong>
                            </div>
                        </div>
                    `;
                }

                commentSection.innerHTML = commentsHTML;
            }

            // Check browser support
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                status.textContent = '⚠️ Browser does not support audio recording.';
                status.classList.add('error');
                listenBtn.disabled = true;
                return;
            }

            // Listen button
            listenBtn.addEventListener('click', async () => {
                if (!isRecording) {
                    try {
                        const audioConstraints = selectedDeviceId 
                            ? { audio: { deviceId: { exact: selectedDeviceId } } }
                            : { audio: true };
                        
                        audioStream = await navigator.mediaDevices.getUserMedia(audioConstraints);
                        
                        // Try to use a supported audio format (WAV preferred, fallback to WebM)
                        let mimeType = 'audio/wav';
                        const supportedMimes = ['audio/wav', 'audio/webm', 'audio/mp4', 'audio/ogg'];
                        
                        for (const mime of supportedMimes) {
                            if (MediaRecorder.isTypeSupported(mime)) {
                                mimeType = mime;
                                break;
                            }
                        }
                        
                        console.log(`Using audio format: ${mimeType}`);
                        mediaRecorder = new MediaRecorder(audioStream, { mimeType: mimeType });
                        audioChunks = [];

                        mediaRecorder.ondataavailable = (event) => {
                            audioChunks.push(event.data);
                        };

                        mediaRecorder.onstop = async () => {
                            const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/wav' });
                            const audioSize = blob.size;
                            
                            debug(`Audio recorded: ${audioSize} bytes, format: ${blob.type}`);
                            status.textContent = '📤 Sending to server...';
                            status.classList.remove('recording');

                            try {
                                const arrayBuffer = await blob.arrayBuffer();
                                debug(`Sending ${arrayBuffer.byteLength} bytes to /api/transcribe`);
                                
                                const response = await fetch('/api/transcribe', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/octet-stream' },
                                    body: arrayBuffer
                                });

                                const result = await response.json();
                                debug(`Server response: ${JSON.stringify(result)}`);

                                if (result.success && result.text) {
                                    fullInputText = result.text;
                                    debug(`✅ Transcription success: "${result.text}"`);
                                    status.textContent = '✅ Done!';
                                    status.classList.add('success');
                                } else {
                                    const errorMsg = result.error || 'Unknown error';
                                    const stage = result.stage ? ` (${result.stage})` : '';
                                    debug(`❌ Error: ${errorMsg}${stage}`);
                                    status.innerHTML = `❌ <strong>${errorMsg}${stage}</strong><br><small>Check debug info below</small>`;
                                    status.classList.add('error');
                                    fullInputText = '';
                                }
                            } catch (error) {
                                debug(`❌ Network/fetch error: ${error.message}`);
                                console.error(error);
                                status.textContent = '❌ Network error - check your connection';
                                status.classList.add('error');
                                fullInputText = '';
                            }

                            updateDisplay();
                            if (audioStream) audioStream.getTracks().forEach(t => t.stop());
                        };

                        mediaRecorder.start();
                        isRecording = true;
                        setupAudioMonitor(audioStream);
                        document.getElementById('audioMonitor').classList.add('active');
                        listenBtn.classList.add('listening');
                        listenBtn.textContent = '🎤 Listening...';
                        status.textContent = '🔴 Recording...';
                        status.classList.add('recording');
                    } catch (error) {
                        status.textContent = '⚠️ Microphone access denied';
                        status.classList.add('error');
                    }
                } else {
                    isRecording = false;
                    stopMonitoring();
                    document.getElementById('audioMonitor').classList.remove('active');
                    listenBtn.classList.remove('listening');
                    listenBtn.textContent = '🎤 Listen';
                    mediaRecorder.stop();
                    status.textContent = '⏳ Processing...';
                }
            });

            // Clear button
            clearBtn.addEventListener('click', () => {
                fullInputText = '';
                audioChunks = [];
                isRecording = false;
                stopMonitoring();
                document.getElementById('audioMonitor').classList.remove('active');
                listenBtn.classList.remove('listening');
                listenBtn.textContent = '🎤 Listen';
                status.textContent = '';
                status.classList.remove('recording', 'success', 'error');
                if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
                if (audioStream) audioStream.getTracks().forEach(t => t.stop());
                updateDisplay();
                clearDebug();
            });

            // Test microphone button - records 3 seconds for debugging
            testBtn.addEventListener('click', async () => {
                if (testBtn.textContent.includes('Stop')) {
                    // Stop recording
                    testBtn.textContent = '🧪 Test Mic';
                    testBtn.disabled = true;
                    mediaRecorder.stop();
                    status.textContent = '📤 Saving test audio...';
                    debug('Test recording stopped');
                    
                    // Re-enable button after stop completes
                    setTimeout(() => { testBtn.disabled = false; }, 500);
                    return;
                }

                try {
                    clearDebug();
                    debug('🧪 Starting 3-second test recording...');
                    
                    const audioConstraints = selectedDeviceId 
                        ? { audio: { deviceId: { exact: selectedDeviceId } } }
                        : { audio: true };
                    
                    audioStream = await navigator.mediaDevices.getUserMedia(audioConstraints);
                    debug(`✅ Microphone accessed`);

                    let mimeType = 'audio/wav';
                    const supportedMimes = ['audio/wav', 'audio/webm', 'audio/mp4', 'audio/ogg'];
                    
                    for (const mime of supportedMimes) {
                        if (MediaRecorder.isTypeSupported(mime)) {
                            mimeType = mime;
                            break;
                        }
                    }
                    debug(`Using format: ${mimeType}`);
                    
                    mediaRecorder = new MediaRecorder(audioStream, { mimeType: mimeType });
                    audioChunks = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        testAudioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/wav' });
                        const audioSize = testAudioBlob.size;
                        
                        debug(`Test audio saved: ${audioSize} bytes`);
                        
                        // Create download link
                        const url = URL.createObjectURL(testAudioBlob);
                        const link = document.createElement('a');
                        link.href = url;
                        link.download = `test-audio-${Date.now()}.wav`;
                        
                        status.innerHTML = `
                            💾 Test audio ready (${audioSize} bytes)<br>
                            <button id="downloadBtn" style="margin-top: 10px; padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer;">⬇️ Download Test Audio</button>
                            <small style="display: block; margin-top: 5px; color: #666;">Use this to verify your microphone is working</small>
                        `;
                        status.classList.add('success');
                        
                        document.getElementById('downloadBtn').addEventListener('click', () => {
                            link.click();
                            debug('Downloaded test audio');
                        });

                        if (audioStream) audioStream.getTracks().forEach(t => t.stop());
                        testBtn.textContent = '🧪 Test Mic';
                    };

                    mediaRecorder.start();
                    setupAudioMonitor(audioStream);
                    document.getElementById('audioMonitor').classList.add('active');
                    testBtn.textContent = '🛑 Stop (3s)';
                    status.textContent = '🔴 Recording test audio...';
                    status.classList.remove('error', 'success');
                    status.classList.add('recording');

                    // Auto-stop after 3 seconds
                    setTimeout(() => {
                        if (mediaRecorder && mediaRecorder.state === 'recording') {
                            debug('Auto-stopping after 3 seconds');
                            mediaRecorder.stop();
                            stopMonitoring();
                            document.getElementById('audioMonitor').classList.remove('active');
                            testBtn.textContent = '🧪 Test Mic';
                        }
                    }, 3000);

                } catch (error) {
                    debug(`❌ Microphone error: ${error.message}`);
                    status.textContent = `⚠️ Microphone error: ${error.message}`;
                    status.classList.add('error');
                }
            });

            // Load devices on page init
            loadDevices();
            updateDisplay();
        })();
    </script>
</body>
</html>
