<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanakku - Phrase Timing Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 1800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: visible;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-layout {
            display: flex;
            flex: 1;
            overflow: visible;
        }

        /* ===== LEFT SIDEBAR ===== */
        .sidebar {
            width: 300px;
            background: #f8f9fa;
            border-right: 2px solid #e9ecef;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 12px;
            background: #667eea;
            color: white;
            font-weight: 600;
            font-size: 0.95em;
            border-bottom: 2px solid #e9ecef;
        }

        .sidebar-search {
            padding: 10px;
            border-bottom: 1px solid #e9ecef;
        }

        .sidebar-search input {
            width: 100%;
            padding: 6px 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 0.85em;
        }

        .sidebar-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar-index {
            width: 30px;
            background: #f0f0f0;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding: 2px 0;
        }

        .index-letter {
            width: 100%;
            text-align: center;
            color: #667eea;
            cursor: pointer;
            padding: 3px 0;
            font-size: 0.65em;
            font-weight: 600;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .index-letter:hover {
            background: #e8eeff;
            font-weight: 700;
        }

        .sidebar-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .kanakku-group {
            margin-bottom: 8px;
        }

        .kanakku-group-letter {
            font-weight: 700;
            color: #667eea;
            font-size: 0.75em;
            padding: 3px 4px;
            margin-bottom: 3px;
            border-bottom: 1px solid #ddd;
        }

        .kanakku-item {
            padding: 8px;
            margin-bottom: 4px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8em;
        }

        .kanakku-item:hover {
            background: #e8eeff;
            border-color: #667eea;
        }

        .kanakku-item-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 2px;
            font-size: 0.9em;
        }

        .kanakku-item-info {
            font-size: 0.7em;
            color: #666;
        }

        .kanakku-delete-btn {
            background: none;
            border: none;
            color: #999;
            font-size: 1em;
            cursor: pointer;
            padding: 0 2px;
            transition: all 0.2s;
            line-height: 1;
            flex-shrink: 0;
            margin-left: 4px;
        }

        .kanakku-delete-btn:hover {
            color: #c33;
            transform: scale(1.2);
        }

        .splitter {
            width: 6px;
            background: #ddd;
            cursor: col-resize;
            user-select: none;
        }

        .splitter:hover {
            background: #667eea;
        }

        /* ===== MAIN CONTENT ===== */
        .content-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: visible;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            gap: 15px;
            flex-wrap: wrap;
        }

        .header h1 {
            font-size: 1.8em;
            margin: 0;
            flex-shrink: 0;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .header-btn {
            padding: 8px 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .header-btn:hover {
            background: white;
            color: #667eea;
        }

        .header-select {
            padding: 6px 10px;
            border: 2px solid white;
            border-radius: 4px;
            font-size: 0.85em;
            background: rgba(255,255,255,0.9);
            color: #333;
            white-space: nowrap;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            background: white;
        }

        /* CONTROLS */
        .controls-section {
            background: #f8f9fa;
            padding: 8px 12px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 8px;
            align-items: flex-end;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .thalas-section {
            background: #f8f9fa;
            padding: 8px 12px;
            border-bottom: 2px solid #e9ecef;
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .thalas-label {
            font-weight: 600;
            color: #667eea;
            font-size: 0.8em;
            white-space: nowrap;
        }

        .thala-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            padding: 3px 6px;
            border: 1px solid #667eea;
            border-radius: 3px;
            font-size: 0.75em;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .thala-link:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
        }

        .control-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .control-item label {
            font-weight: 600;
            color: #333;
            font-size: 0.7em;
        }

        .control-item input,
        .control-item select {
            padding: 4px 6px;
            border: 2px solid #ddd;
            border-radius: 3px;
            font-size: 0.75em;
            transition: border-color 0.3s;
            min-width: 60px;
        }

        .control-item input:focus,
        .control-item select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .info-text {
            font-size: 0.6em;
            color: #666;
            margin-top: 0px;
        }

        /* PHRASE EDITOR */
        .phrase-section {
            background: white;
            padding: 12px 20px;
            border-bottom: 2px solid #e9ecef;
            flex-shrink: 0;
        }

        .phrase-toolbar {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .toolbar-btn {
            padding: 6px 10px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 4px;
            font-size: 0.85em;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .toolbar-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-1px);
        }

        .toolbar-btn.active {
            background: #667eea;
            color: white;
        }

        .toolbar-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .toolbar-separator {
            width: 1px;
            height: 24px;
            background: #ddd;
            margin: 0 3px;
        }

        .phrase-input {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 1em;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            background: #fafafa;
            transition: border-color 0.3s;
        }

        .phrase-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        .phrase-info {
            display: flex;
            gap: 15px;
            margin-top: 6px;
            font-size: 0.75em;
        }

        .phrase-info-item {
            display: flex;
            gap: 4px;
        }

        .phrase-info-label {
            font-weight: 600;
            color: #667eea;
        }

        /* STAFF NOTATION */
        .staff-section {
            flex: 1;
            overflow: auto;
            padding: 15px 20px;
            background: white;
        }

        .staff-title {
            font-weight: 600;
            color: #667eea;
            margin-bottom: 8px;
            font-size: 0.85em;
            margin-top: 12px;
        }

        .staff-title:first-child {
            margin-top: 0;
        }

        .staff-grid {
            display: inline-block;
            border: 2px solid #333;
            background: white;
            margin-bottom: 20px;
        }

        .staff-row {
            display: flex;
            height: 40px;
        }

        .beat-group {
            display: flex;
            border-right: 3px solid #667eea;
            position: relative;
        }

        .subdivision {
            width: 50px;
            height: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
            position: relative;
            font-family: 'Courier New', monospace;
            font-size: 0.95em;
            font-weight: 600;
            color: #333;
            background: white;
            cursor: text;
            gap: 2px;
        }

        .subdivision-number {
            font-size: 0.65em;
            color: #999;
            line-height: 1;
        }

        .subdivision-char {
            font-size: 0.9em;
            line-height: 1;
        }

        .subdivision.beat-end {
            border-right: 3px solid #667eea;
        }

        .subdivision.cycle-end {
            border-right: 5px solid #333;
        }

        .beat-label {
            position: absolute;
            top: -22px;
            left: 10px;
            font-size: 0.75em;
            font-weight: 600;
            color: #667eea;
            white-space: nowrap;
        }

        .footer {
            background: #f8f9fa;
            padding: 10px 20px;
            border-top: 2px solid #e9ecef;
            font-size: 0.75em;
            color: #666;
            flex-shrink: 0;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 6px 10px;
            border-radius: 4px;
            margin-top: 6px;
            border: 1px solid #f5c6cb;
            font-size: 0.8em;
        }

        @media (max-width: 1200px) {
            .sidebar {
                width: 250px;
            }

            .subdivision {
                width: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>♪ Kanakku ♪</h1>
            <div class="header-buttons">
                <select id="sruthi" class="header-select">
                    <option value="C">C</option>
                    <option value="C#">C# (Default)</option>
                    <option value="D">D</option>
                    <option value="D#">D#</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="F#">F#</option>
                    <option value="G">G</option>
                    <option value="G#">G#</option>
                    <option value="A">A</option>
                    <option value="A#">A#</option>
                    <option value="B">B</option>
                </select>
                <select id="bpmSelect" class="header-select" title="Beats Per Minute">
                    <option value="60">60 BPM</option>
                    <option value="70">70 BPM</option>
                    <option value="80" selected>80 BPM</option>
                    <option value="90">90 BPM</option>
                    <option value="100">100 BPM</option>
                    <option value="120">120 BPM</option>
                    <option value="140">140 BPM</option>
                    <option value="160">160 BPM</option>
                </select>
                <button class="header-btn" id="playBtn" title="Play notes">▶ Play</button>
                <button class="header-btn" id="renderMidiBtn" title="Render MIDI">🎹 MIDI</button>
                <button class="header-btn" id="openMidiBtn" title="Open MIDI">📂 MIDI</button>
                <button class="header-btn" id="saveBtn" title="Save phrase (Ctrl+S)">💾 Save</button>
            </div>
        </div>

        <div class="main-layout">
            <!-- LEFT SIDEBAR -->
            <div class="sidebar">
                <div class="sidebar-header">Saved Kanakkus</div>
                <div class="sidebar-search">
                    <input type="text" id="sidebarSearch" placeholder="Search...">
                </div>
                <div class="sidebar-content">
                    <div class="sidebar-index" id="sidebarIndex"></div>
                    <div class="sidebar-list" id="kanakkuList"></div>
                </div>
            </div>

            <div class="splitter" id="splitter"></div>

            <!-- MAIN CONTENT -->
            <div class="content-area">
                <!-- CONTROLS & THALAS -->
                <div class="controls-section">
                    <div class="control-item">
                        <label for="beats">Beats:</label>
                        <input type="number" id="beats" min="3" max="21" value="8">
                    </div>

                    <div class="control-item">
                        <label for="nadai">Nadai:</label>
                        <select id="nadai">
                            <option value="3">3</option>
                            <option value="4" selected>4</option>
                            <option value="5">5</option>
                            <option value="7">7</option>
                            <option value="9">9</option>
                        </select>
                    </div>

                    <div class="control-item">
                        <label for="eduppu">Eduppu:</label>
                        <input type="number" id="eduppu" min="1" value="1" style="min-width: 50px;">
                    </div>

                    <div class="control-item">
                        <label>Cycle:</label>
                        <div style="font-size: 0.8em; font-weight: bold; color: #667eea;"><span id="cycleLength">32</span></div>
                    </div>

                    <span style="font-weight: 600; color: #667eea; font-size: 0.75em; white-space: nowrap; margin-top: 16px;">Thalas:</span>
                    <a class="thala-link" data-beats="8">Adhi (8)</a>
                    <a class="thala-link" data-beats="6">Rupakam (6)</a>
                    <a class="thala-link" data-beats="5">Kanda (5)</a>
                    <a class="thala-link" data-beats="7">Misra (7)</a>

                    <div class="control-item" style="margin-left: auto;">
                        <label>Calc:</label>
                        <div style="font-size: 0.75em; font-weight: bold; color: #667eea; font-family: 'Courier New', monospace;">
                            L:<span id="phraseLength">0</span> S:<span id="startingPos">-</span> E:<span id="landingBeat">-</span>
                        </div>
                    </div>
                </div>

                <!-- PHRASE EDITOR -->
                <div class="phrase-section">
                    <div class="phrase-toolbar">
                        <button class="toolbar-btn" id="dotAboveBtn" title="Dot Above">⬆️</button>
                        <button class="toolbar-btn" id="dotBelowBtn" title="Dot Below">⬇️</button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn" id="undoBtn" title="Undo">↶</button>
                        <button class="toolbar-btn" id="redoBtn" title="Redo">↷</button>
                        <div class="toolbar-separator"></div>
                        <button class="toolbar-btn" id="clearBtn" title="Clear">Clear</button>
                        <button class="toolbar-btn" id="formatBtn" title="Format: lowercase letters, ; → ,,">Format</button>
                        <button class="toolbar-btn" id="resetBtn" title="Reset All">Reset</button>
                        <button class="toolbar-btn" id="numberingToggleBtn" title="Toggle numbering direction (Reverse/Forward)">Rev</button>
                        <button class="toolbar-btn" id="exportBtn" title="Export as Text">Export</button>
                    </div>
                    <input type="text" class="phrase-input" id="phrase" placeholder="Type: s, r, g, m, p, d, n or enter pattern" autocomplete="off" style="flex: 1;">
                    <div style="display: flex; gap: 6px;">
                        <input type="text" id="patternInput" placeholder="e.g., 52525" style="padding: 4px 6px; border: 2px solid #ddd; border-radius: 3px; font-size: 0.75em; width: 70px;">
                        <button class="toolbar-btn" id="checkCalcBtn" title="Check Calculation" style="padding: 4px 8px; font-size: 0.7em;">Check Calc</button>
                    </div>
                    <div class="phrase-info">
                        <div class="phrase-info-item">
                            <span class="phrase-info-label">Notes:</span>
                            <span id="notesEntered" style="font-weight: bold; font-size: 1.3em;">0</span>
                        </div>
                        <div class="phrase-info-item">
                            <span class="phrase-info-label">Name:</span>
                            <input type="text" id="kanakkuName" placeholder="e.g., Palavi" style="padding: 3px; font-size: 0.85em; border: 1px solid #ddd; border-radius: 3px; width: 120px;">
                        </div>
                        <div class="phrase-info-item">
                            <span class="phrase-info-label">Calc:</span>
                            <span style="font-family: 'Courier New', monospace; font-weight: bold; color: #667eea;">L:<span id="phraseLength">0</span> S:<span id="startingPos">-</span> E:<span id="landingBeat">-</span></span>
                        </div>
                    </div>
                    <div id="errorMessage"></div>
                </div>

                <!-- STAFF NOTATION -->
                <div class="staff-section">
                    <div id="staffContainer">
                        <div style="color: #999; font-style: italic;">Enter a phrase to see the staff notation</div>
                    </div>
                </div>

                <!-- MIDI DISPLAY -->
                <div class="midi-section" id="midiSection" style="display: none; margin-top: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #f9f9f9;">
                    <h3 style="margin-top: 0;">MIDI Notation</h3>
                    <div id="midiContainer" style="background: white; padding: 15px; border-radius: 4px; min-height: 200px; border: 1px solid #e9ecef;"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <p>Kanakku calculates phrase placement. Use ⬆️/⬇️ for dots. Ctrl+S to save.</p>
        </div>
    </div>

    <script>
        // DOM Elements
        const beatsInput = document.getElementById('beats');
        const nadaiInput = document.getElementById('nadai');
        const eduppuInput = document.getElementById('eduppu');
        const phraseInput = document.getElementById('phrase');
        const kanakkuNameInput = document.getElementById('kanakkuName');
        const sruthiSelect = document.getElementById('sruthi');
        const bpmSelect = document.getElementById('bpmSelect');
        const playBtn = document.getElementById('playBtn');
        const renderMidiBtn = document.getElementById('renderMidiBtn');
        const openMidiBtn = document.getElementById('openMidiBtn');
        const midiSection = document.getElementById('midiSection');
        const midiContainer = document.getElementById('midiContainer');
        const staffContainer = document.getElementById('staffContainer');
        const sidebarSearch = document.getElementById('sidebarSearch');
        const kanakkuList = document.getElementById('kanakkuList');
        const sidebarIndex = document.getElementById('sidebarIndex');
        const splitter = document.getElementById('splitter');
        const sidebar = document.querySelector('.sidebar');

        const cycleLength = document.getElementById('cycleLength');
        const eduppuDisplay = document.getElementById('eduppuDisplay');
        const phraseLengthSpan = document.getElementById('phraseLength');
        const startingPosSpan = document.getElementById('startingPos');
        const landingBeatSpan = document.getElementById('landingBeat');
        const notesEnteredSpan = document.getElementById('notesEntered');
        const errorMessageDiv = document.getElementById('errorMessage');

        const dotAboveBtn = document.getElementById('dotAboveBtn');
        const dotBelowBtn = document.getElementById('dotBelowBtn');
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const clearBtn = document.getElementById('clearBtn');
        const formatBtn = document.getElementById('formatBtn');
        const resetBtn = document.getElementById('resetBtn');
        const numberingToggleBtn = document.getElementById('numberingToggleBtn');
        const exportBtn = document.getElementById('exportBtn');
        const checkCalcBtn = document.getElementById('checkCalcBtn');
        const patternInput = document.getElementById('patternInput');
        const saveBtn = document.getElementById('saveBtn');

        // State
        let dotMode = null;
        let history = [''];
        let historyIndex = 0;
        let savedKanakkus = [];
        let currentKanakkuId = null;  // Track which kanakku is loaded
        let currentEditingKanakkuId = null;  // Track kanakku being edited
        let currentMidiData = null;  // Track current MIDI data
        let numberingDirection = 'reverse';  // 'reverse' or 'forward'

        const dotsAbove = {
            's': 'ṡ', 'S': 'Ṡ', 'r': 'ṙ', 'R': 'Ṙ', 'g': 'ġ', 'G': 'Ġ', 
            'm': 'ṁ', 'M': 'Ṁ', 'p': 'ṗ', 'P': 'Ṗ', 'd': 'ḋ', 'D': 'Ḋ',
            'n': 'ṅ', 'N': 'Ṅ', ',': '·'
        };

        const dotsBelow = {
            's': 'ṣ', 'S': 'Ṣ', 'r': 'ṛ', 'R': 'Ṛ', 'g': 'ģ', 'G': 'Ģ',
            'm': 'ṃ', 'M': 'Ṃ', 'p': 'ṕ', 'P': 'Ṕ', 'd': 'ḍ', 'D': 'Ḍ',
            'n': 'ṇ', 'N': 'Ṇ', ',': '·'
        };

        // Sidebar resizing
        let isResizing = false;
        splitter.addEventListener('mousedown', () => isResizing = true);
        document.addEventListener('mouseup', () => isResizing = false);
        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            const newWidth = e.clientX - sidebar.getBoundingClientRect().left;
            if (newWidth > 200 && newWidth < 600) {
                sidebar.style.width = newWidth + 'px';
            }
        });

        // Event Listeners
        beatsInput.addEventListener('input', () => {
            calculate();
        });

        nadaiInput.addEventListener('change', () => {
            calculate();
        });

        eduppuInput.addEventListener('input', () => {
            updateEduppuDisplay();
            calculate();
        });

        phraseInput.addEventListener('input', () => {
            const phrase = phraseInput.value;
            notesEnteredSpan.textContent = phrase.length;
            if (history[historyIndex] !== phrase) {
                history = history.slice(0, historyIndex + 1);
                history.push(phrase);
                historyIndex++;
                updateUndoRedo();
            }
            calculate();
        });

        phraseInput.addEventListener('click', () => {
            if (dotMode) {
                const cursorPos = phraseInput.selectionStart;
                if (cursorPos > 0) {
                    const phrase = phraseInput.value;
                    const charIndex = cursorPos - 1;
                    const charAtPos = phrase[charIndex];
                    
                    if (charAtPos) {
                        let newChar = charAtPos;
                        
                        if (dotMode === 'above' && dotsAbove[charAtPos]) {
                            newChar = dotsAbove[charAtPos];
                        } else if (dotMode === 'below' && dotsBelow[charAtPos]) {
                            newChar = dotsBelow[charAtPos];
                        }
                        
                        if (newChar !== charAtPos) {
                            const newPhrase = phrase.substring(0, charIndex) + newChar + phrase.substring(charIndex + 1);
                            phraseInput.value = newPhrase;
                            
                            history = history.slice(0, historyIndex + 1);
                            history.push(newPhrase);

        playBtn.addEventListener('click', async () => {
            const phrase = phraseInput.value;
            if (!phrase.trim()) {
                alert('Please enter a phrase first');
                return;
            }
            
            const sruthi = sruthiSelect.value;
            const bpm = parseInt(bpmSelect.value) || 80;
            
            // Create audio context
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // Map swaras to semitone offsets for octave 4
            // C4 = 261.63 Hz, C#4 = 277.18 Hz, D4 = 293.66 Hz, etc.
            const sruthiFrequencies = {
                'C': { baseFreq: 261.63, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'C#': { baseFreq: 277.18, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'D': { baseFreq: 293.66, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'D#': { baseFreq: 311.13, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'E': { baseFreq: 329.63, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'F': { baseFreq: 349.23, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'F#': { baseFreq: 369.99, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'G': { baseFreq: 392.00, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'G#': { baseFreq: 415.30, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'A': { baseFreq: 440.00, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'A#': { baseFreq: 466.16, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } },
                'B': { baseFreq: 493.88, notes: { 's': 0, 'r': 2, 'g': 4, 'm': 5, 'p': 7, 'd': 9, 'n': 11 } }
            };
            
            // Dot marks for octave adjustment
            // Dot above (combining diaeresis, U+0308): ̇ moves to next octave (+12 semitones)
            // Dot below (combining dot below, U+0323): ̣ moves to previous octave (-12 semitones)
            const dotAboveMarks = new Set(['\u0307', '\u0308']);  // Combining dot above, combining diaeresis
            const dotBelowMarks = new Set(['\u0323', '\u0325']);  // Combining dot below, combining ring below
            
            const sruthiInfo = sruthiFrequencies[sruthi] || sruthiFrequencies['C#'];
            const beatDuration = 60 / bpm;  // Duration of one beat in seconds
            const noteDuration = beatDuration / (parseInt(nadaiInput.value) || 4);  // Duration per note
            
            let currentTime = audioContext.currentTime;
            let oscArray = [];  // Keep references to prevent garbage collection
            
            // Function to get western note name and octave from frequency
            const getWesternNote = (freq, octave) => {
                const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
                const noteIndex = Math.round(12 * Math.log2(freq / 261.63)) % 12;  // C4 = 261.63 Hz
                const idx = noteIndex < 0 ? noteIndex + 12 : noteIndex;
                return notes[idx] + octave;
            };
            
            // Map carnatic swara names
            const swaraNames = { 's': 'Sa', 'r': 'Ri', 'g': 'Ga', 'm': 'Ma', 'p': 'Pa', 'd': 'Dha', 'n': 'Ni' };
            
            console.log(`\n=== Playing: ${phrase} ===`);
            console.log(`Sruthi: ${sruthi} | BPM: ${bpm} | Nadai: ${nadaiInput.value}`);
            console.log(`Note Duration: ${(noteDuration * 1000).toFixed(0)}ms\n`);
            
            let i = 0;
            let noteIndex = 1;
            while (i < phrase.length) {
                const char = phrase[i].toLowerCase();
                
                // Check if this is a swara (not a dot or comma)
                if (sruthiInfo.notes.hasOwnProperty(char)) {
                    // Look ahead for dot marks
                    let octaveOffset = 0;
                    let j = i + 1;
                    while (j < phrase.length) {
                        const nextChar = phrase[j];
                        if (dotAboveMarks.has(nextChar)) {
                            octaveOffset += 12;  // Dot above = one octave up
                            j++;
                        } else if (dotBelowMarks.has(nextChar)) {
                            octaveOffset -= 12;  // Dot below = one octave down
                            j++;
                        } else if (nextChar === '\u0300' || nextChar === '\u0301' || nextChar === '\u0302' || nextChar === '\u0303' || nextChar === '\u0304' || nextChar === '\u0305' || nextChar === '\u0306') {
                            // Other combining marks, skip
                            j++;
                        } else {
                            break;
                        }
                    }
                    i = j - 1;  // Move i to skip all combining marks
                    
                    // Play note
                    const semitones = sruthiInfo.notes[char] + octaveOffset;
                    const frequency = sruthiInfo.baseFreq * Math.pow(2, semitones / 12);
                    
                    // Calculate octave for display
                    const octaveNum = 4 + Math.floor((sruthiInfo.notes[char] + octaveOffset) / 12);
                    const westernNote = getWesternNote(frequency, octaveNum);
                    const swaraName = swaraNames[char];
                    
                    console.log(`${noteIndex}. ${swaraName} (${char}) | Octave: ${octaveNum} | Freq: ${frequency.toFixed(2)} Hz | ${westernNote}`);
                    
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    osc.frequency.value = frequency;
                    osc.type = 'sine';
                    
                    // Better envelope: quick attack, sustain, gentle release
                    const attackTime = Math.min(0.01, noteDuration * 0.1);
                    const releaseTime = Math.min(0.05, noteDuration * 0.2);
                    const sustainEnd = Math.max(currentTime + noteDuration - releaseTime, currentTime + attackTime);
                    
                    gain.gain.setValueAtTime(0, currentTime);
                    gain.gain.linearRampToValueAtTime(0.3, currentTime + attackTime);
                    gain.gain.setValueAtTime(0.3, sustainEnd);
                    gain.gain.linearRampToValueAtTime(0.01, currentTime + noteDuration);
                    
                    osc.start(currentTime);
                    osc.stop(currentTime + noteDuration);
                    oscArray.push(osc);  // Keep reference
                    
                    currentTime += noteDuration;
                    noteIndex++;
                    
                } else if (char === ',') {
                    // Rest - no sound
                    console.log(`${noteIndex}. Rest (,)`);
                    currentTime += noteDuration;
                    noteIndex++;
                } else {
                    // Unknown character or combining mark - skip
                }
                
                i++;
            }
        });

        function calculate() {
            const beats = parseInt(beatsInput.value) || 8;
            const nadai = parseInt(nadaiInput.value) || 4;
            const eduppu = parseInt(eduppuInput.value) || 1;
            const phrase = phraseInput.value;

            errorMessageDiv.innerHTML = '';

            const cycleLengthVal = beats * nadai;
            cycleLength.textContent = cycleLengthVal;

            updateEduppuDisplay();

            if (phrase.length === 0) {
                phraseLengthSpan.textContent = '0';
                startingPosSpan.textContent = '-';
                landingBeatSpan.textContent = '-';
                staffContainer.innerHTML = '<div style="color: #999; font-style: italic;">Enter a phrase to see the staff notation</div>';
                return;
            }

            const phraseLength = phrase.length;
            phraseLengthSpan.textContent = phraseLength;

            let startingPos = eduppu - phraseLength;
            while (startingPos <= 0) {
                startingPos += cycleLengthVal;
            }

            startingPosSpan.textContent = startingPos;

            const beatNum = Math.ceil(eduppu / nadai);
            landingBeatSpan.textContent = eduppu;

            displayStaff(phrase, beats, nadai, cycleLengthVal, startingPos, eduppu);
        }

        function displayStaff(phrase, beats, nadai, cycleLengthVal, startingPos, eduppu) {
            let html = '';

            const totalNotes = startingPos - 1 + phrase.length;
            const totalCycles = Math.ceil(totalNotes / cycleLengthVal);

            for (let cycleNum = 1; cycleNum <= totalCycles; cycleNum++) {
                html += `<div class="staff-title">Cycle ${cycleNum}</div>`;
                html += '<div class="staff-grid"><div class="staff-row" style="position: relative; margin-top: 25px;">';

                for (let beat = 1; beat <= beats; beat++) {
                    html += '<div class="beat-group">';
                    
                    if (beat === 1 && cycleNum === 1) {
                        html += `<div class="beat-label">B${beat}</div>`;
                    }

                    for (let sub = 1; sub <= nadai; sub++) {
                        const posInCycle = (beat - 1) * nadai + sub;
                        const globalPos = (cycleNum - 1) * cycleLengthVal + posInCycle;

                        let character = ',';
                        let bgColor = 'white';
                        let displayNum = null;

                        // Show numbers on first row based on direction
                        if (cycleNum === 1) {
                            if (numberingDirection === 'reverse') {
                                displayNum = cycleLengthVal - posInCycle + 1;
                            } else {
                                displayNum = posInCycle;
                            }
                        }

                        if (globalPos >= startingPos && globalPos < startingPos + phrase.length) {
                            const phraseIndex = globalPos - startingPos;
                            character = phrase[phraseIndex];
                            
                            if (phraseIndex === 0) {
                                bgColor = '#e8f5e9';
                            } else if (posInCycle === eduppu || (cycleNum > 1 && globalPos % cycleLengthVal === eduppu % cycleLengthVal)) {
                                bgColor = '#ffebee';
                            } else if (character !== ',') {
                                bgColor = '#f5f5f5';
                            }
                        }

                        let cellClass = 'subdivision';
                        if (sub === nadai) cellClass += ' beat-end';
                        if (posInCycle === cycleLengthVal) cellClass += ' cycle-end';

                        html += `<div class="${cellClass}" style="background: ${bgColor};">
                            ${displayNum ? `<div class="subdivision-number">${displayNum}</div>` : ''}
                            <div class="subdivision-char">${character}</div>
                        </div>`;
                    }

                    html += '</div>';
                }

                html += '</div></div>';
            }

            staffContainer.innerHTML = html;
        }

        // MIDI Generation Function
        function generateMidiData() {
            const phrase = phraseInput.value.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            const beats = parseInt(beatsInput.value) || 8;
            const nadai = parseInt(nadaiInput.value) || 4;
            const sruthi = sruthiSelect.value;
            const bpm = parseInt(bpmSelect.value) || 80;
            
            if (!phrase.trim()) {
                alert('Please enter a phrase first');
                return null;
            }

            // Map sruthi to MIDI base pitch (C=0, C#=1, ... B=11 in octave 4)
            const sruthiMap = {
                'C': 60, 'C#': 61, 'D': 62, 'D#': 63, 'E': 64,
                'F': 65, 'F#': 66, 'G': 67, 'G#': 68, 'A': 69,
                'A#': 70, 'B': 71
            };
            
            // Swara intervals (semitones from base note in Indian music)
            // Sa=0, Ri=2, Ga=4, Ma=5, Pa=7, Dha=9, Ni=11
            const swaraOffsets = {
                's': 0,    // Sa
                'r': 2,    // Ri
                'g': 4,    // Ga
                'm': 5,    // Ma
                'p': 7,    // Pa
                'd': 9,    // Dha
                'n': 11    // Ni
            };
            
            const baseNote = sruthiMap[sruthi] || sruthiMap['C'];
            
            // Generate MIDI events
            const notes = [];
            const beatDuration = 60 / (bpm * nadai);  // Duration in seconds for each nadai unit
            
            let currentTime = 0;
            for (let char of phrase) {
                const offset = swaraOffsets[char.toLowerCase()];
                if (offset !== undefined) {
                    const midiNote = baseNote + offset;
                    notes.push({
                        note: midiNote,
                        startTime: currentTime,
                        duration: beatDuration,
                        velocity: 100
                    });
                    currentTime += beatDuration;
                }
            }
            
            return {
                notes: notes,
                bpm: bpm,
                sruthi: sruthi,
                phrase: phrase,
                beats: beats,
                nadai: nadai
            };
        }

        // MIDI Display using SVG (simple staff notation)
        function displayMidiStaff(midiData) {
            if (!midiData) return;
            
            const container = midiContainer;
            container.innerHTML = '';
            
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '300');
            svg.setAttribute('viewBox', '0 0 1200 300');
            svg.style.border = '1px solid #ddd';
            
            // Draw staff (5 lines)
            const staffTop = 50;
            const lineSpacing = 15;
            for (let i = 0; i < 5; i++) {
                const y = staffTop + i * lineSpacing;
                const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                line.setAttribute('x1', '50');
                line.setAttribute('y1', y);
                line.setAttribute('x2', '1150');
                line.setAttribute('y2', y);
                line.setAttribute('stroke', '#999');
                line.setAttribute('stroke-width', '1');
                svg.appendChild(line);
            }
            
            // Draw treble clef (simplified)
            const clef = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            clef.setAttribute('x', '20');
            clef.setAttribute('y', '100');
            clef.setAttribute('font-size', '40');
            clef.setAttribute('fill', '#000');
            clef.textContent = '𝄞';
            svg.appendChild(clef);
            
            // Add metadata
            const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            title.setAttribute('x', '50');
            title.setAttribute('y', '30');
            title.setAttribute('font-size', '14');
            title.setAttribute('fill', '#333');
            title.textContent = `Sruthi: ${midiData.sruthi} | BPM: ${midiData.bpm} | Beats: ${midiData.beats} | Nadai: ${midiData.nadai}`;
            svg.appendChild(title);
            
            // Draw notes
            const notes = midiData.notes;
            const noteWidth = 900 / notes.length;
            const staffCenter = staffTop + 30;
            
            // MIDI note to staff position (treble clef: E4=71 is on line)
            // Higher notes go up, lower notes go down
            function midiToYPos(midiNote) {
                // E4=71 should be at center, each semitone is 1 line/space
                const distanceFromE4 = midiNote - 71;
                return staffCenter - (distanceFromE4 * lineSpacing / 2);
            }
            
            notes.forEach((note, index) => {
                const x = 100 + index * noteWidth;
                const y = midiToYPos(note.note);
                
                // Draw note head
                const noteHead = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                noteHead.setAttribute('cx', x);
                noteHead.setAttribute('cy', y);
                noteHead.setAttribute('r', '6');
                noteHead.setAttribute('fill', '#000');
                svg.appendChild(noteHead);
                
                // Draw stem
                const stem = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                stem.setAttribute('x1', x + 6);
                stem.setAttribute('y1', y);
                stem.setAttribute('x2', x + 6);
                stem.setAttribute('y2', y - 35);
                stem.setAttribute('stroke', '#000');
                stem.setAttribute('stroke-width', '2');
                svg.appendChild(stem);
            });
            
            container.appendChild(svg);
            midiSection.style.display = 'block';
        }

        // Render MIDI button handler
        renderMidiBtn.addEventListener('click', () => {
            const midiData = generateMidiData();
            if (midiData) {
                // Store MIDI data in current kanakku
                currentMidiData = midiData;
                displayMidiStaff(midiData);
                
                // Also save to current kanakku if editing
                if (currentEditingKanakkuId) {
                    // Will be saved when user clicks Save button
                    console.log('MIDI generated and ready to save');
                } else {
                    // Create a temporary kanakku entry
                    currentEditingKanakkuId = Date.now().toString();
                }
                alert('MIDI generated! Click Save to persist.');
            }
        });

        // Open MIDI button handler (display existing MIDI from saved kanakku)
        openMidiBtn.addEventListener('click', () => {
            if (currentMidiData) {
                displayMidiStaff(currentMidiData);
            } else {
                alert('No MIDI data available. Generate MIDI first using the Render button.');
            }
        });

        // Initialize
        updateUndoRedo();
        updateEduppuDisplay();
        sruthiSelect.value = 'C#';
        loadSavedKanakkus();
    </script>
</body>
</html>
