        function calculateTotalCells() {
            return parseInt(document.getElementById('beats').value || 8) * parseInt(document.getElementById('nadai').value || 4);
        }

        /**
         * Validates that each Line: has correct number of notes
         * Returns map of { lineNumber: { expected, actual, isValid } }
         */
        function validateLineNoteCounts(songs, totalCells) {
            const lineIssuesMap = {};
            
            songs.sections.forEach((section, sIdx) => {
                // Group atoms by lineNumber
                const atomsByLine = {};
                section.rows?.forEach((row) => {
                    if (row.type === 'swara' && row.atoms) {
                        row.atoms.forEach((atom) => {
                            const lineNum = atom.lineNumber;
                            if (lineNum !== undefined) {
                                if (!atomsByLine[lineNum]) {
                                    atomsByLine[lineNum] = [];
                                }
                                // Only count non-marker atoms for note count
                                if (atom.text !== '*' && !isSeparatorCharacter(atom.text)) {
                                    atomsByLine[lineNum].push(atom);
                                }
                            }
                        });
                    }
                });
                
                // Validate each line
                Object.keys(atomsByLine).forEach((lineNum) => {
                    const actualCount = atomsByLine[lineNum].length;
                    const expectedCount = totalCells;
                    const isValid = actualCount === expectedCount;
                    
                    lineIssuesMap[lineNum] = {
                        expected: expectedCount,
                        actual: actualCount,
                        isValid: isValid,
                        sectionIdx: sIdx
                    };
                    
                    if (!isValid) {
                        console.warn(`⚠️  Line ${lineNum}: Expected ${expectedCount} notes, found ${actualCount} - MISMATCH!`);
                    }
                });
            });
            
            return lineIssuesMap;
        }

        /**
         * FORMATTING ORCHESTRATOR - Redistributes parsed swaras into grid cells
         * 
         * REFERENCE DATA SECTIONS USED: None directly
         * (Keywords already parsed by parseAndRender; this just reformats cells)
         * 
         * IMPORTANT: This function does NOT parse keywords or reference-data.
         * It only redistributes existing swara/lyric atoms into rows of totalCells.
         * Keywords are ALREADY identified by parseAndRender() before formatting.
         * 
         * PROCESS:
         * 1. Get eduppu (start beat position)
         * 2. Calculate total cells from eduppu and nadai
         * 3. Call formatSection for each parsed section
         * 4. Enrich with MIDI/frequency data
         * 5. Re-render the song
         */
        async function applyFormatting() {
            // Reset counter before re-tokenizing during format
            globalBraceGroupCounter = 0;
            
            console.log('🔧 applyFormatting() started');
            const eduppuPos = parseInt(document.getElementById('eduppu').value);
            const totalCells = calculateTotalCells();
            
            console.log(`   Eduppu: ${eduppuPos}, Total cells: ${totalCells}`);

            if (isNaN(eduppuPos) || eduppuPos < 1 || eduppuPos > totalCells) {
                alert(`Eduppu must be between 1 and ${totalCells} (beats × nadai)`);
                return;
            }

            currentSong.eduppu = eduppuPos;
            
            // VALIDATE: Check that each Line: has correct number of notes (beats × nadai)
            const lineIssuesMap = validateLineNoteCounts(currentSong, totalCells);
            currentSong.lineValidation = lineIssuesMap;  // Store for rendering
            
            // Mark atoms from invalid lines
            currentSong.sections.forEach((section) => {
                section.rows?.forEach((row) => {
                    if (row.type === 'swara' && row.atoms) {
                        row.atoms.forEach((atom) => {
                            const lineNum = atom.lineNumber;
                            if (lineNum !== undefined && lineIssuesMap[lineNum] && !lineIssuesMap[lineNum].isValid) {
                                atom.hasInvalidLineCount = true;  // Flag for highlighting
                            }
                        });
                    }
                });
            });

            // Format each section
            currentSong.sections.forEach((section, sIdx) => {
                console.log(`   📍 Formatting section ${sIdx}: "${section.title}"`);
                formatSection(section, sIdx, totalCells, eduppuPos);
            });

            // Enrich song with frequency/MIDI data after formatting (now async)
            await enrichSongWithFrequencyData(currentSong);

            gridIsDirty = true;
            console.log('🎨 Calling renderSong() after format...');
            renderSong();
            closeFormatModal();
            showToast('✅ Notation formatted & enriched with frequency/MIDI data (from sruthi_midi_mapping.json)!');
        }


        /**
         * SECTION REFORMATTER - Redistributes atoms into grid cells for ONE section
         * 
         * REFERENCE DATA SECTIONS USED: None directly
         * (This function works on already-parsed data from parseAndRender)
         * 
         * IMPORTANT: NO HARDCODING of keywords here
         * Keywords are already parsed and section type stored in section.title
         * This function only handles cell redistribution and brace group preservation
         * 
         * ALGORITHM:
         * 1. Flatten swara/lyric pairs preserving brace group metadata
         * 2. Combine braced atoms (same groupId) into single atoms
         * 3. Redistribute into rows of totalCells each
         * 4. Preserve brace grouping and eduppu marking across reflow
         * 
         * NO MUTATION of section.title or keywords - those are set by parseAndRender()
         */
        function formatSection(section, sectionIdx, totalCells, eduppuPos) {
            if (!section.rows || section.rows.length === 0) return;

            const swaraLyricPairs = [];
            for (let i = 0; i < section.rows.length; i++) {
                if (section.rows[i].type === 'swara') {
                    const swaraRow = section.rows[i];
                    const lyricRow = section.rows.find(r => r.type === 'lyric' && r.parentSwaraId === swaraRow.id);
                    swaraLyricPairs.push({ swara: swaraRow, lyric: lyricRow });
                }
            }

            // Flatten all swaras and lyrics together
            // Preserves brace grouping and all musical notation (commas, etc.)
            let allSwaras = [];
            let allLyrics = [];
            let eduppuMarkPos = -1; // Position of eduppu in the flattened array

            for (const pair of swaraLyricPairs) {
                if (pair.swara && pair.swara.atoms) {
                    for (let atomIdx = 0; atomIdx < pair.swara.atoms.length; atomIdx++) {
                        const atom = pair.swara.atoms[atomIdx];
                        
                        if (atom.text === '*') {
                            eduppuMarkPos = allSwaras.length; // Track eduppu position
                        } else if (!isSeparatorCharacter(atom.text) && atom.text !== '*' && !isGroupingSymbol(atom.text)) {
                            // Add swara - PRESERVE ALL PROPERTIES including brace grouping and validation flags
                            const swaraObj = {
                                text: atom.text,
                                index: atom.index || 0
                            };
                            // Preserve brace group properties
                            if (atom.speed !== undefined) swaraObj.speed = atom.speed;
                            if (atom.groupId !== undefined) swaraObj.groupId = atom.groupId;
                            if (atom.isBraceChild !== undefined) swaraObj.isBraceChild = atom.isBraceChild;
                            // Preserve validation flags and line tracking
                            if (atom.hasInvalidLineCount !== undefined) swaraObj.hasInvalidLineCount = atom.hasInvalidLineCount;
                            if (atom.lineNumber !== undefined) swaraObj.lineNumber = atom.lineNumber;
                            allSwaras.push(swaraObj);
                            
                            // Add corresponding lyric if it exists
                            let lyricAtom = '';
                            if (pair.lyric && pair.lyric.atoms && pair.lyric.atoms[atomIdx]) {
                                lyricAtom = pair.lyric.atoms[atomIdx];
                            }
                            allLyrics.push(lyricAtom || '');
                        }
                    }
                }
            }

            // If no eduppu marked yet, use the provided eduppu position
            if (eduppuMarkPos === -1) {
                eduppuMarkPos = eduppuPos - 1; // Convert to 0-indexed
            }

            // COMBINE ATOMS WITH SAME groupId INTO SINGLE ATOM
            const combinedSwaras = [];
            const combinedLyrics = [];
            let adjustedEduppuPos = eduppuMarkPos;
            
            for (let i = 0; i < allSwaras.length; i++) {
                const currentAtom = allSwaras[i];
                
                // Check if this atom has a groupId and if the next atom has the same groupId
                if (currentAtom.groupId && i + 1 < allSwaras.length && allSwaras[i + 1].groupId === currentAtom.groupId) {
                    // Start combining with same groupId
                    let combinedText = currentAtom.text;
                    let combinedLyric = allLyrics[i] || '';
                    let j = i + 1;
                    let hasEduppu = false;
                    
                    // Check if eduppu mark is in this group
                    for (let k = i; k < allSwaras.length && allSwaras[k].groupId === currentAtom.groupId; k++) {
                        if (k === eduppuMarkPos) {
                            hasEduppu = true;
                            adjustedEduppuPos = combinedSwaras.length;
                        }
                    }
                    
                    while (j < allSwaras.length && allSwaras[j].groupId === currentAtom.groupId) {
                        combinedText += allSwaras[j].text;
                        combinedLyric += (allLyrics[j] || '');
                        j++;
                    }
                    
                    // Create combined atom
                    const combinedAtom = {
                        text: combinedText,
                        index: currentAtom.index,
                        speed: currentAtom.speed,
                        groupId: currentAtom.groupId,
                        isBraceChild: currentAtom.isBraceChild
                    };
                    // Preserve validation flags
                    if (currentAtom.hasInvalidLineCount) combinedAtom.hasInvalidLineCount = currentAtom.hasInvalidLineCount;
                    if (currentAtom.lineNumber !== undefined) combinedAtom.lineNumber = currentAtom.lineNumber;
                    combinedSwaras.push(combinedAtom);
                    combinedLyrics.push(combinedLyric);
                    
                    console.log(`✅ Combined brace group ${currentAtom.groupId}: "${combinedText}"`);
                    
                    // Skip the atoms we just combined
                    i = j - 1;
                } else {
                    // Regular atom, just add it
                    combinedSwaras.push(currentAtom);
                    combinedLyrics.push(allLyrics[i] || '');
                    
                    // Adjust eduppu position for atoms not in a combined group
                    if (i === eduppuMarkPos) {
                        adjustedEduppuPos = combinedSwaras.length - 1;
                    }
                }
            }
            
            // Use combined arrays
            const finalSwaras = combinedSwaras;
            const finalLyrics = combinedLyrics;

            // Redistribute into rows with totalCells per row
            const newRows = [];
            const newRowId = 'section-' + sectionIdx + '-row-';
            let currentRowIdx = 0;
            let cellsInCurrentRow = 0;
            let currentSwaraRow = null;
            let currentLyricRow = null;

            for (let i = 0; i < finalSwaras.length; i++) {
                if (cellsInCurrentRow === 0) {
                    // Start new swara row
                    currentSwaraRow = {
                        id: newRowId + currentRowIdx + '-swara',
                        type: 'swara',
                        content: '',
                        atoms: []
                    };
                    newRows.push(currentSwaraRow);

                    // Create corresponding lyric row
                    currentLyricRow = {
                        id: newRowId + currentRowIdx + '-lyric',
                        type: 'lyric',
                        content: '',
                        atoms: [],
                        parentSwaraId: currentSwaraRow.id
                    };
                    newRows.push(currentLyricRow);
                }

                // Add swara to cell - PRESERVE BRACE GROUP PROPERTIES and validation flags
                const newAtom = {
                    text: finalSwaras[i].text,
                    index: i,
                    isEduppu: (i === adjustedEduppuPos)
                };
                // Only add brace properties if they exist on the source atom
                if (finalSwaras[i].speed !== undefined) newAtom.speed = finalSwaras[i].speed;
                if (finalSwaras[i].groupId !== undefined) newAtom.groupId = finalSwaras[i].groupId;
                if (finalSwaras[i].isBraceChild !== undefined) newAtom.isBraceChild = finalSwaras[i].isBraceChild;
                // Preserve validation flags and line tracking
                if (finalSwaras[i].hasInvalidLineCount !== undefined) newAtom.hasInvalidLineCount = finalSwaras[i].hasInvalidLineCount;
                if (finalSwaras[i].lineNumber !== undefined) newAtom.lineNumber = finalSwaras[i].lineNumber;
                currentSwaraRow.atoms.push(newAtom);

                // Add corresponding lyric if available
                if (i < finalLyrics.length) {
                    currentLyricRow.atoms.push(finalLyrics[i]);
                } else {
                    currentLyricRow.atoms.push('');
                }

                cellsInCurrentRow++;

                // Check if row is full
                if (cellsInCurrentRow === totalCells) {
                    cellsInCurrentRow = 0;
                    currentRowIdx++;
                }
            }

            // Update section with new formatted rows
            section.rows = newRows;
            
            // Log if brace groups exist after format
            let braceGroupCount = 0;
            newRows.forEach(row => {
                if (row.type === 'swara' && row.atoms) {
                    braceGroupCount += row.atoms.filter(a => a.isBraceChild).length;
                }
            });
            if (braceGroupCount > 0) {
                console.log(`✅ Format complete - preserved ${braceGroupCount} brace group atoms`);
            }
        }

        // --- AUDIO PLAYBACK FUNCTIONS ---

        // Cache for sruthi_midi_mapping.json
        let sruthiMidiMappingCache = null;

        // Load sruthi_midi_mapping.json and cache it
        async function loadSruthiMidiMapping() {
            if (sruthiMidiMappingCache) {
                return sruthiMidiMappingCache;
            }
            try {
                const response = await fetch('sruthi_midi_mapping.json');
                if (!response.ok) throw new Error(`Failed to load mapping: ${response.status}`);
                const data = await response.json();
                sruthiMidiMappingCache = data;
                console.log(`📊 Loaded sruthi_midi_mapping.json (${data.length} entries)`);
                return data;
            } catch (error) {
                console.error('❌ Error loading sruthi_midi_mapping.json:', error);
                return null;
            }
        }

        // Build lookup table from sruthi_midi_mapping.json data
        function buildLookupFromMapping(mappingData, sruthi) {
            const lookup = {};
            if (!mappingData) return lookup;

            for (const entry of mappingData) {
                if (entry.Sruthi === sruthi) {
                    // Normalize the note key (uppercase) and normalize Unicode
                    const noteKey = entry.Note.toUpperCase().normalize('NFC');
                    lookup[noteKey] = {
                        note: entry.Note,
                        semitones: 0,  // Not used when using external mapping
                        midiNumber: entry.MIDI,
                        frequency: entry['Frequency (Hz)'],
                        westernNote: entry['Western Note'],
                        octave: entry.Octave
                    };
                }
            }
            return lookup;
        }

        // Sruthi to base frequency mapping (in Hz) - kept for fallback
        const SRUTHI_FREQUENCIES = {
            'C': 261.63,    // C4
            'C#': 277.18,   // C#4
            'D': 293.66,    // D4
            'D#': 311.13,   // D#4
            'E': 329.63,    // E4
            'F': 349.23,    // F4
            'F#': 369.99,   // F#4
            'G': 392.00,    // G4
            'G#': 415.30,   // G#4
            'A': 440.00,    // A4
            'A#': 466.16,   // A#4
            'B': 493.88     // B4
        };

        // Note offsets from Sa (in semitones)
        const NOTE_SEMITONES = {
            // Lower octave (dots below - C3)
            'Ṣ': -12, // Lower Sa
            'Ṛ': -11, // Lower Ri3
            'G̣': -8,  // Lower Ga3
            'Ṃ': -7,  // Lower Ma1
            'P̣': -5,  // Lower Pa
            'Ḍ': -3,  // Lower Dha2
            'Ṇ': -2,  // Lower Nishada3
            
            // Plain notes (C4)
            'S': 0,   // Sa
            'R1': 1,  // Ri1
            'R2': 2,  // Ri2 / G1
            'R3': 3,  // Ri3 / G2
            'G3': 4,  // Ga3
            'M1': 5,  // Ma1
            'M2': 6,  // Ma2
            'P': 7,   // Pa
            'D1': 8,  // Dha1 / N1
            'D2': 9,  // Dha2 / N2
            'D3': 10, // Dha3 / N3
            'N1': 8,  // Nishada1 (same as D1)
            'N2': 9,  // Nishada2 (same as D2)
            'N3': 10, // Nishada3 (same as D3)
            
            // Upper octave (dots above - C5)
            'Ṡ': 12,  // Upper Sa
            'Ṙ': 13,  // Upper Ri3
            'Ġ': 16,  // Upper Ga3
            'Ṁ': 17,  // Upper Ma1
            'Ṗ': 19,  // Upper Pa
            'Ḋ': 21,  // Upper Dha2
            'Ṅ': 22   // Upper Nishada3
        };

        // Generate comprehensive sruthi-based lookup table for all notes
        function buildSruthibaseLookupTable(sruthi) {
            const lookup = {};
            const sruthiOffsets = {
                'C': 0, 'C#': 1, 'Db': 1,
                'D': 2, 'D#': 3, 'Eb': 3,
                'E': 4, 'E#': 5, 'Fb': 4,
                'F': 5, 'F#': 6, 'Gb': 6,
                'G': 7, 'G#': 8, 'Ab': 8,
                'A': 9, 'A#': 10, 'Bb': 10,
                'B': 11, 'B#': 0, 'Cb': 11
            };

            const baseC = 60;
            const baseSruthi = SRUTHI_FREQUENCIES[sruthi] || SRUTHI_FREQUENCIES['C'];
            const sruthiOffset = sruthiOffsets[sruthi] || 0;

            // All Carnatic notes including dotted variants
            const carnatic_notes = [
                // Plain notes
                'S', 'R1', 'R2', 'R3', 'G1', 'G2', 'G3', 'M1', 'M2', 'P', 'D1', 'D2', 'D3', 'N1', 'N2', 'N3',
                // Dotted below (lower octave C3)
                'Ṣ', 'Ṛ', 'G̣', 'Ṃ', 'P̣', 'Ḍ', 'Ṇ',
                // Dotted above (upper octave C5)
                'Ṡ', 'Ṙ', 'Ġ', 'Ṁ', 'Ṗ', 'Ḋ', 'Ṅ'
            ];

            for (const note of carnatic_notes) {
                const semitones = NOTE_SEMITONES[note] || 0;
                const frequency = baseSruthi * Math.pow(2, semitones / 12);
                const midiNumber = baseC + semitones + sruthiOffset;

                lookup[note] = {
                    note: note,
                    semitones: semitones,
                    midiNumber: midiNumber,
                    frequency: Math.round(frequency * 100) / 100
                };
            }

            return lookup;
        }

        // Map semitone offset to Western note name
        function semitoneToWesternNote(semitoneOffset) {
            const notes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
            const normalized = ((semitoneOffset % 12) + 12) % 12;
            return notes[normalized];
        }

        // Get semitone offset for a sruthi note from C
        function getSruthiSemitoneOffset(sruthiNote) {
            const sruthiOffsets = {
                'C': 0, 'C#': 1, 'Db': 1,
                'D': 2, 'D#': 3, 'Eb': 3,
                'E': 4,
                'F': 5, 'F#': 6, 'Gb': 6,
                'G': 7, 'G#': 8, 'Ab': 8,
                'A': 9, 'A#': 10, 'Bb': 10,
                'B': 11
            };
            return sruthiOffsets[sruthiNote] || 0;
        }

        // Strip diacritical marks (dots, underlines, etc.) from notes
        // E.g., "Ṙ" → "R", "Ṡ" → "S", "Ġ" → "G"
        function stripDiacritics(text) {
            try {
                return text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
            } catch (e) {
                return text;
            }
        }

        // Check if a character has diacritical marks (dots, underlines, etc.)
        // Returns the dotted variant if it exists in NOTE_SEMITONES, otherwise null
        function getDottedVariant(char) {
            // Get the base character
            const stripped = stripDiacritics(char);
            
            // Try the original character first (might be a dotted variant)
            // Check both uppercase and lowercase versions
            const charUpper = char.toUpperCase();
            const charLower = char.toLowerCase();
            
            if (char !== stripped && (NOTE_SEMITONES[charUpper] || NOTE_SEMITONES[charLower])) {
                return charUpper;  // Return uppercase (canonical form)
            }
            
            return null;
        }

        // Convert a base note character to its dotted (upper) variant
        // E.g., 'R' -> 'Ṙ', 'G' -> 'Ġ', 'M' -> 'Ṁ', etc.
        const DOTTED_MAPPING = {
            'S': 'Ṡ',
            'R': 'Ṙ',
            'G': 'Ġ',
            'M': 'Ṁ',
            'P': 'Ṗ',
            'D': 'Ḋ',
            'N': 'Ṅ'
        };

        function getUpperDottedVariant(baseNote) {
            const upper = baseNote.toUpperCase();
            return DOTTED_MAPPING[upper] || null;
        }

        // Extract note variants used in ragaswara (e.g., "r2 g3 m1 d2 n3" -> {r:"r2", g:"g3", m:"m1", d:"d2", n:"n3"})
        function extractRagaswaraVariants(ragaswaraStr) {
            const variants = {};
            const notes = (ragaswaraStr || '').split(/\s+/).filter(n => n);
            for (const note of notes) {
                const baseNote = note.toLowerCase().charAt(0);  // r, g, m, d, n, s, p
                if (!variants[baseNote]) {
                    variants[baseNote] = note.toLowerCase();  // Store first occurrence, e.g., r2, g3, etc.
                }
            }
            return variants;
        }

        // ===== ARRAY ENRICHMENT HELPER FUNCTIONS =====
        function parseAtomCharacters(atomText) {
            const chars = [];
            let i = 0;
            const text = atomText || '';
            
            while (i < text.length) {
                // Check for rest characters first
                if (isRestCharacter(text[i])) {
                    i++;
                } else if (isValidNoteCharacter(text[i])) {
                    // Start of a note - may have numeric suffix or combining mark
                    let noteChars = text[i];
                    i++;
                    
                    // Collect any numeric suffixes (1, 2, 3, ¹, ², ³)
                    while (i < text.length && /[0-9¹²³]/.test(text[i])) {
                        noteChars += text[i];
                        i++;
                    }
                    
                    // Collect any combining diacritical marks (unicode 0300-036F)
                    while (i < text.length && /[\u0300-\u036F]/.test(text[i])) {
                        noteChars += text[i];
                        i++;
                    }
                    
                    chars.push(noteChars);
                } else if (['-', '*', '|', '\\', '/', '.', ' '].includes(text[i])) {
                    // Skip separators and markers
                    i++;
                } else {
                    // Unknown character - skip
                    i++;
                }
            }
            return chars;
        }
        
        function getCharacterRagaswara(noteChar, variantMap) {
            const baseNote = noteChar.toLowerCase().charAt(0);
            const stripped = stripDiacritics(baseNote);
            const numericMatch = noteChar.match(/\d/);
            
            if (numericMatch) {
                return noteChar.toLowerCase().normalize('NFC');
            }
            
            const selected = variantMap[stripped] || variantMap[baseNote] || baseNote.toUpperCase();
            return selected.toLowerCase().normalize('NFC');
        }
        
        function getCharacterMIDI(noteChar, sruthiLookup, variantMap) {
            const ragaswara = getCharacterRagaswara(noteChar, variantMap);
            const normalized = ragaswara.toUpperCase().normalize('NFC');
            
            if (sruthiLookup[normalized]) {
                return sruthiLookup[normalized].midiNumber;
            }
            return null;
        }
        
        function enrichAtomToArrays(atom, sruthiLookup, variantMap) {
            const text = atom.text || '';
            
            if (!text || [',', '-', '*'].includes(text)) {
                return { midiNumber: [0], ragaswaraEquivalent: ['rest'], frequency: [0] };
            }
            
            const chars = parseAtomCharacters(text);
            if (chars.length === 0) {
                return { midiNumber: [0], ragaswaraEquivalent: ['rest'], frequency: [0] };
            }
            
            const midiNumbers = [];
            const ragaswaras = [];
            const frequencies = [];
            
            for (let char of chars) {
                if ([',', '-', '*', '|', '\\', '/', '.', ' '].includes(char)) {
                    midiNumbers.push(0);
                    ragaswaras.push('rest');
                    frequencies.push(0);
                } else {
                    const midi = getCharacterMIDI(char, sruthiLookup, variantMap);
                    const raga = getCharacterRagaswara(char, variantMap);
                    
                    if (midi !== null) {
                        midiNumbers.push(midi);
                        ragaswaras.push(raga);
                        const normalized = raga.toUpperCase().normalize('NFC');
                        const freq = sruthiLookup[normalized]?.frequency || 0;
                        frequencies.push(freq);
                    }
                }
            }
            
            return { midiNumber: midiNumbers, ragaswaraEquivalent: ragaswaras, frequency: frequencies };
        }

        // Enrich song with frequency/MIDI data from sruthi_midi_mapping.json
        async function enrichSongWithFrequencyData(song) {
            const sruthi = document.getElementById('sruthi').value || 'C';
            
            // Load external mapping
            const mappingData = await loadSruthiMidiMapping();
            const sruthiLookup = mappingData ? buildLookupFromMapping(mappingData, sruthi) : buildSruthibaseLookupTable(sruthi);
            
            // Read variant selections from UI
            const variantMap = {
                'r': document.getElementById('r-variant').value || 'R2',
                'g': document.getElementById('g-variant').value || 'G3',
                'm': document.getElementById('m-variant').value || 'M1',
                'd': document.getElementById('d-variant').value || 'D2',
                'n': document.getElementById('n-variant').value || 'N3',
                'p': 'P',
                's': 'S'
            };

            const sruthiSemitoneOffset = getSruthiSemitoneOffset(sruthi);

            console.log(`🎵 ===== ENRICHMENT STARTED =====`);
            console.log(`🎵 Target: ${song.name || 'Unknown'}`);
            console.log(`🎵 Sruthi: ${sruthi}`);
            console.log(`🎵 Using mapping: ${mappingData ? 'sruthi_midi_mapping.json' : 'fallback calculations'}`);
            console.log(`🎵 Variant Map:`, variantMap);

            // Add sruthi lookup table as metadata
            if (!song._metadata) song._metadata = {};
            song._metadata.sruthiLookupTable = {};
            song._metadata.sruthiLookupTable[sruthi] = sruthiLookup;

            let totalCells = 0;
            let totalNotes = 0;
            let enrichedNotes = 0;
            let restCells = 0;

            for (let sIdx = 0; sIdx < (song.sections || []).length; sIdx++) {
                const section = song.sections[sIdx];
                
                // Add section name/title for reference
                if (section.title && !section.sectionName) {
                    section.sectionName = section.title;
                }

                for (let rIdx = 0; rIdx < (section.rows || []).length; rIdx++) {
                    const row = section.rows[rIdx];
                    if (row.type !== 'swara' || !row.atoms) continue;

                    for (let aIdx = 0; aIdx < row.atoms.length; aIdx++) {
                        const atom = row.atoms[aIdx];
                        totalCells++;
                        
                        // Check if this is a rest (silence)
                        const isRest = !atom.text || atom.text === ',' || atom.text === '-' || atom.text === '*';

                        if (isRest) {
                            // Rest cell: mark with isRest flag, set frequency/MIDI for playback
                            const restFrequency = SRUTHI_FREQUENCIES[sruthi] || SRUTHI_FREQUENCIES['C'];
                            atom.frequency = Math.round(restFrequency * 100) / 100;
                            atom.midiNumber = 60 + sruthiSemitoneOffset;
                            atom.isRest = true;
                            atom.sruthi = sruthi;
                            restCells++;
                            
                            // Remove ragaswaraEquivalent from rests if they exist
                            delete atom.ragaswaraEquivalent;
                            delete atom.sruthiNoteEquivalent;
                            
                            console.log(`  🔇 [${totalCells}] "${atom.text || '-'}": REST`);
                        } else {
                            // Actual note: determine variant and enrich
                            totalNotes++;
                            let noteUsed = atom.text.toLowerCase();
                            
                            // Determine note variant to lookup
                            let lookupNote = null;

                            // Priority 1: If atom already has ragaswaraEquivalent AND atom.text hasn't changed,
                            // use it as-is. But if atom.text has a numeric suffix that differs from the enrichment,
                            // it means the user manually edited the cell - recalculate.
                            if (atom.ragaswaraEquivalent) {
                                // Check if the current text exactly matches the enrichment (case-insensitive)
                                // If they match, reuse the enrichment. If they differ, recalculate.
                                const textLower = atom.text.toLowerCase();
                                const enrichLower = atom.ragaswaraEquivalent.toLowerCase();
                                
                                if (textLower === enrichLower) {
                                    // Text hasn't changed from the enrichment, reuse it
                                    lookupNote = atom.ragaswaraEquivalent.toUpperCase();
                                    console.log(`  📌 [${totalCells}] "${atom.text}": UNCHANGED OVERRIDE → ${lookupNote}`);
                                } else {
                                    // Text has changed from enrichment - user edited (e.g., N2→N3)
                                    // Force recalculation
                                    lookupNote = null;
                                    console.log(`  ✏️  [${totalCells}] "${atom.text}": EDITED (was ${atom.ragaswaraEquivalent}) - recalculating`);
                                }
                            } else {
                                // Extract note characters from atom (handles multi-char like "MD", ",M", "G,", ",Ṙ")
                                // First check for dotted variants, then fall back to plain notes
                                let notesInAtom = [];
                                for (let char of noteUsed) {
                                    const stripped = stripDiacritics(char);
                                    
                                    // Keep only note characters (not commas, dashes, spaces, or numbers)
                                    // Numbers are handled separately as part of numeric suffixes (e.g., N3)
                                    if (!/^[,\-*\s0-9]$/.test(stripped)) {
                                        // Priority: Check if original char is a dotted variant first
                                        const dottedVariant = getDottedVariant(char);
                                        if (dottedVariant) {
                                            // It's a dotted variant like Ṡ, Ṛ, G̣, etc.
                                            notesInAtom.push(dottedVariant.toUpperCase());
                                        } else {
                                            // Plain note - add with uppercase
                                            notesInAtom.push(stripped.toUpperCase());
                                        }
                                    }
                                }

                                if (notesInAtom.length === 0) {
                                    console.warn(`  ❌ [${totalCells}] "${atom.text}": NO NOTES EXTRACTED`);
                                } else {
                                    const firstNote = notesInAtom[0];  // Get first actual note from atom
                                    
                                    // Check if it's an explicit variant with numeric suffix (R1, R2, G3, M1, etc.)
                                    // or a dotted variant (Ṡ, Ṛ, G̣, etc.)
                                    // IMPORTANT: Check BOTH firstNote and atom.text for numeric suffix
                                    // because if numbers are excluded from parsing, they won't be in firstNote
                                    const hasNumericSuffix = /\d/.test(firstNote) || /\d/.test(atom.text);
                                    const isDottedVariant = firstNote !== stripDiacritics(firstNote);
                                    
                                    if ((!isDottedVariant || hasNumericSuffix) && sruthiLookup[firstNote]) {
                                        // Explicit variant like R2, G3, M1, or dotted variant WITH suffix like Ṙ2, Ġ3
                                        // (but NOT standalone dotted like Ṙ or Ġ without suffix)
                                        lookupNote = firstNote;
                                        const variantType = isDottedVariant ? 'DOTTED_SUFFIXED' : 'EXPLICIT';
                                        console.log(`  ✍️  [${totalCells}] "${atom.text}": ${variantType} → ${lookupNote}`);
                                    } else if (hasNumericSuffix && atom.text !== firstNote && sruthiLookup[atom.text.toUpperCase()]) {
                                        // User provided explicit numeric suffix in atom.text (e.g., "N3", "R2", "G3")
                                        // Try to use the full text as lookup
                                        lookupNote = atom.text.toUpperCase();
                                        console.log(`  ✍️  [${totalCells}] "${atom.text}": EXPLICIT OVERRIDE → ${lookupNote}`);
                                    } else if (isDottedVariant && !hasNumericSuffix) {
                                        // Dotted variant WITHOUT numeric suffix (e.g., just "Ṙ", not "Ṙ2")
                                        // Get the base character and find its dotted equivalent with the selected variant suffix
                                        const baseCharStripped = stripDiacritics(firstNote);
                                        const baseNoteLower = baseCharStripped.toLowerCase();
                                        const selectedVariant = variantMap[baseNoteLower];  // e.g., "r2" -> variantMap['r'] = "R2"
                                        
                                        if (selectedVariant) {
                                            // Create the dotted version with variant suffix
                                            // E.g., if selectedVariant is "R2", create "Ṙ2"
                                            const variantNum = selectedVariant.match(/\d/)?.[0] || '';  // Extract number like "2" from "R2"
                                            const dotted = getUpperDottedVariant(baseCharStripped);  // Convert 'R' -> 'Ṙ'
                                            if (dotted) {
                                                lookupNote = (dotted + variantNum).toUpperCase().normalize('NFC');
                                                console.log(`  ✍️  [${totalCells}] "${atom.text}": DOTTED+VARIANT → ${lookupNote} (base=${baseCharStripped}, variant=${selectedVariant})`);
                                            }
                                        }
                                        
                                        if (!lookupNote) {
                                            console.warn(`  ❌ [${totalCells}] "${atom.text}": DOTTED WITHOUT VARIANT (${firstNote})`);
                                        }
                                    } else {
                                        // Use variant selector for base note (includes bare notes like R, G, M, D, N, S, P)
                                        const baseNote = firstNote.charAt(0).toLowerCase();
                                        const selectedVariant = variantMap[baseNote];
                                        if (selectedVariant && sruthiLookup[selectedVariant]) {
                                            lookupNote = selectedVariant;
                                            console.log(`  🎚️  [${totalCells}] "${atom.text}": SELECTOR (${baseNote}→${selectedVariant}) → ${lookupNote}`);
                                        } else {
                                            console.warn(`  ❌ [${totalCells}] "${atom.text}": NO MATCH (baseNote=${baseNote}, selected=${selectedVariant})`);
                                        }
                                    }
                                }
                            }

                            if (lookupNote) {
                                // Normalize the lookup key to match how it was stored
                                const normalizedLookupNote = lookupNote.toUpperCase().normalize('NFC');
                                if (sruthiLookup[normalizedLookupNote]) {
                                    const noteData = sruthiLookup[normalizedLookupNote];
                                    const westernNote = noteData.westernNote || semitoneToWesternNote(sruthiSemitoneOffset + noteData.semitones);

                                    // ENRICHMENT: Convert to array-based MIDI and ragaswara
                                    const enriched = enrichAtomToArrays(atom, sruthiLookup, variantMap);
                                    
                                    atom.frequency = enriched.frequency;
                                    atom.midiNumber = enriched.midiNumber;
                                    atom.ragaswaraEquivalent = enriched.ragaswaraEquivalent;
                                    atom.sruthiNoteEquivalent = westernNote;
                                    atom.isRest = false;
                                    atom.sruthi = sruthi;
                                    enrichedNotes++;
                                    
                                    console.log(`  ✅ [${totalCells}] "${atom.text}" → ${normalizedLookupNote}: midi=[${enriched.midiNumber.join(',')}], freq=[${enriched.frequency.map(f => f.toFixed(1)).join(',')}]Hz`);
                                } else if (!atom.ragaswaraEquivalent) {
                                    console.warn(`  ⚠️  [${totalCells}] "${atom.text}": FAILED TO ENRICH (lookupNote=${lookupNote}, normalized=${normalizedLookupNote})`);
                                }
                            } else if (!atom.ragaswaraEquivalent) {
                                console.warn(`  ⚠️  [${totalCells}] "${atom.text}": FAILED TO ENRICH`);
                                // Also enrich rests to arrays
                                const enriched = enrichAtomToArrays(atom, sruthiLookup, variantMap);
                                atom.frequency = enriched.frequency;
                                atom.midiNumber = enriched.midiNumber;
                                atom.ragaswaraEquivalent = enriched.ragaswaraEquivalent;
                                atom.isRest = true;
                                atom.sruthi = sruthi;
                            }
                        }
                    }
                }
            }

            console.log(`\n📊 ===== ENRICHMENT SUMMARY =====`);
            console.log(`📊 Total cells: ${totalCells}`);
            console.log(`📊 Total notes: ${totalNotes}`);
            console.log(`📊 Enriched notes: ${enrichedNotes}/${totalNotes}`);
            console.log(`📊 Rest cells: ${restCells}`);
            console.log(`🎵 ===== ENRICHMENT COMPLETE =====\n`);

            return song;
        }

        let audioContext = null;
        let isPlaying = false;

        function getAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }

        // Convert note name to frequency based on sruthi
        function noteToFrequency(noteName, sruthi) {
            const baseSruthi = SRUTHI_FREQUENCIES[sruthi] || SRUTHI_FREQUENCIES['C'];
            const semitones = NOTE_SEMITONES[noteName] || 0;
            const frequency = baseSruthi * Math.pow(2, semitones / 12);
            return frequency;
        }

        // Get ragaswara notes as array
        function getRagaswaraArray() {
            const ragaswaraText = (currentSong.ragaswara || '').trim();
            if (!ragaswaraText) return [];
            return ragaswaraText.split(/\s+/).map(n => n.toLowerCase());
        }

        // Detect if a cell note is an override compared to ragaswara
        function isOverrideNote(cellNote, ragaswaraIndex) {
            if (!cellNote || cellNote === ',' || cellNote === '-' || cellNote === '*') {
                return false; // Not an override
            }
            
            const ragaswaraArray = getRagaswaraArray();
            if (ragaswaraIndex >= ragaswaraArray.length) {
                return false;
            }

            const ragaswaraNote = ragaswaraArray[ragaswaraIndex];
            return cellNote.toLowerCase() !== ragaswaraNote;
        }

        // Apply override indicators to cells
        function updateOverrideIndicators() {
            const ragaswaraArray = getRagaswaraArray();
            let cellIndex = 0;

            document.querySelectorAll('.swara-cell').forEach(cell => {
                cell.classList.remove('override');
                
                const noteText = cell.textContent.trim().toLowerCase();
                const ragaswaraIndex = cellIndex % ragaswaraArray.length;

                if (isOverrideNote(noteText, ragaswaraIndex)) {
                    cell.classList.add('override');
                }
                
                cellIndex++;
            });
        }

        // Apply beat indicators based on nadai
        function updateBeatIndicators() {
            const nadai = parseInt(document.getElementById('nadai').value) || 4;
            let cellIndex = 0;

            document.querySelectorAll('.swara-cell').forEach(cell => {
                // Remove previous beat classes
                cell.classList.remove('beat-start', 'beat-mid');

                // Mark beat start positions (every nadai cells)
                if (cellIndex % nadai === 0) {
                    cell.classList.add('beat-start');
                } else {
                    // Optional: mark other beat positions with lighter indicator
                    cell.classList.add('beat-mid');
                }

                cellIndex++;
            });
        }

        // --- COPY/PASTE FUNCTIONS ---

        function selectCell(cellIndex, multiSelect = false) {
            const allCells = document.querySelectorAll('.swara-cell');
            
            if (!multiSelect) {
                // Single selection
                selectedCells = [cellIndex];
                document.querySelectorAll('.swara-cell.selected').forEach(c => c.classList.remove('selected'));
                allCells[cellIndex]?.classList.add('selected');
                selectionStart = cellIndex;
            } else {
                // Range selection
                if (selectionStart === null) {
                    selectionStart = cellIndex;
                    selectedCells = [cellIndex];
                } else {
                    const start = Math.min(selectionStart, cellIndex);
                    const end = Math.max(selectionStart, cellIndex);
                    selectedCells = [];
                    
                    document.querySelectorAll('.swara-cell.selected').forEach(c => c.classList.remove('selected'));
                    
                    for (let i = start; i <= end; i++) {
                        selectedCells.push(i);
                        allCells[i]?.classList.add('selected');
                    }
                }
            }
        }

        function clearSelection() {
            selectedCells = [];
            isSelecting = false;  // Reset drag state
            document.querySelectorAll('.swara-cell.selected').forEach(c => c.classList.remove('selected'));
            selectionStart = null;
        }

        function toggleMultiSelect() {
            multiSelectActive = !multiSelectActive;
            const btn = document.getElementById('multiSelectBtn');
            
            if (multiSelectActive) {
                btn.classList.add('active');
                showToast('Multi Select enabled - Click and drag to select, Ctrl+C to copy, Ctrl+V to paste, ESC to exit', 'info');
            } else {
                disableMultiSelect();
            }
        }

        function disableMultiSelect() {
            multiSelectActive = false;
            const btn = document.getElementById('multiSelectBtn');
            btn.classList.remove('active');
            clearSelection();
            showToast('Multi Select disabled', 'info');
        }

        function copyCells() {
            if (selectedCells.length === 0) {
                showToast('No cells selected to copy', 'warning');
                return;
            }

            const copyCount = selectedCells.length;
            const allCells = document.querySelectorAll('.swara-cell');
            const data = selectedCells.map(idx => {
                const cell = allCells[idx];
                return {
                    text: cell.textContent.trim(),
                    speed: cellSpeedMap[idx] || 1
                };
            });

            clipboardData = JSON.stringify(data);
            
            // Also copy to system clipboard (tab-separated)
            const clipboardText = data.map(d => d.text).join('\t');
            navigator.clipboard.writeText(clipboardText).catch(err => {
                console.warn('Could not copy to system clipboard:', err);
            });

            // Clear visual selection but keep clipboard data
            clearSelection();
            disableMultiSelect();  // Auto-disable multi select after copy

            showToast(`Copied ${copyCount} cells. Click destination cell and press Ctrl+V to paste.`, 'success');
        }

        function pasteCells() {
            if (selectedCells.length === 0) {
                showToast('No cells selected for paste', 'warning');
                return;
            }

            if (!clipboardData) {
                showToast('No data to paste (clipboard empty)', 'warning');
                return;
            }

            try {
                const data = JSON.parse(clipboardData);
                const allCells = document.querySelectorAll('.swara-cell');
                const startIdx = selectedCells[0];  // First selected cell
                let pasteCount = data.length;

                // If multiple cells selected, paste only up to that many
                if (selectedCells.length > 1) {
                    pasteCount = Math.min(data.length, selectedCells.length);
                }

                // Check if paste will exceed grid bounds
                if (startIdx + pasteCount > allCells.length) {
                    showToast(`Cannot paste: would exceed grid bounds (${allCells.length} cells available)`, 'warning');
                    return;
                }

                // Paste from start position onwards
                for (let i = 0; i < pasteCount; i++) {
                    let cellIdx;
                    if (selectedCells.length === 1) {
                        cellIdx = startIdx + i;  // Paste starting from first selected cell
                    } else {
                        cellIdx = selectedCells[i];  // Paste into each selected cell
                    }

                    const cell = allCells[cellIdx];
                    const loc = cellLocationMap[cellIdx];  // Get section/row/atom location

                    if (cell && data[i] && loc) {
                        cell.textContent = data[i].text;
                        
                        // Update internal state - use cellLocationMap to find correct section/row
                        const section = currentSong.sections[loc.sectionIdx];
                        const row = section?.rows[loc.rowIdx];
                        
                        if (row && row.atoms && row.atoms[loc.atomIdx]) {
                            row.atoms[loc.atomIdx].text = data[i].text;
                        }

                        // Restore speed to both visual and data structure
                        const speed = data[i].speed || 1;
                        cellSpeedMap[cellIdx] = speed;
                        
                        // Update internal atom.speed property for persistence
                        if (row && row.atoms && row.atoms[loc.atomIdx]) {
                            row.atoms[loc.atomIdx].speed = speed;
                        }
                        
                        // Apply visual speed classes
                        if (speed === 2) {
                            cell.classList.add('speed-2x');
                            cell.classList.remove('speed-3x');
                        } else if (speed === 3) {
                            cell.classList.add('speed-3x');
                            cell.classList.remove('speed-2x');
                        } else {
                            cell.classList.remove('speed-2x', 'speed-3x');
                        }
                    }
                }

                // Select pasted range for visibility
                if (selectedCells.length === 1) {
                    selectedCells = [];
                    for (let i = 0; i < pasteCount; i++) {
                        selectedCells.push(startIdx + i);
                        allCells[startIdx + i]?.classList.add('selected');
                    }
                }

                isSelecting = false;  // Reset selection mode after paste
                disableMultiSelect();  // Auto-disable multi select after paste
                gridIsDirty = true;
                updateOverrideIndicators();
                showToast(`Pasted ${pasteCount} cells`, 'success');
            } catch (err) {
                console.error('Paste error:', err);
                showToast('Paste failed', 'error');
            }
        }

        // Play notation using Web Audio API
        async function playNotation() {
            if (isPlaying) {
                stopPlayback();
                return;
            }

            if (!currentSong.sections || currentSong.sections.length === 0) {
                alert('No notation to play');
                return;
            }

            if (getRagaswaraArray().length === 0) {
                alert('Please set Raga Swara before playing');
                return;
            }

            const ctx = getAudioContext();
            const sruthi = document.getElementById('sruthi').value || 'C';
            const bpm = parseInt(document.getElementById('bpm').value) || 120;
            const nadai = parseInt(document.getElementById('nadai').value) || 4;

            // Calculate timing
            const beatDuration = (60 / bpm) * 1000; // ms per beat
            const cellDuration = beatDuration / nadai; // ms per subdivision

            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸ Stop';
            document.getElementById('playBtn').style.background = '#dc3545';

            try {
                let cellCounter = 0;

                for (const section of currentSong.sections) {
                    if (!section.rows || !isPlaying) break;

                    for (const row of section.rows) {
                        if (row.type !== 'swara' || !isPlaying) continue;

                        for (const atom of row.atoms) {
                            if (!isPlaying) break;

                            let speedMultiplier = atom.speed || 1;

                            // Highlight playing cell
                            highlightPlayingCell(cellCounter, true);

                            // Determine frequencies to play - handle both array (enriched) and scalar (legacy)
                            let frequencies = [];
                            
                            if (atom.frequency && !atom.isRest) {
                                // Handle both array (enriched) and scalar (legacy) formats
                                if (Array.isArray(atom.frequency)) {
                                    frequencies = atom.frequency.filter(f => f !== 0);
                                    console.log(`🎵 [${cellCounter}] "${atom.text}": Array enriched [${frequencies.join(', ')}]Hz`);
                                } else {
                                    frequencies = [atom.frequency];
                                    console.log(`🎵 [${cellCounter}] "${atom.text}": Scalar enriched ${atom.frequency}Hz`);
                                }
                            } else if (atom.isRest) {
                                frequencies = [];
                                console.log(`🔇 [${cellCounter}] "${atom.text}": REST (silence)`);
                            } else {
                                let cellNote = (atom.text || '').trim().toLowerCase();
                                if (cellNote === ',' || cellNote === '-' || cellNote === '*') {
                                    frequencies = [];
                                } else if (cellNote) {
                                    const freq = noteToFrequency(cellNote, sruthi);
                                    frequencies = [freq];
                                    console.log(`⚠️  [${cellCounter}] "${atom.text}": Fallback calculation ${freq}Hz`);
                                }
                            }

                            // Calculate adjusted duration based on speed
                            const adjustedDuration = cellDuration / speedMultiplier;
                            
                            // For multi-note atoms (arrays), divide duration evenly
                            const durationPerNote = adjustedDuration / Math.max(frequencies.length, 1);

                            // Play each frequency in sequence
                            if (frequencies.length > 0) {
                                for (let freq of frequencies) {
                                    if (freq > 0) {
                                        playTone(ctx, freq, durationPerNote);
                                    }
                                    await sleep(durationPerNote);
                                }
                            } else {
                                // Rest - just wait
                                await sleep(adjustedDuration);
                            }

                            highlightPlayingCell(cellCounter, false);
                            cellCounter++;
                        }
                    }
                }
            } finally {
                stopPlayback();
            }
        }

        function playTone(ctx, frequency, duration) {
            const startTime = ctx.currentTime;
            const endTime = startTime + (duration / 1000);

            const osc = ctx.createOscillator();
            const gain = ctx.createGain();

            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.frequency.value = frequency;
            osc.type = 'sine';

            // Envelope: fade in, sustain, fade out
            gain.gain.setValueAtTime(0, startTime);
            gain.gain.linearRampToValueAtTime(0.3, startTime + 0.01);
            gain.gain.setValueAtTime(0.3, endTime - 0.05);
            gain.gain.linearRampToValueAtTime(0, endTime);

            osc.start(startTime);
            osc.stop(endTime);
        }

        function highlightPlayingCell(cellIndex, isPlaying) {
            const cells = document.querySelectorAll('.swara-cell');
            cells.forEach((cell, idx) => {
                if (idx === cellIndex) {
                    if (isPlaying) {
                        cell.classList.add('playing');
                    } else {
                        cell.classList.remove('playing');
                    }
                }
            });
        }

        function stopPlayback() {
            isPlaying = false;
            document.getElementById('playBtn').textContent = '🎵 Play';
            document.getElementById('playBtn').style.background = '';
            document.querySelectorAll('.swara-cell.playing').forEach(cell => {
                cell.classList.remove('playing');
            });
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Update indicators when ragaswara changes
        document.addEventListener('DOMContentLoaded', function() {
            // Note: This won't work as DOM is already loaded, but we call it manually after updates
        });

        // --- SPEED MARKING FUNCTIONS ---

        function toggleSpeedMode(mode, btn) {
            if (gridSpeedMode === mode) {
                // Clicking same button = deactivate
                gridSpeedMode = null;
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            } else {
                // Activate mode
                gridSpeedMode = mode;
                
                // Update button highlights
                document.querySelectorAll('.speed-btn').forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
            }
        }

        function clearAllSpeeds() {
            document.querySelectorAll('.swara-cell').forEach(cell => {
                cell.classList.remove('speed-2x', 'speed-3x');
            });
            cellSpeedMap = {};
            gridSpeedMode = null;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            showToast('Speed marks cleared.');
        }

        function handleSpeedCellClick(cell, cellIndex) {
            if (!gridSpeedMode) return;

            // Toggle speed class
            if (gridSpeedMode === 'normal') {
                cell.classList.remove('speed-2x', 'speed-3x');
                delete cellSpeedMap[cellIndex];
            } else if (gridSpeedMode === '2x') {
                cell.classList.remove('speed-3x');
                cell.classList.toggle('speed-2x');
                if (cell.classList.contains('speed-2x')) {
                    cellSpeedMap[cellIndex] = 2;
                } else {
                    delete cellSpeedMap[cellIndex];
                }
            } else if (gridSpeedMode === '3x') {
                cell.classList.remove('speed-2x');
                cell.classList.toggle('speed-3x');
                if (cell.classList.contains('speed-3x')) {
                    cellSpeedMap[cellIndex] = 3;
                } else {
                    delete cellSpeedMap[cellIndex];
                }
            }
            
            gridIsDirty = true;
        }

        function updateNotationWithSpeeds() {
            // Rebuild notation text with speed prefixes (2* and 3*)
            const lines = document.getElementById('notationInput').value.split('\n');
            let cellIndex = 0;
            let updatedLines = [];

            lines.forEach((line) => {
                if (/[SRGMPDNsrgmpdn,;]/.test(line) && line.includes(',')) {
                    // This is a notation line - add speed prefixes
                    const atoms = tokenizeWithPosition(line);
                    let newLine = '';
                    
                    atoms.forEach(atom => {
                        const speed = cellSpeedMap[cellIndex];
                        if (speed === 2) {
                            newLine += '2*' + atom.text;
                        } else if (speed === 3) {
                            newLine += '3*' + atom.text;
                        } else {
                            newLine += atom.text;
                        }
                        cellIndex++;
                    });
                    
                    updatedLines.push(newLine);
                } else {
                    updatedLines.push(line);
                }
            });

            document.getElementById('notationInput').value = updatedLines.join('\n');
        }

        function saveSpeedMarksToSections() {
            // Sync speed marks from cellSpeedMap to currentSong.sections atoms
            let cellIndex = 0;
            
            currentSong.sections.forEach(section => {
                if (section.rows) {
                    section.rows.forEach(row => {
                        if (row.type === 'swara' && row.atoms) {
                            row.atoms.forEach(atom => {
                                if (cellSpeedMap[cellIndex] === 2) {
                                    atom.speed = 2;
                                } else if (cellSpeedMap[cellIndex] === 3) {
                                    atom.speed = 3;
                                } else {
                                    atom.speed = 1;
                                }
                                cellIndex++;
                            });
                        }
                    });
                }
            });
        }

        function restoreSpeedMarksFromSections() {
            // Load speed marks from currentSong.sections atoms into cellSpeedMap and grid
            cellSpeedMap = {};
            let cellIndex = 0;
            const allCells = document.querySelectorAll('.swara-cell');

            currentSong.sections.forEach(section => {
                if (section.rows) {
                    section.rows.forEach(row => {
                        if (row.type === 'swara' && row.atoms) {
                            row.atoms.forEach(atom => {
                                if (atom.speed === 2) {
                                    cellSpeedMap[cellIndex] = 2;
                                    allCells[cellIndex]?.classList.add('speed-2x');
                                } else if (atom.speed === 3) {
                                    cellSpeedMap[cellIndex] = 3;
                                    allCells[cellIndex]?.classList.add('speed-3x');
                                }
                                cellIndex++;
                            });
                        }
                    });
                }
            });
        }

    </script>
