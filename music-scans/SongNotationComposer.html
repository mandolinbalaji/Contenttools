        async function saveSongInternal() {
            try {
                // Verify enrichment before saving
                let enrichedCount = 0;
                let totalAtoms = 0;
                let sampleAtom = null;
                if (currentSong.sections) {
                    currentSong.sections.forEach(section => {
                        (section.rows || []).forEach(row => {
                            if (row.type === 'swara' && row.atoms) {
                                row.atoms.forEach(atom => {
                                    totalAtoms++;
                                    if (atom.frequency || atom.midiNumber || atom.ragaswaraEquivalent) {
                                        enrichedCount++;
                                        if (!sampleAtom) sampleAtom = atom;  // Capture first enriched atom
                                    }
                                });
                            }
                        });
                    });
                }
                console.log(`💾 SAVE CHECK: ${enrichedCount}/${totalAtoms} atoms have enrichment data`);
                console.log(`💾 Sample enriched atom:`, sampleAtom);
                
                // Save the currentSong (already enriched by Format if clicked)
                const response = await fetch('/api/notation-composer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentSong)
                });
                const saved = await response.json();
                currentSong.id = saved.id;
                await renderPlaylist();
                document.getElementById('shareBtn').style.display = 'inline-flex';
                console.log(`✅ Song saved with ${enrichedCount} enriched atoms to server`);
                showToast('✅ Song saved successfully!', 'success');
            } catch (err) {
                console.error('Save failed:', err);
                alert('Failed to save song to server.');
            }
        }

                delete targetRow.atoms[aIdx].sruthiNoteEquivalent;

        function handleLyricDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!draggedLyricCell || e.target === draggedLyricCell || !e.target.classList.contains('lyrics-cell')) return;
            
            const sourceText = draggedLyricCell.textContent;
            
            // Get target cell indices
            const targetSectionIdx = parseInt(e.target.dataset.sectionIdx);
            const targetLyricRowIdx = parseInt(e.target.dataset.lyricRowIdx);
            const targetAtomIdx = parseInt(e.target.dataset.atomIdx);
            
            // Get source cell indices
            const sourceSectionIdx = parseInt(draggedLyricCell.dataset.sectionIdx);
            const sourceLyricRowIdx = parseInt(draggedLyricCell.dataset.lyricRowIdx);
            const sourceAtomIdx = parseInt(draggedLyricCell.dataset.atomIdx);
            
            // Overwrite: source content goes to target, source becomes blank
            e.target.textContent = sourceText;
            draggedLyricCell.textContent = '';
            
            // Update in currentSong data structure
            currentSong.sections[targetSectionIdx].rows[targetLyricRowIdx].atoms[targetAtomIdx] = sourceText;
            currentSong.sections[sourceSectionIdx].rows[sourceLyricRowIdx].atoms[sourceAtomIdx] = '';
            
            // Trigger cell edit handlers to mark as dirty
            handleCellEdit(targetSectionIdx, targetLyricRowIdx, targetAtomIdx, 'lyric', sourceText);
            handleCellEdit(sourceSectionIdx, sourceLyricRowIdx, sourceAtomIdx, 'lyric', '');
            
            e.target.classList.remove('drag-target');
            gridIsDirty = true;
            showToast('Lyric moved ✓');
        }

        function makeDraggable(elmnt, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            handle.onmousedown = dragMouseDown;
            
            // Add resize functionality
            const resizeHandle = document.getElementById('resizeHandle');
            if (resizeHandle) {
                resizeHandle.onmousedown = resizeMouseDown;
            }

            function dragMouseDown(e) {
                // Ignore if clicking on resize handle
                if (e.target.id === 'resizeHandle') return;
                
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
                elmnt.style.right = 'auto'; // Break initial right binding
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
            
            function resizeMouseDown(e) {
                e.preventDefault();
                const startX = e.clientX;
                const startY = e.clientY;
                const startWidth = elmnt.offsetWidth;
                const startHeight = elmnt.offsetHeight;
                
                document.onmouseup = closeResizeElement;
                document.onmousemove = elementResize;
                
                function elementResize(e) {
                    e.preventDefault();
                    const newWidth = Math.max(300, startWidth + (e.clientX - startX));
                    const newHeight = Math.max(250, startHeight + (e.clientY - startY));
                    elmnt.style.width = newWidth + 'px';
                    elmnt.style.height = newHeight + 'px';
                }
                
                function closeResizeElement() {
                    document.onmouseup = null;
                    document.onmousemove = null;
                }
            }
        }

        function generateCleanMidi() {
            const TICKS_PER_BEAT = 480;
            
            // Get song parameters
            const bpm = parseInt(currentSong.bpm) || 120;
            const songName = currentSong.name || 'Song';
            const sruthi = currentSong.sruthi || 'C';
            const nadai = parseInt(currentSong.nadai) || 4;  // Nadai: subdivisions per beat
            
            // Collect all notes from atoms - handle both array (enriched) and scalar (legacy) formats
            const noteEvents = [];
            
            currentSong.sections.forEach(section => {
                section.rows.forEach(row => {
                    if (row.type === 'swara' && row.atoms) {
                        row.atoms.forEach(atom => {
                            const text = atom.text;
                            const speed = atom.speed || 1;
                            
                            if (!text || text === ',' || text === '-' || text === '*') {
                                // Rest
                                noteEvents.push({
                                    text: text || ',',
                                    note: null,
                                    isRest: true,
                                    speed: speed
                                });
                            } else if (atom.midiNumber !== undefined && atom.midiNumber !== null) {
                                // Check if midiNumber is enriched (array) or scalar (legacy)
                                if (Array.isArray(atom.midiNumber)) {
                                    // Array-based enriched format - one event per MIDI number
                                    const midiNumbers = atom.midiNumber || [];
                                    for (let midi of midiNumbers) {
                                        if (midi > 0) {
                                            noteEvents.push({
                                                text: text,
                                                note: midi,
                                                isRest: false,
                                                speed: speed,
                                                multiNote: true
                                            });
                                        } else if (midi === 0) {
                                            // Rest within multi-note atom
                                            noteEvents.push({
                                                text: text,
                                                note: null,
                                                isRest: true,
                                                speed: speed,
                                                multiNote: true
                                            });
                                        }
                                    }
                                } else {
                                    // Scalar format (legacy) - single MIDI number
                                    if (atom.midiNumber > 0) {
                                        noteEvents.push({
                                            text: text,
                                            note: atom.midiNumber,
                                            isRest: false,
                                            speed: speed
                                        });
                                    }
                                }
                            } else {
                                // Fallback: Convert note text to MIDI number (using sruthi as key)
                                const midiNote = noteTextToMidiNumber(text, sruthi);
                                if (midiNote !== null) {
                                    noteEvents.push({
                                        text: text,
                                        note: midiNote,
                                        isRest: false,
                                        speed: speed
                                    });
                                }
                            }
                        });
                    }
                });
            });

            console.log(`MIDI: ${noteEvents.length} notes/rests, BPM=${bpm}, Nadai=${nadai}, Sruthi=${sruthi}`);
            
            // Debug: log first 30 note events to see all notes including "G"
            console.log('First 30 notes:');
            console.table(noteEvents.slice(0, 30));

            // Build MIDI track
            const trackBytes = [];
            
            // 1. Tempo
            const tempoMicroseconds = Math.round(60000000 / bpm);
            trackBytes.push(0x00); // delta time
            trackBytes.push(0xFF, 0x51, 0x03); // Tempo meta
            trackBytes.push(
                (tempoMicroseconds >> 16) & 0xFF,
                (tempoMicroseconds >> 8) & 0xFF,
                tempoMicroseconds & 0xFF
            );

            // 2. Key signature
            const keySharpFlats = getKeySigFromSruthi(sruthi);
            trackBytes.push(0x00); // delta time
            trackBytes.push(0xFF, 0x59, 0x02, keySharpFlats, 0); // Key signature

            // 3. Time signature (from beats and nadai)
            // Time signature: 0xFF 0x58 0x04 nn dd cc bb
            // nn = numerator (beats per measure), dd = denominator power of 2, cc = clicks, bb = 32nds
            const beatsPerMeasure = parseInt(currentSong.beats) || 8;
            const denomPower = nadai === 3 ? 3 : 2;  // 3 = eighth notes for triplets, 2 = quarter notes for standard
            trackBytes.push(0x00); // delta time
            trackBytes.push(0xFF, 0x58, 0x04); // Time signature meta
            trackBytes.push(beatsPerMeasure); // numerator (beats per measure)
            trackBytes.push(denomPower);      // denominator power of 2 (3 = triplet eighths, 2 = quarter notes)
            trackBytes.push(24);              // clock ticks per beat (24 is standard MIDI)
            trackBytes.push(8);               // notated 32nd notes per quarter note (8 is standard)

            // 4. Sequence name
            if (songName.length < 128) {
                trackBytes.push(0x00); // delta time
                trackBytes.push(0xFF, 0x03); // Sequence name
                trackBytes.push(songName.length);
                for (let c of songName) {
                    trackBytes.push(c.charCodeAt(0));
                }
            }

            // 5. Add notes
            let accumulatedRestTicks = 0;
            noteEvents.forEach(evt => {
                // Duration = beat / nadai / speed
                // nadai = 4 means 4 notes per beat
                // speed = 2 means double speed (half duration)
                const durationTicks = Math.round((TICKS_PER_BEAT / nadai) / evt.speed);

                if (evt.isRest) {
                    // Accumulate rest duration instead of outputting orphaned delta time
                    accumulatedRestTicks += durationTicks;
                } else {
                    // Note On - use accumulated rest time as delta
                    appendVariableLength(trackBytes, accumulatedRestTicks);
                    trackBytes.push(0x90, evt.note, 100); // channel 0, velocity 100
                    accumulatedRestTicks = 0;

                    // Note Off - delta time = note duration
                    appendVariableLength(trackBytes, durationTicks);
                    trackBytes.push(0x80, evt.note, 64); // channel 0, velocity 64
                }
            });

            // 6. End of track
            trackBytes.push(0x00, 0xFF, 0x2F, 0x00);

            // Build full MIDI file
            const midiBytes = [];

            // Header: MThd [6 bytes] format(2) tracks(2) division(2)
            midiBytes.push(0x4D, 0x54, 0x68, 0x64); // "MThd"
            midiBytes.push(0x00, 0x00, 0x00, 0x06); // header size = 6
            midiBytes.push(0x00, 0x00); // format 0
            midiBytes.push(0x00, 0x01); // 1 track
            midiBytes.push((TICKS_PER_BEAT >> 8) & 0xFF, TICKS_PER_BEAT & 0xFF);

            // Track: MTrk [size] [events]
            midiBytes.push(0x4D, 0x54, 0x72, 0x6B); // "MTrk"
            
            // Track length (big-endian)
            const trackLen = trackBytes.length;
            midiBytes.push(
                (trackLen >> 24) & 0xFF,
                (trackLen >> 16) & 0xFF,
                (trackLen >> 8) & 0xFF,
                trackLen & 0xFF
            );

            // Track data
            midiBytes.push(...trackBytes);

            console.log(`MIDI file: ${midiBytes.length} bytes`);
            return new Uint8Array(midiBytes);
        }

        function noteTextToMidiNumber(text, sruthi = 'C') {
            if (!text) return null;

            // Strip combining characters first
            let cleanText = text.replace(/[\u0300-\u036F]/g, '');
            
            // Map to semitones (C = 0)
            const noteMap = {
                'S': 0,   // Shadja = C
                'R': 2,   // Rishabha = D
                'G': 4,   // Gandhara = E
                'M': 5,   // Madhyama = F
                'P': 7,   // Panchama = G
                'D': 9,   // Dhaivata = A
                'N': 11   // Nishada = B
            };

            // Get first note character from CLEAN text (uppercase)
            let firstChar = null;
            for (let i = 0; i < cleanText.length; i++) {
                const char = cleanText[i].toUpperCase();
                if (char in noteMap) {
                    firstChar = char;
                    break;
                }
            }

            if (!firstChar) return null;

            // Test for dots-above using safe pre-composed characters only
            const dotsAboveChars = /[ṠṡṘṙĠġṀṁṖṗḊḋṄṅ]/;
            const hasDotAbove = dotsAboveChars.test(text);
            
            // For dots-below, use ONLY safe pre-composed characters in regex
            // and check combining characters explicitly for unmapped notes
            let hasDotBelow = false;
            
            // Safe pre-composed dot-below characters (no combining chars)
            const preComposedDotBelow = /[ṢṣṚṛṂṃṆṇḌḍ]/;
            if (preComposedDotBelow.test(text)) {
                hasDotBelow = true;
            } else {
                // For notes without pre-composed dot-below (G, P), check if combining dot follows
                const firstCharIndex = text.indexOf(firstChar);
                if (firstCharIndex >= 0 && firstCharIndex + 1 < text.length) {
                    const nextChar = text[firstCharIndex + 1];
                    const nextCharCode = nextChar.charCodeAt(0);
                    // Check for combining dot-below (U+0323)
                    if (nextCharCode === 0x0323) {
                        hasDotBelow = true;
                    }
                }
            }
            
            // Character map: decorated → plain note
            const charMap = {
                'Ṡ': 'S', 'ṡ': 'S',
                'Ṙ': 'R', 'ṙ': 'R',
                'Ġ': 'G', 'ġ': 'G',
                'Ṁ': 'M', 'ṁ': 'M',
                'Ṗ': 'P', 'ṗ': 'P',
                'Ḋ': 'D', 'ḋ': 'D',
                'Ṅ': 'N', 'ṅ': 'N',
                'Ṣ': 'S', 'ṣ': 'S',
                'Ṛ': 'R', 'ṛ': 'R',
                'G̣': 'G', 'g̣': 'G',
                'Ṃ': 'M', 'ṃ': 'M',
                'P̣': 'P', 'p̣': 'P',
                'Ḍ': 'D', 'ḍ': 'D',
                'Ṇ': 'N', 'ṇ': 'N'
            };
            
            // Normalize using cleanText
            let normalized = cleanText;
            for (let [decor, plain] of Object.entries(charMap)) {
                normalized = normalized.replace(new RegExp(decor, 'g'), plain);
            }
            normalized = normalized.toUpperCase();

            // Map sruthi to semitone offset from C
            const sruthiOffsets = {
                'C': 0, 'C#': 1, 'Db': 1,
                'D': 2, 'D#': 3, 'Eb': 3,
                'E': 4, 'E#': 5, 'Fb': 4,
                'F': 5, 'F#': 6, 'Gb': 6,
                'G': 7, 'G#': 8, 'Ab': 8,
                'A': 9, 'A#': 10, 'Bb': 10,
                'B': 11, 'B#': 0, 'Cb': 11
            };

            // Extract first character (base note)
            let baseChar = null;
            for (let i = 0; i < normalized.length; i++) {
                if (normalized[i] in noteMap) {
                    baseChar = normalized[i];
                    break;
                }
            }

            if (!baseChar) return null;

            const baseC = 60; // C4 MIDI note (middle octave)
            const semitone = noteMap[baseChar];
            const sruthiOffset = sruthiOffsets[sruthi] || 0;
            
            // Octave adjustments
            let octaveShift = 0;
            if (hasDotAbove) octaveShift = 12;    // Higher octave (Ṡ, ṡ, etc. → C5)
            if (hasDotBelow) octaveShift = -12;   // Lower octave (Ṣ, ṣ, etc. → C3)

            const midiNote = baseC + semitone + sruthiOffset + octaveShift;
            return midiNote;
        }

        function getKeySigFromSruthi(sruthi) {
            // Map sruthi to key signature (number of sharps/flats)
            const keyMap = {
                'C': 0,
                'C#': 7,
                'Db': -5,
                'D': 2,
                'D#': 9,
                'Eb': -3,
                'E': 4,
                'F': -1,
                'F#': 6,
                'Gb': -6,
                'G': 1,
                'G#': 8,
                'Ab': -4,
                'A': 3,
                'A#': 10,
                'Bb': -2,
                'B': 5
            };
            return keyMap[sruthi] || 0;
        }

        function appendVariableLength(bytes, value) {
            if (value < 128) {
                bytes.push(value);
            } else if (value < 16384) {
                bytes.push(((value >> 7) & 0x7F) | 0x80, value & 0x7F);
            } else if (value < 2097152) {
                bytes.push(
                    ((value >> 14) & 0x7F) | 0x80,
                    ((value >> 7) & 0x7F) | 0x80,
                    value & 0x7F
                );
            } else {
                bytes.push(
                    ((value >> 21) & 0x7F) | 0x80,
                    ((value >> 14) & 0x7F) | 0x80,
                    ((value >> 7) & 0x7F) | 0x80,
                    value & 0x7F
                );
            }
        }
