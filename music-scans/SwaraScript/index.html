
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SwaraScript - Carnatic Notation</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #f8fafc;
    }
    .font-cinzel {
      font-family: 'Cinzel', serif;
    }
    .swara-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .swara-active {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
    }
    @keyframes pulse-ring {
      0% { transform: scale(.33); opacity: 1; }
      80%, 100% { opacity: 0; }
    }
    .mic-active::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(239, 68, 68, 0.4);
      border-radius: 50%;
      animation: pulse-ring 1.5s infinite;
    }
  </style>
