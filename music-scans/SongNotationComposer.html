<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SongNotationComposer</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --dark: #2d3436;
            --light: #f9f9f9;
            --accent: #ff7675;
            --sidebar-width: 300px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            color: var(--dark);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: var(--sidebar-width);
            background: white;
            border-right: 1px solid #ddd;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eee;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .search-box {
            padding: 10px;
            margin: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: calc(100% - 30px);
        }

        .playlist {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .playlist-item {
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid #f0f0f0;
        }

        .playlist-item:hover {
            background: #f8f9ff;
        }

        .playlist-item.active {
            background: #edf2ff;
            border-left: 4px solid var(--primary);
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            height: 70px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            padding: 0 30px;
            justify-content: space-between;
            z-index: 10;
        }

        .header-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .input-section {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        textarea#notationInput {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 15px;
            resize: vertical;
        }

        .viewer-section {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        /* Ribbon-style Buttons */
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: #5a6fd6;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #ddd;
            color: #555;
        }

        .btn-outline:hover {
            background: #f9f9f9;
        }

        .share-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--dark);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1000;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Notation Grid Styles */
        .notation-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            table-layout: fixed;
        }

        .notation-table td {
            border: 1px solid #eee;
            padding: 8px;
            text-align: center;
            vertical-align: top;
        }

        .swara-cell {
            font-family: monospace;
            font-weight: bold;
            font-size: 16px;
            color: var(--dark);
            padding-bottom: 4px;
        }

        .lyrics-cell {
            font-family: monospace;
            font-style: italic;
            font-size: 13px;
            color: #0047b3;
            min-height: 1.2em;
            padding: 2px;
            border: 1px solid transparent;
        }

        .swara-cell[contenteditable="true"]:focus,
        .lyrics-cell[contenteditable="true"]:focus {
            outline: none;
            background: #fff;
            border: 1px solid var(--primary);
            box-shadow: 0 0 5px rgba(108, 92, 231, 0.2);
            z-index: 10;
        }

        .section-header {
            background: #f8f9fa;
            font-weight: bold;
            padding: 15px;
            text-align: left;
            border-left: 5px solid var(--primary);
            margin-top: 30px;
        }

        /* Source Viewer Layout */
        .source-viewer-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            transition: 0.3s;
        }

        .source-image-panel {
            position: fixed;
            top: 100px;
            right: 40px;
            width: 450px;
            background: white;
            padding: 0;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            display: none;
            z-index: 1000;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .source-image-header {
            background: #f8f9fa;
            padding: 10px 15px;
            border-bottom: 1px solid #eee;
            cursor: move;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .source-image-panel img {
            width: 100%;
            display: block;
            cursor: zoom-in;
        }

        .notation-viewer-panel {
            flex: 1;
            width: 100%;
        }

        .upload-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        #imageUpload {
            display: none;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 14px;
            color: #666;
        }

        select,
        input[type="text"],
        input[type="number"] {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h3>🎵 Notation Composer</h3>
        </div>
        <input type="text" class="search-box" id="playlistSearch" placeholder="🔍 Search Raga, Composer, Tags...">
        <div class="playlist" id="playlistContainer">
            <!-- Playlist items will be injected here -->
            <div class="playlist-item active">Sujana Jīvana</div>
        </div>
    </div>

    <div class="main-content">
        <header>
            <div class="header-controls">
                <div style="width: 80px;">
                    <label>Sruthi</label>
                    <select id="sruthi">
                        <option>C</option>
                        <option>C#</option>
                        <option>D</option>
                        <option>D#</option>
                        <option>E</option>
                        <option>F</option>
                        <option>F#</option>
                        <option>G</option>
                        <option>G#</option>
                        <option>A</option>
                        <option>A#</option>
                        <option>B</option>
                    </select>
                </div>
                <div style="width: 60px;">
                    <label>Beats</label>
                    <input type="number" id="beats" value="8" min="1">
                </div>
                <div style="width: 60px;">
                    <label>Nadai</label>
                    <input type="number" id="nadai" value="4" min="1">
                </div>
                <div style="width: 80px;">
                    <label>BPM</label>
                    <input type="number" id="bpm" value="120" min="40">
                </div>
            </div>
            <div class="header-actions">
                <button class="btn btn-outline" onclick="newSong()" title="Clear and start new">📄 New</button>
                <button class="btn btn-outline" onclick="importFile()" title="Import from file">📥 Import</button>
                <button class="btn btn-outline" onclick="saveNotationSource()"
                    title="Save ONLY the notation text box">💾 Save Notation</button>
                <button class="btn btn-primary" onclick="saveRenderedGrid()"
                    title="Save manual corrections in the grid">📊 Save Spreadsheet</button>
                <button class="btn btn-outline" id="sourceBtn" onclick="toggleSourceView()"
                    title="Toggle Floating Source Image">📷 Source</button>
                <button class="btn btn-outline" id="shareBtn" onclick="shareSong()" style="display: none;">🔗
                    Share</button>
            </div>
        </header>

        <div class="content-area">

            <div class="input-section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <label>Notation Text</label>
                    <div class="upload-controls">
                        <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)">
                        <button class="btn btn-outline btn-sm" onclick="document.getElementById('imageUpload').click()">
                            <i class="fas fa-image"></i> Upload Source Image
                        </button>
                        <button class="btn btn-secondary btn-sm" id="aiParseBtn" onclick="aiParseImage()"
                            style="display:none;">
                            <i class="fas fa-magic"></i> AI Parse Image
                        </button>
                    </div>
                </div>
                <textarea id="notationInput" spellcheck="false"
                    placeholder="Composition: Sujana Jīvana&#10;• Rāga: Khamas (Mēḷa 28)&#10;• Ārōhaṇa: S M¹ G³ M¹ P D² N² Ṡ&#10;• Avarōhaṇa: Ṡ N² D² P M¹ G³ R² S&#10;• Tāḷa: 3x4 (Rūpaka structure as shown in the source)&#10;&#10;--------------------------------------------------------------------------------&#10;Pallavi (P.1)&#10;Line 1:&#10;M,G, GS S,M,G,    | G M, ,, ,, ,, MGM,  | P,D,P, PDN,D,      | P,,, ,, P,,DNDP ||&#10;su ja na jī  va     na           rā ma    suguṇa bhū  sha      na    rā ma"></textarea>
                <button class="btn btn-primary" onclick="parseAndRender()">⚡ Parse & Display</button>
            </div>

            <div class="source-viewer-container">
                <div id="sourceImagePanel" class="source-image-panel">
                    <div class="source-image-header" id="sourceImageHeader">
                        <span style="font-weight: 600; color: var(--secondary); font-size: 14px;"><i
                                class="fas fa-image"></i> Source Image</span>
                        <button class="btn btn-sm" onclick="toggleSourceView()"
                            style="padding: 2px 8px; background: transparent; border: none; cursor: pointer;">✖</button>
                    </div>
                    <div style="max-height: 70vh; overflow-y: auto;">
                        <img id="sourceImage" src="" alt="Notation Source">
                    </div>
                </div>

                <div class="notation-viewer-panel">
                    <div class="viewer-section" id="notationViewer">
                        <div id="metadataDisplay"></div>
                        <div id="renderedNotation">
                            <p style="color: #888; text-align: center; padding: 40px;">Rendered notation will appear
                                here
                                after parsing.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CONFIGURATION & CONSTANTS ---
        const NOTE_MAPPING = {
            'S': 0, 'R1': 1, 'R2': 2, 'R3': 3, 'G1': 2, 'G2': 3, 'G3': 4,
            'M1': 5, 'M2': 6, 'P': 7, 'D1': 8, 'D2': 9, 'D3': 10, 'N1': 9, 'N2': 10, 'N3': 11
        };

        // --- 2. STATE ---
        let currentSong = {
            id: null, name: '', ragam: '', thalam: '', composer: '',
            sruthi: 'C', beats: 8, nadai: 4, bpm: 120, sections: []
        };

        let gridIsDirty = false;

        function parseAndRender() {
            if (gridIsDirty) {
                if (!confirm("You have manual edits in the grid. Clicking 'Parse' will overwrite them. Continue?")) {
                    return;
                }
            }

            const text = document.getElementById('notationInput').value;
            if (!text) return;

            const lines = text.split('\n');
            let songMetadata = { name: 'Untitled Song', ragam: '', thalam: '', composer: '', arohana: '', avarohana: '' };
            let sections = [];
            let currentSection = null;

            for (let i = 0; i < lines.length; i++) {
                const rawLine = lines[i];
                const trimmed = rawLine.trim();
                if (!trimmed) continue;

                if (trimmed.startsWith('Composition:')) songMetadata.name = trimmed.replace('Composition:', '').trim();
                else if (trimmed.includes('Rāga:')) songMetadata.ragam = trimmed.split('Rāga:')[1].trim();
                else if (trimmed.includes('Tāḷa:')) {
                    const thalam = trimmed.split('Tāḷa:')[1].trim();
                    songMetadata.thalam = thalam;
                    // Smart detection of Beats/Nadai if like "3x4"
                    const talaMatch = thalam.match(/(\d+)\s*x\s*(\d+)/);
                    if (talaMatch) {
                        document.getElementById('beats').value = talaMatch[1];
                        document.getElementById('nadai').value = talaMatch[2];
                    }
                }
                else if (trimmed.includes('Composer:')) songMetadata.composer = trimmed.split('Composer:')[1].trim();
                else if (trimmed.includes('Ārōhaṇa:')) songMetadata.arohana = trimmed.split('Ārōhaṇa:')[1].trim();
                else if (trimmed.includes('Avarōhaṇa:')) songMetadata.avarohana = trimmed.split('Avarōhaṇa:')[1].trim();
                else if (trimmed.includes('Pallavi') || trimmed.includes('Anupallavi') || trimmed.includes('Charaṇam')) {
                    currentSection = { title: trimmed, rows: [] };
                    sections.push(currentSection);
                }
                else if (currentSection) {
                    const isNotation = /[SRGMPDNsrgmpdn,;]/.test(trimmed) && trimmed.includes(',');
                    if (isNotation) {
                        const swaraRowId = 'row-' + Math.random().toString(36).substr(2, 9);
                        const swaraAtoms = tokenizeWithPosition(rawLine);
                        currentSection.rows.push({
                            id: swaraRowId,
                            type: 'swara',
                            content: rawLine,
                            atoms: swaraAtoms
                        });

                        // Check for lyrics in next line
                        if (i + 1 < lines.length) {
                            const nextLine = lines[i + 1];
                            const nextTrimmed = nextLine.trim();
                            const nextIsNotation = /[SRGMPDNsrgmpdn,;]/.test(nextTrimmed) && nextTrimmed.includes(',');
                            const nextIsSection = nextTrimmed.includes('Pallavi') || nextTrimmed.includes('Anupallavi') || nextTrimmed.includes('Charaṇam');

                            if (!nextIsNotation && !nextIsSection && nextTrimmed !== "" && !nextTrimmed.startsWith('---')) {
                                const lyricAtoms = alignLyrics(nextLine, swaraAtoms);
                                currentSection.rows.push({
                                    id: 'row-' + Math.random().toString(36).substr(2, 9),
                                    type: 'lyric',
                                    content: nextLine,
                                    atoms: lyricAtoms,
                                    parentSwaraId: swaraRowId
                                });
                                i++;
                            }
                        }
                    }
                }
            }

            // Persistence Awareness logic removed to favor explicit control (dirty flag + confirmation)
            currentSong = { ...currentSong, ...songMetadata, sections: sections };
            gridIsDirty = false;
            renderSong();
        }

        function renderSong() {
            const viewer = document.getElementById('renderedNotation');
            const metadataDiv = document.getElementById('metadataDisplay');
            viewer.innerHTML = '';
            metadataDiv.innerHTML = `
                <div style="margin-bottom: 25px; border-bottom: 2px solid #eee; padding-bottom: 15px;">
                    <input type="text" id="songNameInput" 
                        style="font-size: 24px; font-weight: bold; color: var(--secondary); border: none; background: transparent; padding: 4px 0; margin-bottom: 5px; width: 100%; border-bottom: 1px solid transparent; outline: none; transition: 0.2s;" 
                        value="${currentSong.name || 'Unnamed Song'}" 
                        onfocus="this.style.borderBottom='1px solid var(--primary)'"
                        onblur="this.style.borderBottom='1px solid transparent'"
                        oninput="updateCurrentSongName(this.value)"
                        placeholder="Unnamed Song">
                    <p style="color: #666; font-size: 14px;">
                        <strong>Ragam:</strong> ${currentSong.ragam} | <strong>Thalam:</strong> ${currentSong.thalam}
                    </p>
                    <div style="margin-top: 12px; display: flex; gap: 15px;">
                        <div style="flex: 1;">
                            <label style="font-size: 12px; font-weight: 600; color: #666; display: block; margin-bottom: 4px;">Composer</label>
                            <input type="text" id="composerInput" 
                                style="width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; outline: none; transition: 0.2s;"
                                value="${currentSong.composer || ''}"
                                onblur="this.style.borderColor='#ddd'"
                                onfocus="this.style.borderColor='var(--primary)'"
                                placeholder="Composer name">
                        </div>
                        <div style="flex: 1;">
                            <label style="font-size: 12px; font-weight: 600; color: #666; display: block; margin-bottom: 4px;">Notation</label>
                            <input type="text" id="notationFieldInput" 
                                style="width: 100%; padding: 6px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; outline: none; transition: 0.2s;"
                                value="${currentSong.notation || ''}"
                                onblur="this.style.borderColor='#ddd'"
                                onfocus="this.style.borderColor='var(--primary)'"
                                placeholder="Notation reference">
                        </div>
                    </div>
                </div>
            `;

            currentSong.sections.forEach((section, sIdx) => {
                const sectionContainer = document.createElement('div');
                sectionContainer.style.marginBottom = '40px';
                const title = document.createElement('div');
                title.className = 'section-header';
                title.textContent = section.title;
                sectionContainer.appendChild(title);

                const table = document.createElement('table');
                table.className = 'notation-table';

                // Interleave rendering logic (Safe check for rows)
                if (section.rows && section.rows.length > 0) {
                    for (let r = 0; r < section.rows.length; r++) {
                        const row = section.rows[r];
                        if (row.type === 'swara') {
                            const tr = document.createElement('tr');

                            // Find potential corresponding lyric row
                            const lyricRow = section.rows.find(lr => lr.type === 'lyric' && lr.parentSwaraId === row.id);

                            row.atoms.forEach((atom, aIdx) => {
                                const cell = document.createElement('td');

                                // Swara Cell
                                const swaraDiv = document.createElement('div');
                                swaraDiv.className = 'swara-cell';
                                swaraDiv.contentEditable = "true";
                                swaraDiv.textContent = formatSwaraForDisplay(atom.text);
                                swaraDiv.oninput = (e) => handleCellEdit(sIdx, r, aIdx, 'swara', e.target.textContent);

                                cell.appendChild(swaraDiv);

                                // Lyric Cell (if exists)
                                if (lyricRow) {
                                    const lyricDiv = document.createElement('div');
                                    lyricDiv.className = 'lyrics-cell';
                                    lyricDiv.contentEditable = "true";
                                    const lyricRowIdx = section.rows.indexOf(lyricRow);
                                    lyricDiv.textContent = lyricRow.atoms[aIdx] || '';
                                    lyricDiv.oninput = (e) => handleCellEdit(sIdx, lyricRowIdx, aIdx, 'lyric', e.target.textContent);
                                    cell.appendChild(lyricDiv);
                                }

                                tr.appendChild(cell);
                            });
                            table.appendChild(tr);
                        }
                    }
                } else if (section.lines) {
                    // Fallback for legacy format
                    section.lines.forEach(line => {
                        const tr = document.createElement('tr');
                        const swaraAtoms = tokenizeWithPosition(line.swaras);
                        const lyricAtoms = alignLyrics(line.lyrics, swaraAtoms);
                        swaraAtoms.forEach((atom, idx) => {
                            const cell = document.createElement('td');
                            const swaraDiv = document.createElement('div');
                            swaraDiv.className = 'swara-cell';
                            swaraDiv.textContent = formatSwaraForDisplay(atom.text);
                            const lyricDiv = document.createElement('div');
                            lyricDiv.className = 'lyrics-cell';
                            lyricDiv.textContent = lyricAtoms[idx] || '';
                            cell.appendChild(swaraDiv);
                            cell.appendChild(lyricDiv);
                            tr.appendChild(cell);
                        });
                        table.appendChild(tr);
                    });
                }
                sectionContainer.appendChild(table);
                viewer.appendChild(sectionContainer);
            });
        }

        function tokenizeWithPosition(line) {
            // Updated regex:
            // 1. Matches swaras including precomposed variants (Latin Extended A and Additional)
            //    followed by optional numbers/superscripts and combining marks.
            // 2. Matches delimiters and special notation characters.
            // 3. Matches any other non-whitespace character as a fallback token.
            const regex = /([SRGMPDNsrgmpdn\u1E00-\u1EFF\u0100-\u017F][0-9¹²³]*[\u0300-\u036F]?)|([,;|*\-.[\]/])|(\S)/g;
            let tokens = []; let match;
            while ((match = regex.exec(line)) !== null) {
                tokens.push({ text: match[0], index: match.index });
            }
            return tokens;
        }

        function alignLyrics(lyricLine, swaraAtoms) {
            if (!lyricLine) return new Array(swaraAtoms.length).fill('');

            const lyricRegex = /\S+/g;
            let lyricTokens = [];
            let match;
            while ((match = lyricRegex.exec(lyricLine)) !== null) {
                lyricTokens.push({ text: match[0], index: match.index });
            }

            let result = new Array(swaraAtoms.length).fill('');

            lyricTokens.forEach(token => {
                let bestIdx = -1;
                let minDiff = Infinity;

                swaraAtoms.forEach((atom, sIdx) => {
                    let diff = Math.abs(atom.index - token.index);

                    // Penalty logic: Prioritize musical notes over delimiters.
                    // If the token is a delimiter/extension, add a penalty to the distance.
                    // This favors assigning lyrics to a nearby note (within 1 char) even if a delimiter is at the exact index.
                    const isNote = /[SRGMPDNsrgmpdn\u1E00-\u1EFF\u0100-\u017F]/.test(atom.text);
                    if (!isNote) {
                        diff += 1.1; // Penalty ensures notes within 1 char are preferred over exact delimiters.
                    }

                    if (diff < minDiff) {
                        minDiff = diff;
                        bestIdx = sIdx;
                    }
                });

                if (bestIdx !== -1) {
                    result[bestIdx] = result[bestIdx] ? result[bestIdx] + ' ' + token.text : token.text;
                }
            });

            return result;
        }

        function formatSwaraForDisplay(atom) {
            if (/[SRGMPDNsrgmpdn]/.test(atom)) {
                const isUppercase = atom[0] === atom[0].toUpperCase();
                const hasNumber = /[0-9]/.test(atom);
                if (isUppercase && hasNumber) {
                    return atom.replace(/[0-9]/g, '').toUpperCase();
                }
                return atom.toUpperCase();
            }
            return atom;
        }

        async function saveNotationSource() {
            currentSong.rawText = document.getElementById('notationInput').value;
            // Sync current header settings
            currentSong.sruthi = document.getElementById('sruthi').value;
            currentSong.beats = document.getElementById('beats').value;
            currentSong.nadai = document.getElementById('nadai').value;
            currentSong.bpm = document.getElementById('bpm').value;
            // Sync composer and notation fields
            currentSong.composer = document.getElementById('composerInput')?.value || '';
            currentSong.notation = document.getElementById('notationFieldInput')?.value || '';

            await saveSongInternal();
            showToast('Notation source saved.');
        }

        async function saveRenderedGrid() {
            // Sync current header settings
            currentSong.sruthi = document.getElementById('sruthi').value;
            currentSong.beats = document.getElementById('beats').value;
            currentSong.nadai = document.getElementById('nadai').value;
            currentSong.bpm = document.getElementById('bpm').value;
            // Sync composer and notation fields
            currentSong.composer = document.getElementById('composerInput')?.value || '';
            currentSong.notation = document.getElementById('notationFieldInput')?.value || '';

            // currentSong.sections is already updated via handleCellEdit
            await saveSongInternal();
            gridIsDirty = false;
            showToast('Spreadsheet edits saved.');
        }

        async function saveSongInternal() {
            try {
                // Ensure imageSource is part of the save payload
                const response = await fetch('/api/notation-composer', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentSong)
                });
                const saved = await response.json();
                currentSong.id = saved.id;
                await renderPlaylist();
                document.getElementById('shareBtn').style.display = 'inline-flex';
            } catch (err) {
                console.error('Save failed:', err);
                alert('Failed to save song to server.');
            }
        }

        function handleCellEdit(sIdx, rIdx, aIdx, type, newValue) {
            gridIsDirty = true;
            const targetRow = currentSong.sections[sIdx].rows[rIdx];
            if (type === 'swara') {
                targetRow.atoms[aIdx].text = newValue;
            } else if (type === 'lyric') {
                targetRow.atoms[aIdx] = newValue;
            }
        }

        async function deleteSong(id, event) {
            if (event) event.stopPropagation();
            if (!confirm('Are you sure you want to delete this song?')) return;
            try {
                await fetch(`/api/notation-composer/${id}`, { method: 'DELETE' });
                await renderPlaylist();
                if (currentSong && currentSong.id === id) newSong();
                showToast('Song deleted.');
            } catch (err) {
                alert('Delete failed.');
            }
        }

        function loadSongIntoUI(song) {
            currentSong = song;
            document.getElementById('sruthi').value = song.sruthi || 'C';
            document.getElementById('beats').value = song.beats || 8;
            document.getElementById('nadai').value = song.nadai || 4;
            document.getElementById('bpm').value = song.bpm || 120;
            document.getElementById('notationInput').value = song.rawText || '';
            renderSong();

            // Re-link image if it exists
            if (song.imageSource) {
                updateSourceViewer(song.imageSource);
                document.getElementById('aiParseBtn').style.display = 'inline-flex';
            } else {
                updateSourceViewer(null);
                document.getElementById('aiParseBtn').style.display = 'none';
            }

            document.getElementById('shareBtn').style.display = 'inline-flex';
        }

        function shareSong() {
            if (!currentSong.name) return;
            const url = new URL(window.location.href);
            url.searchParams.set('song', currentSong.name);

            navigator.clipboard.writeText(url.toString()).then(() => {
                showToast('URL copied to clipboard!');
            }).catch(err => {
                alert('Failed to copy URL: ' + err);
            });
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('shareToast') || createToast();
            toast.textContent = message;

            // Basic color coding
            if (type === 'error') toast.style.borderLeft = '4px solid #ff7675';
            else if (type === 'warning') toast.style.borderLeft = '4px solid #fdcb6e';
            else if (type === 'success') toast.style.borderLeft = '4px solid #55efc4';
            else toast.style.borderLeft = '4px solid var(--primary)';

            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        function createToast() {
            const toast = document.createElement('div');
            toast.id = 'shareToast';
            toast.className = 'share-toast';
            document.body.appendChild(toast);
            return toast;
        }

        function toggleSourceView() {
            const panel = document.getElementById('sourceImagePanel');
            const isHidden = panel.style.display === 'none' || panel.style.display === '';
            panel.style.display = isHidden ? 'block' : 'none';

            // Highlight button if active
            const btn = document.getElementById('sourceBtn');
            if (isHidden) {
                btn.style.background = '#edf2ff';
                btn.style.borderColor = 'var(--primary)';
            } else {
                btn.style.background = 'transparent';
                btn.style.borderColor = '#ddd';
            }
        }

        async function handleImageUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Ensure we have a song name for the filename
            if (!currentSong.name || currentSong.name.trim() === '' || currentSong.name === 'Untitled Song') {
                const name = prompt("Enter Song Name for this image source (this will be the filename):");
                if (!name || name.trim() === "") {
                    showToast("Upload cancelled: Song name required.", "error");
                    event.target.value = ''; // Reset input
                    return;
                }
                currentSong.name = name.trim();
                renderSong(); // Update UI
            }

            const formData = new FormData();
            formData.append('image', file);
            formData.append('songName', currentSong.name);

            try {
                const response = await fetch('/api/upload-notation-image', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.imagePath) {
                    currentSong.imageSource = result.imagePath;
                    updateSourceViewer(result.imagePath);
                    document.getElementById('aiParseBtn').style.display = 'inline-flex';
                    showToast('Image saved as: ' + result.imagePath.split('/').pop());
                } else if (result.error) {
                    showToast('Upload failed: ' + result.error, 'error');
                }
            } catch (err) {
                showToast('Upload failed: ' + err, 'error');
            }
        }

        function updateSourceViewer(path) {
            const panel = document.getElementById('sourceImagePanel');
            const img = document.getElementById('sourceImage');
            const btn = document.getElementById('sourceBtn');

            if (path) {
                img.src = path;
                panel.style.display = 'block';
                btn.style.background = '#edf2ff';
                btn.style.borderColor = 'var(--primary)';
                btn.style.display = 'inline-flex';

                // Initialize draggable if not already done
                if (!panel.dataset.draggable) {
                    makeDraggable(panel, document.getElementById('sourceImageHeader'));
                    panel.dataset.draggable = "true";
                }
            } else {
                panel.style.display = 'none';
                btn.style.display = 'none';
                btn.style.background = 'transparent';
                btn.style.borderColor = '#ddd';
            }
        }

        function makeDraggable(elmnt, handle) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            handle.onmousedown = dragMouseDown;

            function dragMouseDown(e) {
                e = e || window.event;
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            }

            function elementDrag(e) {
                e = e || window.event;
                e.preventDefault();
                pos1 = pos3 - e.clientX;
                pos2 = pos4 - e.clientY;
                pos3 = e.clientX;
                pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
                elmnt.style.right = 'auto'; // Break initial right binding
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        async function aiParseImage() {
            if (!currentSong.imageSource) {
                showToast("No image source found to parse.", "error");
                return;
            }

            const btn = document.getElementById('aiParseBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Parsing...';
            btn.disabled = true;

            try {
                const response = await fetch('/api/ai-parse-notation', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imagePath: currentSong.imageSource })
                });

                if (!response.ok) {
                    throw new Error('Server returned ' + response.status);
                }

                const result = await response.json();

                if (result.notation) {
                    document.getElementById('notationInput').value = result.notation;
                    showToast(result.message || 'Notation extracted from image!');
                    try {
                        parseAndRender(); // Automatically render the results
                    } catch (renderErr) {
                        console.error('Render error after parsing:', renderErr);
                        showToast('Notation extracted but failed to render display grid.', 'warning');
                    }
                } else {
                    showToast(result.error || 'AI Parse failed to extract notation.', 'error');
                }
            } catch (err) {
                console.error('AI Parse Error:', err);
                showToast('AI Parse failed: ' + err.message, 'error');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        async function renderPlaylist() {
            const container = document.getElementById('playlistContainer');
            try {
                const response = await fetch('/api/notation-composer');
                const stored = await response.json();
                container.innerHTML = '';

                if (stored.length === 0) {
                    container.innerHTML = '<div style="padding: 20px; color: #888; font-size: 13px;">No songs saved yet.</div>';
                    return;
                }

                stored.forEach(song => {
                    const item = document.createElement('div');
                    item.className = 'playlist-item' + (currentSong && (currentSong.id === song.id || currentSong.name === song.name) ? ' active' : '');
                    item.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <div style="font-weight: bold;">${song.name}</div>
                                <div style="font-size: 11px; color: #888;">${song.ragam || 'No Raga'} | ${song.thalam || 'No Thala'}</div>
                            </div>
                            <button onclick="deleteSong('${song.id}', event)" style="background:none; border:none; color:#ff7675; cursor:pointer; font-size:16px;">&times;</button>
                        </div>
                    `;
                    item.onclick = () => {
                        loadSongIntoUI(song);
                        renderPlaylist(); // Update active class
                    };
                    container.appendChild(item);
                });
            } catch (err) {
                container.innerHTML = '<div style="padding: 20px; color: #ff7675; font-size: 13px;">Failed to load library.</div>';
            }
        }

        function loadSongIntoUI(song) {
            currentSong = song;
            document.getElementById('sruthi').value = song.sruthi || 'C';
            document.getElementById('beats').value = song.beats || 8;
            document.getElementById('nadai').value = song.nadai || 4;
            document.getElementById('bpm').value = song.bpm || 120;
            document.getElementById('notationInput').value = song.rawText || '';
            gridIsDirty = false;

            // Image Source updates
            updateSourceViewer(song.imageSource);
            document.getElementById('aiParseBtn').style.display = song.imageSource ? 'inline-flex' : 'none';

            renderSong();
            document.getElementById('shareBtn').style.display = 'inline-flex';
        }

        function newSong() {
            document.getElementById('notationInput').value = '';
            document.getElementById('metadataDisplay').innerHTML = '';
            document.getElementById('renderedNotation').innerHTML = '<p style="color: #888; text-align: center; padding: 40px;">Ready for new notation.</p>';
            currentSong = { name: '', ragam: '', thalam: '', sruthi: 'C', beats: 8, nadai: 4, bpm: 120, sections: [], rawText: '' };
            gridIsDirty = false;
            renderPlaylist();
        }

        function updateCurrentSongName(newName) {
            currentSong.name = newName;
            // Update sidebar specifically
            // Find the active playlist item and update its primary text
            const activeItem = document.querySelector('.playlist-item.active');
            if (activeItem) {
                // Find the name div - it's usually the first div inside the first div
                const nameDiv = activeItem.querySelector('div div:first-child');
                if (nameDiv) {
                    nameDiv.textContent = newName || 'Unnamed Song';
                }
            }
        }

        window.onload = async () => {
            await renderPlaylist();

            // Search functionality
            document.getElementById('playlistSearch').addEventListener('input', function (e) {
                const term = e.target.value.toLowerCase();
                const items = document.querySelectorAll('.playlist-item');
                items.forEach(item => {
                    const text = item.textContent.toLowerCase();
                    item.style.display = text.includes(term) ? 'block' : 'none';
                });
            });

            // Initial load from URL
            const urlParams = new URLSearchParams(window.location.search);
            const songName = urlParams.get('song');
            if (songName) {
                try {
                    const response = await fetch('/api/notation-composer');
                    const stored = await response.json();
                    const song = stored.find(s => s.name === songName);
                    if (song) {
                        loadSongIntoUI(song);
                        renderPlaylist();
                    }
                } catch (err) {
                    console.error('URL load failed:', err);
                }
            }
        };

        function importFile() { alert('Import feature: Paste text into the input box and click "Parse".'); }
        function exportFile() {
            if (!currentSong.rawText) {
                alert('No notation text to export.');
                return;
            }
            const blob = new Blob([currentSong.rawText], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentSong.name || 'song'}.txt`;
            a.click();
        }

    </script>
</body>

</html>
