<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice Mode - Carnatic Music</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .practice-container {
            width: 100%;
            max-width: 100%;
            margin: 0;
            background: white;
            border-radius: 0;
            box-shadow: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Header */
        .practice-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 48px 40px;
            text-align: center;
            flex-shrink: 0;
        }

        .practice-title {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .practice-metadata {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 24px;
            margin-top: 24px;
            font-size: 18px;
            opacity: 0.95;
        }

        .metadata-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .metadata-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }

        .metadata-value {
            font-size: 22px;
            font-weight: 600;
        }

        /* Controls Section */
        .practice-controls {
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            padding: 28px 40px;
            display: flex;
            gap: 40px;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .control-group {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .control-label {
            font-weight: 600;
            color: #667eea;
            font-size: 18px;
            min-width: 80px;
        }

        .control-input {
            padding: 12px 16px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 18px;
            transition: border-color 0.2s;
            min-width: 140px;
        }

        .control-input:focus {
            outline: none;
            border-color: #667eea;
            background: #f0f4ff;
        }

        .play-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 6px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .play-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .play-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .play-button.playing {
            background: #ff6b6b;
        }

        /* Content Area */
        .practice-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Spreadsheet Container */
        .practice-spreadsheet-container {
            max-height: 500px;
            overflow-y: auto;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            background: white;
        }

        .practice-spreadsheet-container::-webkit-scrollbar {
            width: 8px;
        }

        .practice-spreadsheet-container::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }

        .practice-spreadsheet-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }

        .practice-spreadsheet-container::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        .practice-spreadsheet-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'Courier New', monospace;
        }

        .practice-spreadsheet-table th,
        .practice-spreadsheet-table td {
            border: 1px solid #ddd;
            padding: 14px;
            text-align: center;
            font-size: 16px;
            line-height: 1.8;
        }

        .practice-spreadsheet-table th {
            background: #333;
            color: white;
            font-weight: 700;
        }

        .practice-label {
            background: #f8f9fa;
            font-weight: 600;
            color: #667eea;
            width: 60px;
            min-width: 60px;
            font-size: 18px;
        }

        .practice-swara-cell {
            font-weight: 700;
            color: #333;
            font-size: 18px;
        }

        .practice-lyrics-cell {
            font-size: 14px;
            color: #666;
            font-style: italic;
        }

        .practice-landing {
            background: #fff3cd;
        }

        .practice-section-row th {
            background: #667eea;
            color: white;
            font-weight: 700;
            font-size: 13px;
            padding: 10px;
        }

        /* Error Message */
        .error-section {
            background: #ffe0e0;
            border: 2px solid #ff6b6b;
            border-radius: 8px;
            padding: 20px;
            color: #d32f2f;
            text-align: center;
            font-weight: 600;
        }

        /* Loading */
        .loading-section {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Footer */
        .practice-footer {
            background: #f8f9fa;
            border-top: 2px solid #e9ecef;
            padding: 20px 40px;
            text-align: center;
            font-size: 14px;
            color: #999;
            flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .practice-container {
                height: 100vh;
            }

            .practice-header {
                padding: 16px 12px;
            }

            .practice-title {
                font-size: 32px;
            }

            .practice-metadata {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
                font-size: 14px;
            }

            .practice-controls {
                padding: 16px 12px;
                gap: 12px;
            }

            .control-label {
                font-size: 14px;
                min-width: 50px;
            }

            .control-input {
                padding: 10px 12px;
                font-size: 14px;
                min-width: 100px;
            }

            .play-button {
                padding: 10px 16px;
                font-size: 14px;
            }

            .practice-content {
                padding: 12px;
            }

            .practice-spreadsheet-table th,
            .practice-spreadsheet-table td {
                border: 1px solid #ddd;
                padding: 10px;
                text-align: center;
                font-size: 13px;
            }

            .practice-label {
                width: 50px;
                min-width: 50px;
                font-size: 14px;
            }

            .practice-swara-cell {
                font-size: 14px;
            }

            .practice-lyrics-cell {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="practice-container">
        <!-- Header -->
        <div class="practice-header">
            <div class="practice-title" id="songTitle">Loading...</div>
            <div class="practice-metadata" id="metadataSection">

        <!-- Controls -->
        <div class="practice-controls">
            <div class="control-group">
                <label class="control-label">Sruthi:</label>
                <select id="sruthiSelect" class="control-input">
                    <option value="C#" selected>C#</option>
                    <option value="D">D</option>
                    <option value="D#">D#</option>
                    <option value="E">E</option>
                    <option value="F">F</option>
                    <option value="F#">F#</option>
                    <option value="G">G</option>

                    <option value="B">B</option>

            <div class="control-group">

                <input type="number" id="bpmInput" class="control-input" value="80" min="30" max="200" step="5">
            </div>
            <button class="play-button" id="playButton" onclick="playPhrase()">▶ Play</button>
        </div>

        <!-- Content -->
        <div class="practice-content" id="contentArea">
            <div class="practice-spreadsheet-container">
                <table class="practice-spreadsheet-table" id="practiceSpreadsheet">
                    <thead id="practiceSpreadsheetHeader"></thead>
                    <tbody id="practiceSpreadsheetBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <div class="practice-footer">
            Practice Mode • Carnatic Music Notation
        </div>
    </div>

    <script>
        // ============================================================================
        // SRUTHI FREQUENCIES AND MAPPINGS
        // ============================================================================
        const sruthiFrequencies = {
            'C#': {
                baseFreq: 138.59,
                notes: {
                    's': 0,
                    'r': 1,
                    'g': 3,

                }
            },

                }
            },
            'D#': {

                notes: {

                }
            },
            'E': {
                baseFreq: 164.81,
                notes: {
                    's': 0,

                }
            },
            'F': {
                baseFreq: 174.61,
                notes: {
                    's': 0,

                }
            },
            'F#': {

                notes: {

                    'g': 3,

                    'p': 7,

                }
            },
            'G': {
                baseFreq: 196.00,
                notes: {
                    's': 0,
                    'r': 1,
                    'g': 3,
                    'm': 5,
                    'p': 7,
                    'd': 8,
                    'n': 10
                }
            },
            'G#': {
                baseFreq: 207.65,
                notes: {
                    's': 0,
                    'r': 1,
                    'g': 3,
                    'm': 5,
                    'p': 7,
                    'd': 8,
                    'n': 10
                }
            },
            'A': {
                baseFreq: 220.00,
                notes: {
                    's': 0,
                    'r': 1,
                    'g': 3,
                    'm': 5,
                    'p': 7,
                    'd': 8,
                    'n': 10
                }
            },
            'A#': {
                baseFreq: 233.08,
                notes: {
                    's': 0,
                    'r': 1,
                    'g': 3,
                    'm': 5,
                    'p': 7,
                    'd': 8,
                    'n': 10
                }
            },
            'B': {
                baseFreq: 246.94,
                notes: {
                    's': 0,
                    'r': 1,
                    'g': 3,
                    'm': 5,
                    'p': 7,
                    'd': 8,
                    'n': 10
                }
            }
        };

        // ============================================================================
        // GLOBAL STATE
        // ============================================================================
        let currentSong = null;
        let isPlaying = false;
        let currentAudioContext = null;
        let currentOscillators = [];

        // ============================================================================
        // LOAD SONG FROM URL PARAMETER
        // ============================================================================
        function loadSongFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const songName = params.get('song');

            if (!songName) {
                showError('No song specified. Please use ?song=SongName');
                return;
            }

            fetchSongData(songName);
        }

        function fetchSongData(songName) {
            fetch(`songs/${songName}.json`)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Song file not found: ${songName}.json`);
                    }
                    return response.json();
                })
                .then(song => {
                    currentSong = song;
                    initializeSruthi();
                    renderPracticePage();
                })
                .catch(error => {
                    console.error('Error loading song:', error);
                    showError(`Failed to load song: ${error.message}`);
                });
        }

        // ============================================================================
        // INITIALIZE SRUTHI
        // ============================================================================
        function initializeSruthi() {
            const sruthiSelect = document.getElementById('sruthiSelect');
            if (currentSong.sruthi) {
                sruthiSelect.value = currentSong.sruthi;
            }
        }

        // ============================================================================
        // RENDER PRACTICE PAGE
        // ============================================================================
        function renderPracticePage() {
            // Update title
            document.getElementById('songTitle').textContent = currentSong.name || 'Untitled Song';

            // Update metadata
            document.getElementById('metaRaga').textContent = currentSong.ragam || '-';
            document.getElementById('metaThalam').textContent = currentSong.thalam || '-';
            document.getElementById('metaComposer').textContent = currentSong.composer || '-';
            document.getElementById('metaBeats').textContent = currentSong.beats || '-';
            document.getElementById('metaNadai').textContent = currentSong.nadai || '-';

            // Render spreadsheet
            renderSpreadsheet();
        }

        // ============================================================================
        // HELPER FUNCTIONS
        // ============================================================================
        function extractSectionTag(comments) {
            if (!comments) return null;
            
            // Match section keywords (case-insensitive)
            const sectionMatch = comments.match(/^(Pallavi|PALLAVI|Anupallavi|ANUPALLAVI|Charanam|CHARANAM|Charaṇam):/i);
            
            if (sectionMatch) {
                const tag = sectionMatch[1];
                // Normalize to display format
                if (tag.toLowerCase() === 'pallavi') return 'Pallavi';
                if (tag.toLowerCase() === 'anupallavi') return 'Anupallavi';
                if (tag.toLowerCase() === 'charanam' || tag.toLowerCase() === 'charaṇam') return 'Charanam';
            }
            
            return null;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Variant offset mappings: how many semitones to adjust from base note
        const variantOffsets = {
            'r': { '1': -1, '2': 0, '3': 1 },    // R: r1 = -1 semitone, r2 = base, r3 = +1
            'g': { '1': -2, '2': -1, '3': 0 },   // G: g1 = -2, g2 = -1, g3 = base
            'm': { '1': 0, '2': 1 },              // M: m1 = base, m2 = +1
            'd': { '1': -1, '2': 0, '3': 1 },    // D: d1 = -1, d2 = base, d3 = +1
            'n': { '1': -2, '2': -1, '3': 0 }    // N: n1 = -2, n2 = -1, n3 = base
        };

        function getVariantOffset(noteChar, variantDigit) {
            const charLower = noteChar.toLowerCase();
            if (variantOffsets[charLower] && variantOffsets[charLower][variantDigit]) {
                return variantOffsets[charLower][variantDigit];
            }
            return 0; // No variant or base variant
        }

        function phraseToItems(text) {
            // Normalize Unicode: decompose pre-composed characters
            const normalized = text.normalize('NFD');
            const items = [];
            
            for (let i = 0; i < normalized.length; i++) {
                const char = normalized[i].toLowerCase();
                if (char === ' ' || char === '|') continue; // Skip spaces and pipes
                if (char === '{' || char === '}') continue; // Skip curly braces
                
                if (['s', 'r', 'g', 'm', 'p', 'd', 'n'].includes(char)) {
                    let item = normalized[i]; // Keep original case
                    
                    // Check if this note has a variant digit (e.g., r1, r2, g3)
                    if (i + 1 < normalized.length && /[1-9]/.test(normalized[i + 1])) {
                        item += normalized[i + 1];
                        i++; // Skip the digit
                    }
                    
                    // Check for combining characters (dot above U+0307 or dot below U+0323)
                    while (i + 1 < normalized.length && ['\u0307', '\u0323'].includes(normalized[i + 1])) {
                        item += normalized[i + 1];
                        i++; // Skip the combining character
                    }
                    
                    items.push(item);
                } else if (char === ',') {
                    items.push(',');
                } else if (char === '*') {
                    // Skip * - it's just an eduppu marker
                    continue;
                }
            }
            return items;
        }

        // ============================================================================
        // RENDER FUNCTIONS
        // ============================================================================
        function renderSpreadsheet() {
            const cycleLength = currentSong.beats * currentSong.nadai;
            const header = document.getElementById('practiceSpreadsheetHeader');
            const body = document.getElementById('practiceSpreadsheetBody');

            // Create header with continuous numbering row + beat numbers and nadai subdivisions
            let continuousNumberHTML = '<tr><th></th>';  // Empty cell for label column
            let beatHeaderHTML = '<tr><th></th>';
            let nadaiHeaderHTML = '<tr><th></th>';
            
            // Add continuous numbering 1 to cycleLength
            for (let i = 1; i <= cycleLength; i++) {
                continuousNumberHTML += `<th style="background: #222; color: white; font-weight: 700; font-size: 10px;">${i}</th>`;
            }
            continuousNumberHTML += '</tr>';
            
            for (let beat = 1; beat <= currentSong.beats; beat++) {
                beatHeaderHTML += `<th colspan="${currentSong.nadai}" style="background: #333; color: white;">Beat ${beat}</th>`;
                for (let n = 1; n <= currentSong.nadai; n++) {
                    nadaiHeaderHTML += `<th style="background: #666; color: white; font-size: 9pt;">${n}</th>`;
                }
            }
            beatHeaderHTML += '</tr>';
            nadaiHeaderHTML += '</tr>';
            
            header.innerHTML = continuousNumberHTML + beatHeaderHTML + nadaiHeaderHTML;

            // Create body with cycles grouped by section tags
            body.innerHTML = '';

            // Group cycles by section tag
            const sections = [];
            let currentSection = { tag: null, cycles: [] };
            
            currentSong.cycles.forEach((cycle, cycleIndex) => {
                const sectionTag = extractSectionTag(cycle.comments);
                
                // If section tag changed, save current section and start new one
                if (sectionTag !== currentSection.tag) {
                    if (currentSection.cycles.length > 0) {
                        sections.push(currentSection);
                    }
                    currentSection = { tag: sectionTag, cycles: [] };
                }
                
                currentSection.cycles.push({ cycle, index: cycleIndex });
            });
            
            // Don't forget the last section
            if (currentSection.cycles.length > 0) {
                sections.push(currentSection);
            }
            
            // Render sections with headers
            sections.forEach((section, sectionIndex) => {
                // Add section header row if there's a section tag
                if (section.tag) {
                    const headerRow = body.insertRow();
                    headerRow.className = 'practice-section-row';
                    const headerCell = headerRow.insertCell();
                    headerCell.colSpan = cycleLength + 1;  // +1 for label column
                    headerCell.textContent = section.tag;
                    headerCell.style.background = '#667eea';
                    headerCell.style.color = 'white';
                    headerCell.style.fontWeight = '700';
                    headerCell.style.fontSize = '13px';
                    headerCell.style.padding = '10px';
                }
                
                // Add cycles in this section
                section.cycles.forEach(({ cycle, index }) => {
                    renderPracticeSpreadsheetLine(body, index + 1, cycle, cycleLength);
                });
            });
        }

        function renderPracticeSpreadsheetLine(tbody, cycleNumber, cycleData, cycleLength) {
            const phraseText = cycleData.phraseText || '';
            const lyricsDisplay = cycleData.lyrics || '';
            const eduppu = currentSong.eduppu || 1;
            
            // Determine if we should calculate commas
            const shouldCalculateCommas = cycleData.calculateCommas !== false;
            
            // Create items array from phraseText
            const items = phraseToItems(phraseText);
            
            // Split items into rows
            const rows = [];
            for (let i = 0; i < items.length; i += cycleLength) {
                rows.push(items.slice(i, i + cycleLength));
            }
            
            if (rows.length === 0) {
                rows.push([]);
            }

            // Parse lyrics: each comma is one item, each syllable is one item
            function parseLyricsToItems(text) {
                const items = [];
                let i = 0;
                while (i < text.length) {
                    if (text[i] === ',') {
                        items.push(',');
                        i++;
                    } else {
                        let syllable = '';
                        while (i < text.length && text[i] !== ',') {
                            syllable += text[i];
                            i++;
                        }
                        items.push(syllable);
                    }
                }
                return items;
            }
            
            const allLyricsItems = parseLyricsToItems(lyricsDisplay);

            // Render swaras + lyrics paired rows
            rows.forEach((rowItems, rowIndex) => {
                const notesRow = tbody.insertRow();
                const labelCell = notesRow.insertCell();
                labelCell.className = 'practice-label';
                
                if (rowIndex === 0) {
                    labelCell.textContent = cycleNumber;
                } else {
                    labelCell.textContent = '';
                }
                
                const landingCellIndex = (rowIndex === 0 && shouldCalculateCommas) ? eduppu - 1 : -1;
                
                for (let i = 0; i < cycleLength; i++) {
                    const cell = notesRow.insertCell();
                    const noteItem = rowItems[i] || '';
                    const globalLyricIndex = (rowIndex * cycleLength) + i;
                    const lyricItem = allLyricsItems[globalLyricIndex] || '';
                    
                    // Create swara div
                    const swaraDiv = document.createElement('div');
                    swaraDiv.className = 'practice-swara-cell';
                    swaraDiv.textContent = noteItem;
                    cell.appendChild(swaraDiv);
                    
                    // Create lyric div if we have lyrics
                    if (lyricsDisplay.trim()) {
                        const lyricDiv = document.createElement('div');
                        lyricDiv.className = 'practice-lyrics-cell';
                        lyricDiv.textContent = (lyricItem === ',' || !lyricItem.trim()) ? '.' : lyricItem;
                        cell.appendChild(lyricDiv);
                    }
                    
                    if (i === landingCellIndex) {
                        cell.className = 'practice-landing';
                    }
                }
            });
        }

        // ============================================================================
        // AUDIO PLAYBACK
        // ============================================================================
        function playPhrase() {
            if (isPlaying) {
                stopPlayback();
                return;
            }

            if (!currentSong || !currentSong.cycles || currentSong.cycles.length === 0) {
                return;
            }

            // Concatenate all phrases
            let fullPhrase = '';
            for (let cycle of currentSong.cycles) {
                if (cycle.phraseText) {
                    fullPhrase += cycle.phraseText + ' ';
                }
            }

            playPhrase_Internal(fullPhrase);
        }

        function playPhrase_Internal(phrase) {
            if (!phrase || phrase.trim().length === 0) {
                return;
            }

            isPlaying = true;
            updatePlayButton();

            const bpm = parseInt(document.getElementById('bpmInput').value) || 80;
            const sruthi = document.getElementById('sruthiSelect').value || 'C#';
            const beatDuration = 60 / bpm;
            const noteDuration = beatDuration / currentSong.nadai;

            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                currentAudioContext = audioContext;
                currentOscillators = [];

                const sruthiInfo = sruthiFrequencies[sruthi] || sruthiFrequencies['C#'];
                let currentTime = audioContext.currentTime;

                for (let char of phrase) {
                    if (char === ' ' || char === '\n') continue;

                    const charLower = char.toLowerCase();
                    if (['s', 'r', 'g', 'm', 'p', 'd', 'n'].includes(charLower)) {
                        let semitones = sruthiInfo.notes[charLower] || 0;
                        
                        // Check if this note has a variant digit (1, 2, or 3)
                        let variantDigit = null;
                        // Look ahead at the phrase to see if next character is a variant digit
                        let phraseChars = phrase.split('');
                        for (let j = 0; j < phraseChars.length; j++) {
                            if (phraseChars[j].toLowerCase() === charLower && j + 1 < phraseChars.length && /[1-3]/.test(phraseChars[j + 1])) {
                                variantDigit = phraseChars[j + 1];
                                break;
                            }
                        }
                        
                        // Apply variant offset if present
                        if (variantDigit) {
                            const offset = getVariantOffset(charLower, variantDigit);
                            semitones += offset;
                        }
                        
                        const frequency = sruthiInfo.baseFreq * Math.pow(2, semitones / 12);

                        const osc = audioContext.createOscillator();
                        const gain = audioContext.createGain();

                        osc.connect(gain);
                        gain.connect(audioContext.destination);
                        osc.frequency.value = frequency;
                        osc.type = 'sine';

                        gain.gain.setValueAtTime(0, currentTime);
                        gain.gain.linearRampToValueAtTime(0.3, currentTime + 0.01);
                        gain.gain.setValueAtTime(0.3, currentTime + noteDuration - 0.05);
                        gain.gain.linearRampToValueAtTime(0, currentTime + noteDuration);

                        osc.start(currentTime);
                        osc.stop(currentTime + noteDuration);

                        currentOscillators.push(osc);
                        currentTime += noteDuration;
                    } else if (char === ',') {
                        currentTime += noteDuration;
                    }
                }

                setTimeout(() => {
                    isPlaying = false;
                    updatePlayButton();
                }, currentTime * 1000 - audioContext.currentTime * 1000);

            } catch (e) {
                console.error('Error playing audio:', e);
                isPlaying = false;
                updatePlayButton();
            }
        }

        function stopPlayback() {
            if (currentAudioContext) {
                currentOscillators.forEach(osc => {
                    try {
                        osc.stop();
                    } catch (e) {
                        // Already stopped
                    }
                });
                currentOscillators = [];
            }
            isPlaying = false;
            updatePlayButton();
        }

        function updatePlayButton() {
            const btn = document.getElementById('playButton');
            if (isPlaying) {
                btn.textContent = '⏹ Stop';
                btn.classList.add('playing');
            } else {
                btn.textContent = '▶ Play';
                btn.classList.remove('playing');
            }
        }

        // ============================================================================
        // ERROR HANDLING
        // ============================================================================
        function showError(message) {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `<div class="error-section">${escapeHtml(message)}</div>`;
        }

        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        window.addEventListener('DOMContentLoaded', loadSongFromUrl);
    </script>
</body>
</html>
