<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            min-height: 100vh;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 24px;
            padding: 32px 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        
        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 32px;
            color: #1a1a1a;
            text-align: center;
        }
        
        .bar-container {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 4px;
            margin-bottom: 40px;
            height: 120px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 16px;
            border: 2px solid #e0e0e0;
        }
        
        .bar {
            width: 24px;
            background: linear-gradient(to top, #667eea, #9db3f5);
            border-radius: 4px;
            transition: all 0.1s ease;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.2);
            flex: 0 0 auto;
        }
        
        .bar.accent {
            background: linear-gradient(to top, #764ba2, #b896d6) !important;
            box-shadow: 0 2px 8px rgba(118, 75, 162, 0.3) !important;
        }
        
        .active {
            filter: brightness(1.2);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
        }
        
        .gap {
            flex: 0 0 12px;
        }
        
        .section {
            margin-bottom: 28px;
        }
        
        .section-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
            display: block;
        }
        
        .control-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .control-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            padding: 16px;
            background: #fafafa;
            border-radius: 12px;
            border: 2px solid #e8e8e8;
        }
        
        label {
            font-size: 14px;
            font-weight: 600;
            color: #333;
            min-width: fit-content;
        }
        
        input[type="number"],
        select {
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 60px;
        }
        
        input[type="number"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        input[type="range"] {
            flex: 1;
            min-width: 100px;
            height: 6px;
            border-radius: 3px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            cursor: pointer;
            border: none;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
        }
        
        .preset-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .preset-btn {
            padding: 8px 12px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            min-width: 70px;
        }
        
        .preset-btn:hover,
        .preset-btn:active {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .player-controls {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 32px;
            padding: 24px;
            background: linear-gradient(135deg, #667eea15, #764ba215);
            border-radius: 16px;
            border: 2px solid #e8e8e8;
        }
        
        .btn-play,
        .btn-mute {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
            font-weight: bold;
        }
        
        .btn-play:hover,
        .btn-mute:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-play:active,
        .btn-mute:active {
            transform: scale(0.95);
        }
        
        .volume-container {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 120px;
        }
        
        .volume-icon {
            font-size: 20px;
            min-width: 24px;
            text-align: center;
        }
        
        @media (max-width: 480px) {
            .container {
                padding: 24px 16px;
                border-radius: 20px;
            }
            
            h1 {
                font-size: 28px;
                margin-bottom: 24px;
            }
            
            .control-row {
                padding: 14px;
            }
            
            .preset-buttons {
                gap: 6px;
            }
            
            .preset-btn {
                padding: 7px 10px;
                font-size: 11px;
                min-width: 60px;
            }
            
            .bar-container {
                margin-bottom: 32px;
                height: 100px;
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>♪ Metronome</h1>
        <div class="bar-container" id="barContainer"></div>
        
        <div class="section">
            <span class="section-label">BPM</span>
            <div class="control-row">
                <input type="number" id="bpm" value="60" min="30" max="300" onchange="setBPM(this.value)">
                <div class="preset-buttons">
                    <button class="preset-btn" onclick="setBPM(60)">60</button>
                    <button class="preset-btn" onclick="setBPM(75)">75</button>
                    <button class="preset-btn" onclick="setBPM(120)">120</button>
                </div>
            </div>
        </div>
        
        <div class="section">
            <span class="section-label">Avarthana (Cycles)</span>
            <div class="control-row">
                <label for="avarthana">Cycles:</label>
                <input type="number" id="avarthana" value="0" min="0" max="100" onchange="setAvarthana(this.value)">
                <span style="font-size: 12px; color: #999;">(0 = infinite)</span>
            </div>
        </div>
        
        <div class="section">
            <span class="section-label">Talam Settings</span>
            <div class="control-row">
                <label for="jathi">Jathi:</label>
                <select id="jathi" onchange="setJathi(this.value)">
                    <option value="3">3</option>
                    <option value="4" selected>4</option>
                    <option value="5">5</option>
                    <option value="7">7</option>
                    <option value="9">9</option>
                </select>
            </div>
            <div class="control-row" style="margin-top: 12px;">
                <label for="beats">Beats:</label>
                <input type="number" id="beats" value="8" min="1" max="16">
            </div>
        </div>
        
        <div class="section">
            <span class="section-label">Beat Patterns</span>
            <div class="preset-buttons" style="gap: 6px;">
                <button class="preset-btn" onclick="setBeats(8, [0,4,6], [4,6])">Adhi 1</button>
                <button class="preset-btn" onclick="setBeats(16, [0,1,8,9,12,13], [8,10,12,14])">Adhi 2</button>
                <button class="preset-btn" onclick="setBeats(3, [0], [1])">Rupakam</button>
                <button class="preset-btn" onclick="setBeats(5, [0,2], [2])">Kandam</button>
                <button class="preset-btn" onclick="setBeats(7, [0,3,5], [3,5])">Mishram</button>
            </div>
        </div>
        
        <div class="section">
            <span class="section-label">Volume Control</span>
            <div class="control-row">
                <div class="volume-container">
                    <span class="volume-icon" id="volumeIcon">🔊</span>
                    <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5" onchange="setVolume(this.value)">
                </div>
            </div>
        </div>
        
        <div class="player-controls">
            <button class="btn-play" id="playBtn" onclick="toggleMetronome()" title="Play / Stop">▶</button>
            <button class="btn-mute" onclick="toggleMute()" title="Mute / Unmute">🔊</button>
        </div>
    </div>
    
    <!-- Audio elements for woodblock sounds -->
    <audio id="regularSound" src="/tick.mp3"></audio>
    <audio id="accentSound" src="/tock.mp3"></audio>
    
    <script>
        let bpm = 60;
        let beatsPerCycle = 8;
        let interval;
        let currentBeat = 0;
        let currentCycle = 0;
        let avarthana = 0;
        let jathi = 4;
        let accentBeats = [0, 4, 6];
        let isMuted = false;
        let volume = 1;

        // Audio elements
        const regularSound = document.getElementById('regularSound');
        const accentSound = document.getElementById('accentSound');

        function setBPM(value) {
            bpm = parseInt(value);
            document.getElementById('bpm').value = bpm;
            restartMetronome();
        }

        function setBeats(value, accents = [], gaps = []) {
            document.getElementById('beats').value = value;
            beatsPerCycle = value;
            accentBeats = accents;
            createBars(gaps);
            restartMetronome();
        }

        function setAvarthana(value) {
            avarthana = parseInt(value);
            document.getElementById('avarthana').value = avarthana;
            restartMetronome();
        }

        function setJathi(value) {
            jathi = parseInt(value);
            document.getElementById('jathi').value = jathi;
            restartMetronome();
        }

        function createBars(gaps = []) {
            const container = document.getElementById('barContainer');
            container.innerHTML = '';
            for (let i = 0; i < beatsPerCycle; i++) {
                // Add a bar
                let bar = document.createElement('div');
                bar.classList.add('bar');
                if (accentBeats.includes(i)) {
                    bar.classList.add('accent');
                }
                container.appendChild(bar);

                // Add a gap if this position is in the gaps array
                if (gaps.includes(i + 1)) { // Insert gap AFTER the specified bar
                    let gap = document.createElement('div');
                    gap.classList.add('gap');
                    container.appendChild(gap);
                }
            }
        }

        function toggleMetronome() {
            if (interval) {
                clearInterval(interval);
                interval = null;
                currentCycle = 0;
                document.getElementById('playBtn').textContent = '▶';
            } else {
                startMetronome();
                document.getElementById('playBtn').textContent = '⏸';
            }
        }

        function startMetronome() {
            const bars = document.querySelectorAll('.bar');
            currentBeat = 0;
            currentCycle = 0;
            interval = setInterval(() => {
                bars.forEach(bar => bar.classList.remove('active', 'active-accent'));
                bars[currentBeat].classList.add('active');
                if (accentBeats.includes(currentBeat)) {
                    bars[currentBeat].classList.add('active', 'accent');
                    playSound(accentSound); // Play accent sound
                } else {
                    playSound(regularSound); // Play regular sound
                }
                currentBeat = (currentBeat + 1) % beatsPerCycle;
                
                // Check for cycle completion and avarthana
                if (currentBeat === 0) {
                    currentCycle++;
                    if (avarthana > 0 && currentCycle >= avarthana) {
                        clearInterval(interval);
                        interval = null;
                        currentCycle = 0;
                    }
                }
            }, (60000 / bpm));
        }

        function playSound(sound) {
            if (!isMuted) {
                sound.currentTime = 0; // Reset sound to start
                sound.volume = volume; // Set volume
                sound.play(); // Play the sound
            }
        }

        function restartMetronome() {
            if (interval) {
                clearInterval(interval);
                currentCycle = 0;
                startMetronome();
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            const muteBtn = document.querySelector('.btn-mute');
            muteBtn.textContent = isMuted ? '🔇' : '🔊';
            
            const volumeIcon = document.getElementById('volumeIcon');
            if (volumeIcon) {
                volumeIcon.textContent = isMuted ? '🔇' : '🔊';
            }
        }

        function setVolume(value) {
            volume = parseFloat(value);
        }

        createBars();
    </script>
</body>
</html>
